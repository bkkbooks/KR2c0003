body:
  text: 春秋左氏傳事類始末卷二宋章冲撰宣公二年晉於是有公族晉麗姬之亂詛無畜羣公子自是晉無公族成公即位乃宦卿之適而為乏田以為公族宦仕也為置田邑以為公族大夫又宦其餘子亦為餘子餘子適子之母弟亦治餘子之政其庶子為公行户郎反庶子之子率公戎行晉於是有公族餘子公行皆官名趙盾請以括為公族曰君姬氏之愛子也微君姬氏則臣狄人也公許之冬趙盾為旄車之族使屏季括也以其故族為公族大夫三年楚問周鼎楚子伐陸渾之戎遂至於雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩水神莫能逢之用能協于上下以承天休桀有昬徳鼎遷于商載祀六百商紂暴虐鼎遷于周徳之休明雖小重也其姦回昬亂雖大輕也天祚明徳有所厎止成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也鄭文公妾夢天與之蘭初鄭文公有賤妾曰燕姞夢天使與己蘭曰余為伯鯈音紬燕祖余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭公逐羣公子公子蘭奔晉從晉文公伐鄭石癸曰吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也今公子蘭姞甥也天或啓之必將為君其後必蕃先納之可以亢寵亢極也與孔將鉏侯宣多納之盟于大宫而立之穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒四年魯宣公伐莒非禮公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮鄭子公子家弑靈公楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食去大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譛子家子家懼而從之夏弑靈公君子曰仁而不武無能逹也鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為乃舍之皆為大夫十年子家卒鄭斲其棺而逐其族改葬幽公諡之曰靈六年晉滅赤狄秋赤狄伐晉晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也七年赤狄侵晉取向隂之禾十一年晉卻成子求成于衆狄衆狄疾赤狄之役遂服于晉秋㑹于櫕函衆狄服也是行也諸大夫欲召狄卻成子曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤況寡徳乎十三年秋赤狄伐晉十五年潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也弃仲章潞賢人而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂徳滋益罪也後之人或者將敬奉徳義以事神人而申固其命若之何待之夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反徳為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之六月晉荀林父敗赤狄于曲梁辛亥滅潞晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎天奪之魄矣十六年晉士㑹帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晉侯請于王戊申以黻冕命士㑹將中軍且為大傅於是晉國之盗逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄氷善人在上也善人在上則國無幸民諺曰民之多幸國之不幸也無善人之謂也成八年晉討趙同趙括晉楚戰于邲楚人伐鄭取成而還七年鄭及晉平盟于黒壤王叔桓公臨之以謀不睦九年楚為厲之役六年故伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼國人皆喜唯子良憂曰是國之災也吾死無日矣十一年楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其来者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也鄭又徼事于晉徼音古堯十二年楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫且巷出車吉巷出車示将遷國人大臨力鴆守陴婢支者皆哭楚子退師鄭人修城進復圍之三月克之入自皇門鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聼其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若恵顧前好徼福于厲宣桓武不泯其社稷使改事君夷於九縣君之恵也孤之願也非所敢望也左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質晉師救鄭荀林父將中軍先縠佐之士㑹將上軍卻克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔趙穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後隨武子曰善會聞用師觀釁而動徳刑政事典禮不易不可敵也不為是征楚軍討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣伐叛刑也柔服徳也二者立矣昔嵗入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉武王始更此陳法因以為名商農工賈不敗其業而卒乗輯睦事不奸矣蒍于委敖為宰擇楚國之令典軍行右轅左追蓐車之右者挟轅為戰備左者求蓐為宿備傳曰令尹南轅又曰改乗轅由是觀之楚陳以轅為主前茅慮無如今軍行前有斥候見騎舉絳幡見歩舉白幡備慮有無也茅明也或曰楚以茅為旌識中權後勁百官象物而動軍政不戒而備能用典矣其君之舉也内姓選於親外姓選於舊舉不失徳賞不失勞老有加恵旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦遵天之道湏暗昧者惡積而誅耆旨昧也致討於昧武曰無競惟烈撫弱耆昧以務烈所可也彘子先縠曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵彊而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟知莊子曰此師殆哉周易有之在師坎下坤上之臨兊下坤上曰師出以律否臧凶執事順成為臧逆為否衆散為弱坎衆兊弱川壅為澤坎川兊澤有律以如己也如從也法行則人從法法敗則法從人坎為法象今為衆散為川壅失法之用從人之象故曰律否臧且律竭也竭敗也盈而以竭夭且不整夭塞不行之謂臨川變為澤有帥而不從臨孰甚焉比之謂矣果遇必敗彘子尸之雖免而歸必有大咎韓獻子謂桓子曰彘子以偏師䧟子罪大矣不如進也事之不捷惡有所分與其專罪六人同之不猶愈乎師遂濟楚子北師次於郔延沈尹將中軍子重將左子反將右聞晉師既濟王欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔嵗入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎令尹南轅反斾伍參言於王曰晉之從政者新未能行令其佐先縠剛愎皮逼不仁未肯用命其三帥者專行不獲聽而無上衆誰適從適音嫡此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乗去轅而北之次于管以待之晉師在敖鄗苦交反二山名之間鄭皇戍雖律使如晉師曰鄭之從楚社稷之故也未有貳心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗彘子曰敗楚服鄭於此在矣必許之欒武子曰楚自克庸以來文十六年克庸其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申儆之于勝之不可保紂之百克而卒無後訓之以若敖蚡扶粉冒篳路藍縷以啟山林箴之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不徳而徼怨于楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩十五乗為一廣司馬法百人為卒二十五人為兩車十五乗為大偏今廣十五乗亦用舊偏法復以二十五人為副右廣初駕數及日中左則受之以至于昏内官近官序當其夜以待不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰率師以来唯敵是求克敵得屬又何俟知季知荘子曰原屏咎之徒也趙莊子曰欒伯善哉荘子趙朔實其言必長晉國楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行也將鄭是訓定豈敢求罪于晉隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人彘子使趙括更之曰行人失辭寡君使羣臣遷大國之迹于鄭曰無辟敵羣臣無所逃命楚子又使求成于晉盟有日矣楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡疑旌摩壘而還靡旌疾驅也靡近也樂伯曰吾聞致師者左射食亦切下同以最側留反善矢代御執轡御下兩如子馬兩飾也掉鞅掉正也而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜背之隆髙者晉鮑癸當其後使攝叔獻焉曰以嵗之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也既免晉魏錡求公族未得而怒欲敗晉師請使許之遂往請戰而還楚潘黨逐之及滎澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給於鮮敢獻於從者叔黨命去之趙旃求卿未得且怒失楚之致師者請召盟許之與魏錡皆命而往卻獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也使鞏朔韓穿帥七覆扶又于敖前故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡趙旃夜至於楚軍席於軍門之外使其徒入之楚子為乗廣三十乗分為左右王乗左廣以逐趙旃晉人懼二子之怒楚師也使軘豚車逆之潘黨曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乗以先啟行先人也軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乗晉軍桓子不知所為皷於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動駒伯卻克曰待諸乎隨季曰楚師方壯若萃於我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗王見右廣將從之乗屈蕩尸止也之曰君以此始亦必以終自是楚之乗廣先左楚熊負覊囚知罃知荘子以其族反之廚武子御每射抽矢菆納諸廚子之房知季曰不以人子吾子其可得乎吾不可以茍射故也射連尹襄老獲之遂載其尸射公子穀臣囚之以二者還楚潘黨曰君盍築武軍而收晉尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之又作武其卒章曰耆定爾功其三曰鋪時繹思我徂惟求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無徳而强爭諸侯何以和衆利人之㡬而安人之亂以為已榮何以豐財武有七徳我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又何以為京觀乎秋晉師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役晉師三日穀文公曰得臣猶在憂未歇也困獸猶鬬況國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃乆不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位十三年秋赤狄伐晉先縠召之也晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族君子曰惡之来也已則取之其先縠之謂乎十四年夏晉侯伐鄭為邲故也告於諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而来鄭人懼使子張代子良于楚十五年荀林父敗赤狄于曲梁滅潞晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職說是賞也曰周書所謂庸庸祗祗者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明徳矣文王所以造周不是過也故詩曰陳錫哉周能施也率是道也其何不濟成三年晉人歸楚公子穀臣與連尹襄老之尸于楚以求知罃於是荀首佐中軍矣故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘又誰敢怨王曰然則徳我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好其誰敢徳王曰子歸何以報我對曰臣不任受怨君亦不任受徳無怨無徳不知所報王曰雖然必告不穀對曰以君之靈纍臣得歸骨于晉寡君之以為戮死且不朽若從君之恵而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及於事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之荀罃之在楚也鄭賈人有將寘諸禇中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊鄭殺公子曼滿鄭公子曼滿與王子伯廖力彫語欲為卿伯廖告人曰無徳而貪其在周易豐離下震上之離弗過之矣豐上六變為純離豐上六曰豐其屋蔀其家闚其戸閴其無人三嵗不覿凶義取無徳而大其屋不過三嵗必致滅亡間一嵗鄭人殺之八年晉滅三卻晉胥克有蠱疾卻缺為政秋廢胥克使趙朔佐下軍成十一年聲伯之母不聘生聲伯而出之嫁於齊管于奚生二子而寡聲伯以其外弟為大夫而嫁其外妹於施孝叔晉卻犫来聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰吾不能死亡婦人遂行生二子於卻氏卻氏亾晉人歸之施氏施氏逆諸河沈其二子沈直蔭反婦人怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏傳言犫淫縱所以亡晉卻至與周爭鄇候田王命劉康公單襄公訟諸晉卻至曰温吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘇忿生以温為司寇與檀伯逹封于河蘇氏即狄襄王勞文公而賜之温狐氏陽氏先䖏之而後及子若治其故則王官之邑也子安得之晉侯使卻至勿敢爭傳言至貪所以亡十三年春晉侯使卻錡来乞師將事不敬孟獻子曰卻氏其亡乎禮身之幹也敬身之基也卻子無基且先君之嗣卿也受命以求師將社稷是衛而惰弃君命也不亡何為十四年夏晉侯使卻犫送孫林父於衞衞侯饗之寗恵子相苦成叔傲寗子曰苦成家其亾乎古之為享食似也以觀威儀省禍福也故詩曰兕觵其觩㫖酒思柔彼交匪傲萬福来求今夫子傲取禍之道也十五年晉三卻害伯宗譛而殺之及欒弗忌伯州犂奔楚韓獻子曰卻氏其不免乎善人天地之紀也而驟絶之不亡何待初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難十六年晉侯使卻至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰温季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位夏書曰怨豈在明不見是圖將慎其細也今而明之其可乎十七年晉厲公侈多外嬖欲盡去羣大夫而立其左右胥童以胥克之廢也怨卻氏而嬖於厲公卻錡奪夷陽五田五亦嬖卻犫與長魚矯爭田執而梏之既矯亦嬖於厲公將作難胥童曰必先三卻族大多怨去大族不偪敵多怨有庸公曰然卻氏聞之卻錡欲攻公卻至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉胥童夷羊五將攻卻氏長魚矯請無用衆公使清沸魋助之抽戈結袵而偽訟者三卻將謀於榭矯以戈殺駒伯苦成叔於其位温季曰逃威也遂趨矯及諸車又殺之皆尸諸朝九年楚殺陳夏徵舒陳靈公與孔寧儀行父通於夏姬皆衷其衵女乙服以戲於朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎十年靈公與孔寧儀行父飲酒於夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廏射而殺之二子奔楚十一年楚子伐陳謂陳人無動將討於少西氏少西徵舒之祖子夏名遂入陳殺夏徵舒因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徵舒弑其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶何故對曰猶可辭乎王曰可哉曰夏徵舒弑其君討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳郷取一人焉以歸謂之夏州十一年楚蒍艾獵城沂楚令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板榦稱畚築程土物議逺邇略基址具餱糧度有司事三旬而成不愆于素十二年楚子伐蕭楚子伐蕭蕭人囚熊相冝僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挟纊遂傅附于蕭還旋無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠起弓窮乎曰無麥麴鞠窮所以禦濕河魚腹疾奈何曰目於眢烏丸井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之晉宋衞同盟于清丘晉原穀宋華椒衛孔逹曹人同盟于清丘曰恤病討貳於是卿不書不實其言也宋為盟故伐陳陳二於楚衞人救之孔逹曰先君有約言焉若大國討我則死之十三年清丘之盟晉以衞之救陳也討焉孔逹曰茍利社稷請以我說罪我之由我則為政而亢大國之討將以誰任我則死之十四年春孔逹縊衛人以說于晉而免遂告于諸侯曰寡君有不令之臣逹構我敝邑于大國既伏其罪矣敢告衞人以為成勞復室其子使復其位十四年楚莊伐宋楚子使申舟聘于齊曰無假道于宋亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋無畏抶宋公僕曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒直結皇寝門闕劒及於寢門之外車及於蒲胥之市秋九月楚子圍宋孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌威儀采章車服嘉淑令辭誨讃而有加貨命宥幣帛謀其不免也誅而薦賄則無及也今楚在宋君其圖之十五年春公孫歸父㑹楚子于宋宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之彊能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾近瑜匿瑕國君含垢天之道也君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衞社稷民之主也義無二信信無二命君之賂臣不知命也寡君有信臣下臣獲考死又何求楚子舍之以歸楚師將去宋申犀稽首於王之馬前曰毋畏知死而不敢廢王命王弃言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以㸑雖然城下之盟有以國斃不能從也子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞魯逐東門氏公孫歸父㑹齊侯于穀見晏桓子與之言魯樂桓子告髙宣子曰子家其亡乎懷于魯矣懷必貪貪必謀人謀人人亦謀已一國謀之何以不亡十八年初公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇善帷復命於介既復命袒括髮即位哭三踊而出遂奔齊十五年魏顆從武子治命秦桓公伐晉次于輔氏晉侯治兵于稷以略狄土還及雒魏顆敗秦師于輔氏獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報十六年晉侯使士㑹平王室王孫蘇與召氏毛氏爭政王室亂晉侯使士㑹平王室定王享之原襄公相禮殽烝丞升也升殽於俎武子私問其故王召武子曰王享有體薦半解其體而薦所以示恭儉宴有折之設俎體解節折升之於爼皆可食所以示慈恵公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法十七年齊晉鞌之役晉侯使卻克徵㑹于齊齊頃公帷婦人使觀之卻子登婦人笑於房獻子怒出而誓曰所不此報無能渉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣齊侯使髙固晏弱蔡朝南郭偃㑹及斂亷盂髙固逃歸夏㑹于斷道討貳也盟于卷拳楚辭齊人晉人執晏弱蔡朝南郭偃苗賁皇使見晏桓子歸言于晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮舉言羣臣不信諸侯皆有貳志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故髙子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而来吾若善逆彼以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又乆之以成其悔何利之有焉晉人緩之逸秋晉師還范武子將老召文子曰爕乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以已亂也弗已者必益之卻子其或者欲已亂於齊乎不然余懼其益之也余將老使卻子逞其志庶有豸乎直是切解也爾從二三子唯敬乃請老卻獻子為政十八年晉侯衞太子伐齊齊侯㑹晉侯盟于繒以公子彊為質于晉蔡朝南郭偃逃歸成元年齊難故作丘甲聞齊將出楚師臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞二年春齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊桀也諸城上齊侯親皷士陵城三日取龍遂南侵及巢丘衛侯使孫良夫石稷寗相息亮向禽将侵齊與齊師遇石子欲還孫子曰不如戰也新築人仲叔于奚救孫桓子桓子是以免既衞人賞之以邑辭請曲縣軒縣繁纓馬飾皆諸侯服以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主卻獻子晉侯許之七百乗卻子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乗許之卻克将中軍士爕佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之從齊師于莘六月壬申師至于靡笄之下齊髙固入晉師桀擔也石以投人禽之而乗其車曰欲勇者賈余餘勇癸酉師陳去于鞌邴夏御齊侯逢丑父為右晉解蟹張御卻克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之卻克傷於矢流血及屨未絶皷音曰余病矣張侯曰自始合而矢貫余手及肘余折之設以御左輪朱殷於閑豈敢言病吾子忍之師之耳目在我旗皷進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也擐音患病未及死吾子勉之左并去轡右援袁枹而皷馬逸不能止師從之齊師敗績逐之三周華不注逢丑父與公易位將及華户化泉驂絓戸卦於木而止韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衞請曰無令輿師䧟入君地下臣不幸屬當戎行無所逃隠且懼奔辟避而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父卻獻子將戮之呼火故曰自今無有代其君任壬患者有一於此將為戮乎卻子曰人不難以死免其君我戮之不祥赦之以勸事君者齊侯免求丑父三入三出遂自徐關入見保者曰勉之齊師敗矣辟去女子女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟璧司徒主壁壘之妻也予之石窌力救晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗魚輦玉磬與地不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非徳類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎四王之王于況也樹徳而濟同欲焉五伯之霸也夏伯昆吾商伯大彭豕韋周伯桓文勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是遒子實不優而弃百禄諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒橈敗吾子恵徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也況其不幸敢不唯命是聽魯衛諫曰齊疾我矣子若不許讎我必甚唯子則又何求子得其國寳我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必晉晉人許之秋七月晉師及齊國佐盟于爰婁使齊人歸我汶陽之田公㑹晉師于上鄍溟賜三帥先路三命之服司馬司空輿帥候正亞旅皆受一命之服晉師歸范文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣卻伯見去公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如卻伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉冬晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親暱禁淫慝也今叔父克遂有功于齊而不使命卿鎮撫王室所使来撫余一人而鞏伯實來未有職司於王室又奸先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而太師之後也寧不亦淫從去其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍三年夏公如晉拜汶陽之田冬晉作六軍韓厥趙括鞏朔韓穿荀騅佳趙㫋皆為卿賞鞌之功也齊侯朝于晉將授玉卻克趨進曰此行也君為婦人之笑辱也寡君未之敢任晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥曰臣之不敢愛死為兩君之在此堂也六年二月季文子以鞌之功立武宫非禮也聽於人以救其難不可以立武立武由已非由人也八年春晉侯使韓穿来言汶陽之田歸之于齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷徳畏討無有貳心謂汶陽之田敝邑之舊也而用師于齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士貳其行士也罔極二三其徳七年之中一與一奪二三孰甚焉士之二三猶喪妃配耦而況霸主霸主將徳是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡簡諌也用大道諌之行父懼晉之不逺猶而失諸侯也是以敢私言之九年為歸汶陽之田故諸侯貳於晉晉人懼㑹于蒲季文子謂范文子曰徳則不競尋盟何為范文子曰勤以撫之寛以待之堅彊以御之明神以要之柔服而伐貳徳之次也十八年楚盟諸侯于蜀齊侯㑹晉侯盟于繒夏公使如楚乞師欲以伐齊楚莊王卒楚師不出成元年聞齊将出楚師臧孫許及晉侯盟于赤棘二年㑹晉伐齊衛人不行使于楚亦受盟于晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧夫文王猶用衆況吾儕乎且先君莊王屬之曰無徳以及逺方莫如恵恤其民而善用之乃大户已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆强冠之強其丈反冬楚師侵衛遂侵我師于蜀使臧孫往辭曰楚逺而乆固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斲匠人執鍼女工織紝織繒布者皆百人公衡為質以請盟十一月公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乗楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯況其下乎詩曰不解于位民之攸暨許器其是之謂矣楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以弃魯國國將若之何誰居音基語辭後之人必有任是夫國弃矣是行也晉辟楚畏其衆也君子曰衆之不可以已也大夫為政猶以衆克況明君而善用其衆乎大誓所謂商兆民離周十人同者衆也成公元年王師敗績于茅戎晉侯使瑕嘉平戎于王文十七年周甘歜敗戎于邥垂乗其飲酒也歜音觸邥音審單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎敗績于徐吾氏徐吾茅戎别二年宋文公始厚葬宋文公卒始厚葬用蜃市忍炭益車馬始用殉重器備椁有四阿四注椁棺有翰檜翰旁飾檜上飾王禮君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是弃君於惡也何臣之為申公巫臣通吳于上國楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明徳慎罰文王所以造周也明徳務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也君其圖之王乃止子反欲取之巫臣曰是不祥人也是夭子蠻殺御叔子蠻姬兄御叔姬夫弑靈侯戮夏南徴舒出孔儀喪陳國何不祥如是人生實難其有不獲死乎子反乃止王以予連尹襄老襄老死於邲不獲其尸巫臣使道焉曰歸吾聘女又使自鄭召之曰尸可得也必來逆之王遣夏姬歸巫臣聘諸鄭鄭伯許之及共王即位將為陽橋之役使屈巫聘于齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜冝將竊妻以逃者也及鄭使介反幣而以夏姬行遂奔晉而因卻至以臣於晉晉人使為邢大夫子反請以重幣錮之王曰止其自為謀也則過矣其為先君謀也則忠忠社稷之固也所盖多矣且彼若能利國家雖重幣晉將可乎若無益於晉晉將弃之何勞錮焉七年楚圍宋之役宣十四師還子重請取於申吕以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以禦魚吕北方若取之是無申吕也晉鄭必至於漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族而分其室巫臣自晉遺二子書曰爾以䜛慝貪惏􅀈事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吴晉侯許之吴子夀夢莫公說之乃通吴於晉以兩之一卒適吴舍偏兩之一焉司馬法百人為卒二十五人為兩車九乗為小偏十五乗為大偏盖留九乗車及一兩二十五人令吴習之與其射御敎吴乗車敎之戰陳敎之叛楚寘其子狐庸焉使為行人於吴吴始伐楚伐巢伐徐子重奔命馬陵之㑹吴入州来子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者吴盡取之是以始大通吴於上國八年晉侯使申公巫臣如吴九年晉人㑹於蒲將始㑹吴吴人不至十五年㑹吴于鍾離始通吴也三年晉楚救宋鄭許恃楚而不事鄭鄭子良伐許四年鄭公孫申帥師疆許田晉欒書將中軍荀首佐之士爕佐上軍以救許伐鄭楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決五年許靈公愬鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戍及子國鄭伯歸八月及晉趙同盟于垂棘六年鄭伯如晉拜成子游相授玉于東楹之東禮授玉兩楹之間鄭伯行疾故東過士貞伯曰鄭伯其死乎自弃也已視流而行速不安其位冝不能久六月鄭悼公卒楚子重伐鄭晉欒書救鄭楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諌曰不可吾来救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌於民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎八年晉欒書侵蔡遂侵楚獲申驪楚師之還也六年晉侵沈獲沈子揖初從知范韓也君子曰從善如流冝哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣晉衛尋盟冬晉侯使荀庚来聘且尋盟衛侯使孫良夫来聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也古制公大國侯伯次國子男小國衞在晉不得為次國春秋以强弱為大小故衛侯爵不得為次晉為盟主其將先之丙午盟晉丁未盟衛禮也四年魯成公如晉公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎秋公至自晉欲求成于楚季文子曰不可晉雖無道國大臣睦而邇於我諸侯聽焉未可以貳史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止晉滅趙氏晉趙嬰通于趙莊姬嬰盾弟姬朔之妻盾之子婦五年春原屏歩平放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能舍我何害弗聽嬰夢天使謂已祭余余福女使問諸士貞伯貞伯曰不識也既而告其人曰神福仁而禍淫淫而無罰福也祭其得亡乎祭之之明日而亡八年趙莊姬為趙嬰之亡故譛之于晉侯曰原屏將為亂欒卻為徵六月晉討趙同趙括武從姬氏畜于公宫以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之禄夫豈無辟王頼前哲以免也周書曰不敢侮鰥寡所以明徳也乃立武而反其田焉十年晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入于室又壞户公覺召桑田巫巫言如夢公曰何如曰不食新矣公疾病求醫于秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下肓鬲也心下為膏若我何醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉五年梁山崩梁山崩晉侯以傳召伯宗伯宗辟匹亦重曰辟避傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乗縵武旦反車無文徹樂出次祝幣史辭自罪以禮焉其如此而已伯宗請見之不可遂以告而從之六年晉遷于新田晉人謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也公揖而入韓獻子從公立於寢庭謂獻子曰何如對曰郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘羸困貌於是有沈溺遇疾重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡且民從教十世之利也夫山澤林盬國之寳也國饒則民驕佚近寳公室乃貧不可謂樂公說從之夏晉遷于新田七年吳伐郯吴伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣八年晉士燮來聘言伐郯也以其事吴故公賂之請緩師文子不可曰君命無貳失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師伐郯宋華元合晉楚之成楚子重伐鄭鄭共仲侯羽軍楚師囚鄖云公鍾儀獻諸晉晉人以鍾儀歸囚諸軍府九年晉侯觀于軍府問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅脫之召而弔之再拜稽首問其族對曰泠人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為大子也師保奉之以朝于嬰齊而夕于側也不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱大子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公從之重為之禮使歸求成冬楚子使公子辰如晉報鍾儀之使請脩好結成十年晉侯使糴徒弔茷如楚報大宰子商之使也十一年宋華元善於令尹子重又善於欒武子聞楚人既許晉糴茷成而使歸華元如楚遂如晉合晉楚之成十二年華元克合晉楚之成夏五月晉士燮㑹楚公子罷皮許偃盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往来道路無壅勇謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國晉卻至如楚聘且莅盟楚子享之子反相為地室而縣焉卻至將登金奏作於下驚而走出子反曰日云莫矣寡君須矣吾子其入也賓曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂賔曰若讓之以一矢禍之大者其何福之為世之治也諸侯閒閑於天子之事則相朝也於是乎有享宴之禮享以訓共儉宴以示慈恵共儉以行禮而慈恵以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰赳赳武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為已腹心股肱爪牙故詩曰赳赳武夫公侯腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫楚公子罷如晉聘且涖盟晉侯及公子罷盟于赤棘十五年楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭遂侵衛欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰十六年楚子自武城使公子成以汝隂之田求成于鄭鄭子駟從楚子盟于武城夏鄭子罕伐宋宋將鉏樂懼敗諸汋七藥陂退舍于夫渠不儆鄭人覆福之敗諸汋勺陵獲將鉏樂懼宋恃勝也晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之卻錡將上軍荀偃佐之韓厥將下軍卻至佐新軍荀罃居守鄭人聞有晉師使告于楚姚句古侯耳與預往楚子救鄭司馬將中軍令尹將左右尹子辛將右過申子反入見申叔時曰師其何如對曰徳刑詳義禮信戰之器也徳以施恵刑以正邪詳以事神義以建利禮以順時信以守物民生厚而徳正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我烝民莫匪爾極是以神降之福時無災害民生敦厖和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚内弃其民而外絶其好瀆齊盟而食話言奸時以動而疲民以逞民不知信進退罪也人恤所厎㫖其誰致死子其勉之吾不復見子矣姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇於鄢陵范文子不欲戰卻至曰韓之戰恵公不振旅箕之役先軫不反命邲之師荀伯不復從奔走不復故道皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟去吏戰也有故秦狄齊楚皆强不盡力子孫將弱今三强服矣敵楚而已唯聖人能外内無患自非聖人外寧必有内憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范匄趨進曰塞井夷竈陳於軍中而疏行户郎首當陳前開營壘為行也晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕渤周固壘而待之三日必退退而擊之必獲勝焉卻至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦晦日陰之終兵家所忌在陳而囂合而加囂各顧其後莫有鬬心舊不必良以犯天忌我必克之子重使大宰伯州犁侍于王後伯州犁以公卒告王苗賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也晉侯左右人之語苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公筮之史曰吉其卦遇復震下坤上曰南國䠞子六射食亦切下射之同其元王中厥目復陽長之卦陽起子南行推陰故曰南國䠞南國勢䠞則離受其咎故離為諸侯又為目陽氣激南飛矢之象故射其元王中厥目國䠞王傷不敗何待公從之有淖於前乃皆左右相違於淖歩毅御晉厲公欒鍼為右彭名御楚共王潘黨為右石首御鄭成公唐茍為右欒范以其族夹公行户郎䧟於淖欒書將載晉侯鍼曰書退國有大任焉得專之且侵官冒也失官慢也去師為御離局姦也有三罪焉不可犯也乃掀公以出于淖潘尫之黨與養由基蹲甲而射之蹲聚也徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝吕錡夢射食亦月中之退入於泥占之曰姬姓日也異姓月也必楚王也射石而中之退入於泥亦必死矣及戰射共土中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射社乃射再發盡殪叔山冉搏人以投中丁仲車折軾晉師乃止欒鍼見子重之旌曰楚人謂夫旌子重之麾也彼其子重也日臣之使于楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇請攝飲焉公許之使行人執榼承飲造于子重曰寡君乏使使鍼御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也受而飲之免使者而復鼓旦而戰見星未已子反命軍吏察夷傷補卒乗繕甲兵展車馬陳也鷄鳴而食唯命是聽晉人患之苗賁皇徇曰蒐乗補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀穀陽豎獻飲于子反子反醉不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰唯命不于常有徳之謂楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也王使止之弗及而卒十七年范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝之又我使我速死無及於難范氏之福也六月戊辰士燮卒晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童曰必先三卻族大多怨去大族不偪敵多怨有庸公曰然十二月壬午長魚矯清沸魋抽戈結祍而偽訟者三卻將謀於榭矯殺駒伯苦成叔於其位温季逃矯及諸其車胥童以甲刼欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在内為軌御姦以徳御軌以刑不施而殺不可謂徳臣偪而不討不可謂刑徳刑不立姦軌並至臣請行遂出奔狄公使辭於二子皆再拜稽首曰君討有罪而免臣於死君之恵也二臣雖死敢忘君徳乃皆歸公使胥童為卿公游于匠麗氏欒書中行偃遂執公焉召士匄士匄辭召韓厥韓厥辭曰昔吾畜於趙氏孟姬之䜛吾能違兵晉討趙氏厥去其兵示不為黨古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也十八年春欒書中行偃使程滑弑厲公葬之于翼東門之外以車一乗使荀罃士魴逆周子于京師而立之衛侯復孫林父衛定公惡孫林父林父奔晉衛侯如晉晉反戚焉十四年衛侯如晉晉侯强其丈見賢徧孫林父焉定公不可衛侯旣歸晉侯使卻犨送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡君其忍之安民而宥宗卿不亦可乎衛侯見而復之八年宋華元來聘伯姬宋華元來聘聘共姬也夏宋公使公孫夀来納幣九年春伯姬歸于宋夏季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不㤀先君以及嗣君施以䜴及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入楚伐莒莒無備而潰晉侯使申公巫臣如吴假道于莒與渠丘公立於池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啟封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也世有思開其封疆者有縱暴者莒人當唯此為命勇夫重直龍閉況國乎九年冬楚子重伐莒圍渠丘渠丘城惡衆潰奔莒楚師圍莒莒城亦惡莒潰楚遂入鄆無備也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫詩曰雖有絲麻無弃菅蒯苦怪雖有姬姜無棄蕉萃凡百君子莫不代匱言備之不可以已也十一年晉敗秦師于麻隧秦晉為成將會于令狐晉侯先至焉秦伯不肯渉河次于王城使史顆盟晉侯于河東晉卻犨盟秦伯于河西范文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成十三年春晉侯使卻錡來乞師三月公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從􅀈王以為介而重賄之公及諸侯朝王遂從劉康公成肅公會晉侯伐秦成子受脈市軫于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰煩戎有受脤神之大節也今成子惰棄其命矣其不反乎夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以㛰姻天禍晉國文公如齊恵公如秦無禄獻公即世穆公不忘舊徳俾我恵公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐患甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦旣報舊徳矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之將致命于秦文公恐懼綏靜諸侯秦師克還無害則是我有大造于西也無禄文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志於我穆襄即世康靈即位康公我之自出又欲闕撅翦我公室傾覆我社稷帥我蝥賊以来蕩揺我邉疆納公子雍我是以有令狐之役康猶不悛入我河曲伐我涑粟川俘我王官翦我覊馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不恵稱尺證盟稱晉望而盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邉陲我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車来命我景公曰吾與女同好弃惡復修舊徳以追念前勲言誓未就景公即世我寡君是以有令狐之㑹君又不祥背弃盟誓白狄及君同州君之仇讐而我昬姻也君来賜命曰吾與女伐狄寡君不敢顧昬姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應應對之應且憎是用告我楚人惡君之二三其徳也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公穆康共楚三王成穆莊曰余雖與晉出入余唯利是視不榖惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聽命唯好是求君若恵顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退承君之意寧静諸侯豈敢徼亂君若不施大恵寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公旣與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍卻錡佐之韓厥將下軍荀罃佐之趙旃將新軍卻至佐之卻毅御戎欒鍼鉗為右孟獻子曰晉帥所類乗和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父成肅公卒于瑕十三年曹負芻殺太子自立麻隧之役曹宣公卒于師曹人使公子負芻守手又使公子欣時逆曹伯之喪秋負芻殺其太子而自立也諸侯請討之晉人以其役之勞請俟他年冬葬宣公子臧欣時將亡國人皆將從之成公懼告罪且請焉乃反而致其邑十五年春㑹于戚討曹成公也執而歸諸京師諸侯將見子臧於王而立之子臧辭曰前志有之曰聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋十六年曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸會矣君唯不遺徳刑以伯諸侯豈獨遺諸敝邑敢私布之秋晉侯謂子臧反吾歸而君子臧反曹伯歸十四年衛孫寗之亂衛侯有疾使孔成子寗恵子立敬姒之子衎以為太子定公卒夫人姜氏旣哭而息見太子之不哀也不内酌飲歎曰是夫也將不唯衛國之敗其必始於未亡人嗚呼天禍衛國也夫我不獲鱄市戀也使主社禝大夫聞之無不聳懼孫文子自是不敢舍其重器於衛盡寘諸戚而甚善晉大夫襄七年衛孫文子来聘公登亦登叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折衡横不順道必毁折十四年衛獻公戒孫文子寗恵子食皆服而朝日旰不召而射食亦鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使文子子公飲之酒使大師歌巧言之卒章無拳無勇職為亂階大師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故欲歌之以怒孫子以報公蒯懼告文子文子曰君忌我矣弗先必死并必政帑奴於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近關出公使子蟜居表子伯子皮與孫子盟于丘宫孫子皆殺之四月公如鄄絹使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒於阿澤初尹公佗徒何學射於庾公差庾公差學射於公孫丁二子追公公孫丁御公子魚庾公差曰射為背師不射為戮射為禮乎射兩軥其俱反軛卷者而還尹公佗曰子為于偽師我則逺矣乃反之公孫丁授公轡而射之貫臂子鮮從公及竟公使祝宗告亾且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷越在他竟若之何不弔以同盟之故使瘠敢私於執事曰有君不弔恤也有臣不敏君不赦宥臣亦不帥職増淫發洩其若之何衞人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼弃之以為君憂君不忘先君之好辱弔羣臣又重恤之謂愍其不逹厚孫歸復命語臧武仲曰衞君其必歸乎有太叔儀以守有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲來寄衞侯及其復也以郲糧歸右宰穀從才用而逃歸衛人將殺之辭曰余不說初矣余狐裘而羔袖乃赦之衞人立公孫剽孫林父甯殖相之以聽命於諸侯臧紇如齊唁衞侯衞侯與之言虐退而告人曰衞侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧孫說謂其人曰衛君必入夫二子者或輓晚之或推之欲無入得乎師曠侍於晉侯晉侯曰衞人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主将安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有貳宗士有朋友庶人工商皂𨽻牧圉皆有親暱以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦箴諫大夫䂓誨士傳言庶人謗商旅于市旅陳其貨示時所尚百工獻藝故夏書曰遒人以木鐸徇于路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從子用其淫而弃天地之性必不然矣晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衞以待時乎二十年衞寗恵子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寗殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒二十五年秋衛獻公入于夷儀冬自夷儀使與寗喜言寗喜許之大叔文子聞之大叔儀曰嗚呼詩所謂我躬不説皇恤我後者寗子可謂不恤其後矣君子之行思其終也思其復也書曰慎始而敬終終以不困詩曰夙夜匪懈以事一人今寗子視君不如奕棋奕圍棋也其何以免乎奕者舉棋不定不勝其耦而況置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉二十六年獻公使子鮮為于偽復辭敬姒强其丈命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾以公命與寗喜言曰茍反政由寗氏祭則寡人寗喜告蘧伯玉伯玉曰瑗于眷不得聞君之出敢聞其入遂行從近闗出告右宰穀右宰穀曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以貳穀曰我請使焉而觀之反曰君淹恤在外十二年矣而無憂色亦無寛言猶夫人也若不已死無日矣悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘於齊孫襄居守二月寗喜右宰穀伐孫氏不克伯國傷孫襄寗子出舍于郊欲奔伯國死國人召寗子寗子復攻孫氏克之殺子叔剽及大子角孫林父以戚如晉甲午衛侯入大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能貳通外内之言以事君臣之罪二也有二罪敢忘其死乃行從近關出公使止之衛人侵戚東鄙孫氏愬于晉晉人為孫氏故召諸侯將以討衛也六月公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十六十井以與孫氏晉人執寗喜北宫遺衛侯如晉晉人執而囚之於士弱氏晉獄官秋齊侯鄭伯為衛侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也國子使晏平仲私於叔向曰晉君宣其明徳於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晉侯晉侯言衞侯之罪使叔向吿二君國子賦轡之柔矣取寛政以安諸侯若柔轡之御馬子展賦將仲子兮晉侯乃許歸衞侯義取衆言可畏言衛侯雖别有罪而衆猶謂為臣執君叔向曰鄭七穆罕氏其後亡者也子展儉而壹冬衛人歸衛姬于晉乃釋衛侯君子是以知平公之失政也二十七年衛寗喜專公患之公孫免餘請殺之公曰微寗子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與預知乃與公孫無地公孫臣謀使攻寗氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寗氏殺寗喜及右宰穀尸諸朝石惡將㑹宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟于河託於木門晉邑不郷衞國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰愬乎吾不可以立於人之朝矣終身不仕公喪之如稅音歳練縗服終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上禄亂也此一乗之邑非四井之邑論語稱千室又云十室明通稱臣弗敢聞且寗子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不貳能賛大事君其命之乃使文子為卿二十八年衛人討寗氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也十五年桓族亂宋秋葬宋共公於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢頼寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師茍獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戌恤在桓氏雖亡必偏魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府出舍于睢上華元止之不可乃反左師二司寇二宰出奔楚華元使向戌為左師老佐為司馬樂裔為司寇以靖國人十八年楚子辛鄭皇辰同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乗戍之而還宋人患之西鉏吾曰何也若楚人與吾同惡以徳於我吾固事之也不敢貳矣大國無厭平鄙我猶憾我事之以我為鄙邑猶不足此吾患也不然而收吾憎使賛其政以間吾釁亦吾患也今將崇諸侯之姦而披普彼其地以塞夷庚夷庚吴晉往来要道逞姦而攜服毒諸侯而懼吴晉吾庸多矣非吾憂也且事晉何為晉必恤之七月宋老佐華喜圍彭城老佐卒焉冬楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉師救宋遇楚師於靡角之谷楚師還畏晉强也晉士魴來乞師季文子問師數於臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之十二月孟獻子㑹于虚朾謀救宋也宋人辭諸侯而請師以圍彭城襄元年春圍宋彭城彭城降晉晉人以宋五大夫在彭城者歸寘諸瓠丘十六年宣伯間魯于晉鄢陵之役郤犨如衞遂如齊皆乞師焉欒黶来乞師戰之日齊國佐髙無咎至于師衞侯出于衞公出于壞隤徒回宣伯通於穆姜成公母欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待于壞隤申宫儆備設守而後行是以後使孟獻子守于公宫宣伯使告郤犨曰魯侯待于壞隤以待勝者郤犨將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公于晉侯㑹于沙隨不見公七月公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食于鄭郊師逆以至聲伯四日不食食使者而後食上音嗣宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也而事晉蔑有貳矣魯不貳小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉郤犨曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大弃魯國而罪寡君也若猶不弃而恵徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讐亡而為讐治之何及郤犨曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而弃忠良若諸侯何子叔嬰齊奉君命無私不受請邑謀國家不貳四日不食以堅事晉圖其身不忘其君若虚其請是弃善人也子其圖之乃許魯平赦季孫冬出叔孫僑如而盟之僑如奔齊季孫及郤犨盟于扈歸刺公子偃不誅鉏偃獨與謀召叔孫豹于齊而立之齊聲孟子靈公母通僑如使立於髙國之間僑如曰不可以再罪奔衞亦間於卿十七年齊國佐殺慶克齊殺國佐齊慶克通于聲孟子與婦人蒙衣亦為婦人服與婦人相冒乗輦而入于閎巷門鮑牽見之以告國武子武子召慶克而謂之慶克告夫人曰國子謪我夫人怒國子相靈公以㑹髙鮑處守髙无咎鮑牽及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之秋七月刖鮑牽而逐髙无咎无咎奔莒髙弱以盧叛弱无咎子齊人來召鮑國而立之初鮑國来為施孝叔臣施氏卜宰匡句其俱須吉以讓鮑國施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑莊子之知不如葵葵猶能衛其足齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛齊侯與之盟于徐闗而復之十二月盧降使國勝告難于晉待命于清勝佐子欲討國佐故使之居外十八年春齊侯使士華免以戈殺國佐于内宫之朝書齊殺其大夫國佐弃命專殺以穀叛也使清人殺國勝國弱來奔慶封為大夫慶佐為司寇封佐克子旣齊侯反國弱使嗣國氏禮也聲伯夢渉洹初聲伯夢渉洹桓或與己瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒楚滅舒庸舒庸人以楚師之敗鄢陵也道吴人圍巢伐駕圍釐虺遂恃吴而不設備楚公子橐師襲舒庸滅之十八年晉立悼公晉欒書中行偃弑厲公使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽盟而入逐不臣者七人厲公嬖臣周子有兄而無慧不能辨菽麥故不可立二月乙酉悼公即位始命百官施舍已責逮鰥寡振廢滯起舊徳匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時不縱欲使魏相息亮士魴魏頡趙武為卿荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為大傅使修范武子之法右行辛為司空使修士蒍之法弁糾欒糾御戎校正主馬官屬焉使訓諸御知義茍賔為右司士車右官屬焉使訓勇力之士時使卿無共御立軍尉以攝之祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄鐸遏寇為上軍尉籍偃為之司馬使訓卒乗親以聽命程鄭為乗馬御六騶屬焉使訓羣騶知禮乗馬御乗馬之僕六騶六閑之騶周禮諸侯有六閑乗車尚禮容故訓羣騶使知禮凡六官之長皆民譽也舉不失職官不易方爵不踰徳師不陵正旅不偪師正軍将命卿也師二千五百人之帥旅五百人之帥民無謗言所以復霸也襄公二年齊滅萊齊侯伐萊萊人使正輿子賂夙沙衛以索所白切簡也馬牛皆百匹齊師乃還君子是以知靈公之為靈也夏齊姜薨初穆姜使擇美檟以自為櫬與頌琴雅琴送喪物季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉詩曰其惟哲人告之話言順徳之行季孫於是為不哲矣且姜氏君之妣也詩曰為酒為醴烝畀祖妣以洽百禮降福孔偕齊侯使諸姜宗婦來送葬召萊子萊子不㑹故晏弱城東陽以偪之六年齊侯滅萊萊恃謀也賂夙沙衛之謀晉和戎服鄭鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任壬寡人也若背之是弃力與言言盟誓其誰暱我免寡人唯二三子秋鄭伯睔卒於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改會于戚謀鄭故也孟獻子請城虎牢以偪鄭知武子曰善冬復㑹于戚遂城虎牢鄭人乃成四年無終子嘉父使孟樂如晉晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我徳則睦否則攜貳勞師于戎而楚伐陳必弗能救是弃陳也諸華必叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸弃武羅伯因熊髠尨圉而用寒浞仕角寒浞伯明氏伯明氏寒君之讒子弟也伯明后寒弃之夷羿收之夷氏信而使之以為已相浞行媚于内而施賂于外愚弄其民而虞羿虞樂之于田樹之詐慝以取其國家外内咸服羿猶不悛將歸自田家衆亨之以食似其子其子不忍食諸死于窮門靡夏遺臣奔有鬲氏浞因羿室生澆五弔及豷許器恃其讒慝詐偽而不徳于民使澆用師滅斟灌及斟尋氏處澆于過古禾處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼直吕反少康子滅豷于戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官箴王闕於虞人之箴曰芒芒禹迹畫為九州經啓九道九州之道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒于原獸亡其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞箴如是可不懲乎於是晉侯好田故魏絳及之公曰然則莫如和戎乎對曰和戎有五利戎狄荐居聚居貴貨易土土可賈古焉一也邉鄙不聳民狎其野穯人成功二也戎狄事晉四鄰振動諸侯威懷三也以徳綏戎師徒不勤甲兵不頓四也鍳于后羿而用徳度逺至邇安五也君其圖之公說使魏絳盟諸戎修民事田以時八年鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文徳而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒曰爾何知國有大命而有正卿童子言焉將為戮矣冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜居交子展欲待晉子駟曰周詩有之曰俟河之清人夀幾何兆云詢多職競作羅兆卜詢謀也職主也言旣卜且謀多則競作羅網之難無功謀之多族民之多違事滋無成民急矣姑從楚以舒吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟以待彊者而庇民焉寇不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信三年㑹雞澤五年戚又城棣七年鄬八年邢丘今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不弃鄭楚師遼逺糧食將盡必將速歸何患焉舎之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道匪彼也請從楚騑也受其咎乃及楚平使王子伯駢告于晉知武子使行人子貟對曰君有楚命亦不使一介行李行人也告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見賢徧于城下唯君圖之晉范宣子來聘告將用師于鄭公享之宣子賦摽有梅詩人以興女色盛則衰衆士宜及時求之宣子欲魯及時討鄭季武子曰誰敢哉寡君在君君之臭味也歡以承命何時之有武子賦角弓兄弟昬姻無胥逺矣賔將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍於用受彤弓于襄王以為子孫藏匄也先君守官之嗣也敢不承命九年冬諸侯伐鄭師于氾令於諸侯曰修器備盛成餱糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾魚廢切息也君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月同盟于戲許宜鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輙公孫蠆公孫舍之及其大夫門子皆從鄭伯門子卿適子晉士莊子為載書曰自今日旣盟之後鄭國而不唯晉命是聽或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加徳音而亂以要之使鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘委頓貌無所厎旨告自今日旣盟之後鄭國而不唯有禮與强可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不徳而要人以盟豈禮也哉非禮何以主盟姑盟而退修徳息師而來終必獲鄭何必今日我之不徳民將弃我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還晉人不得志於鄭以諸侯復伐之公送晉侯晉侯以公宴于河上問公年季武子對曰㑹于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也嵗星十二嵗一周矣國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之祼灌鬯酒享祀先君以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟楚子伐鄭子駟将及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯强是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更不用牲賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭十年師牛首十一年師向其秋伐鄭自是鄭服十年六月楚子囊鄭子耳伐宋師于訾子斯毋無衛侯救宋子展曰必伐衛不然是不與楚也子駟曰國病矣子展曰得罪於二大國必亡病不猶愈于亡乎諸大夫皆以為然故鄭皇耳帥師侵衛孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦寇之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘九月諸侯伐鄭己酉師于牛首城虎牢而戍之晉師城梧及制士魴魏絳戍之鄭及晉平楚子囊救鄭十一月諸侯之師還本作環鄭而南至于陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也我將獨進師遂進與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我不如從楚亦以退之宵渉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還丁未諸侯之師還侵鄭北鄙而歸楚人亦還十一年鄭人患晉楚之故諸大夫曰不從晉國㡬亡楚弱于晉晉不吾疾也晉疾楚將辟之何為而使晉師致死于我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆埸之司惡於宋宋向戍侵鄭大獲子展曰師而伐宋可矣夏子展侵宋諸侯伐鄭師于向鄭人懼乃行成秋同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無貳乎乃盟載書曰凡我同盟毋蕰年積嵗不分毋壅利毋保姦毋留慝救災患恤禍亂同好惡奨王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亾氏踣蒲北其國家楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之遂伐宋九月諸侯悉師以復伐鄭鄭人使良霄太宰石㚟如楚告将服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵于鄭東門鄭人使王子伯駢行成十二月㑹于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠鄭人賂晉侯以師悝苦回師觸師蠲廣車軘豚車兵車淳十五乗淳偶也甲兵備凡兵車百乗歌鍾二肆肆列也縣鍾十六為一肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦樂只君子福禄攸同便蕃左右亦是帥從夫樂以安徳義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福禄來逺人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑微子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳於是始有金石之樂禮也十二年楚子嚢秦庶長無地伐宋以報晉之取鄭也十三年冬鄭良霄石㚟猶在楚石㚟言于子囊曰先王卜征五年而嵗習其祥祥習則行不習則增修徳而改卜今楚實不競行人何罪止鄭一卿以除其偪使睦而疾楚以固於晉焉用之使歸而廢其使上史下所吏反行而見執於楚鄭又遂堅事晉是鄭廢本見使之意怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之三年楚伐吴所獲不如所亡楚子重伐吴為簡之師簡選練克鳩兹至于衡山使鄧廖力彫帥組甲漆甲為組文三百被練練袍三千以侵吳吴人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸吴人取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡子重病之遇心疾而卒魯襄公始朝晉公如晉始朝也盟于長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表宻邇仇讎寡君將君是望敢不稽首祁奚請老祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可於是羊舌職死矣晉侯曰孰可以代之對曰赤也可職子於是使祁午為中軍尉羊舌赤佐之君子謂祁奚於是能舉善矣稱其讎不為謟立其子不為比舉其偏屬也不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類詩云惟其有之是以似之祁奚有焉陳服于晉六月公㑹單頃公及諸侯己未同盟于雞澤楚子辛為令尹侵欲於小國陳成公使袁僑如㑹求成叔孫豹及諸侯之大夫及陳袁僑盟楚司馬公子何忌侵陳陳叛故也四年春楚師猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉三月陳成公卒楚人將伐陳聞喪乃止陳人不聽命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎況小乎五年楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之君子謂楚共王於是不刑詩曰周道挺挺我心扃扃工逈切明察貌講事不令集人來定已則無信而殺人以逞不亦難乎伐宋封魚石背盟敗鄢陵殺子反公子申及壬夫欲以屬諸侯夏書曰成允成功楚子囊為令尹范宣子曰我喪陳矣楚人討貳而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊伐陳十一月甲午㑹于城棣以救之七年楚子囊圍陳㑹于鄬于軌以救之陳人患楚慶虎慶寅謂楚人曰吾使公子黄往而執之楚人從之二慶使告陳侯于㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸魏絳戮揚干之僕雞澤之㑹晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無貳志事君不辟難有罪不逃刑其將来辭何辱命焉言終魏絳至授僕人書曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司寇公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請晉侯以魏絳為能以刑佐民矣反役與之禮食似使佐新軍四年穆叔如晉穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子貟云問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君敎使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜魯始髽冬邾人莒人伐鄫臧紇恨發救鄫侵邾敗於狐駘臺國人逆喪者皆髽魯於是乎始髽髽麻髮合髻也将遭喪者多不能備凶服髽而已國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾五年季文子卒季文子卒大夫入斂公在位宰庀具也家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積子賜可不謂忠乎七年三卜郊不從免牲夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今旣耕而卜郊冝其不從也晉韓獻子請老晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露又曰弗躬弗親庶民弗信無忌不才讓其可乎請立起也與田蘇㳺而曰好仁詩曰靖共爾位好是正直神之聽之介爾景福恤民為徳正直為正正曲為直參和為仁如是則神聽之介福降之立之不亦可乎使宣子朝遂老晉侯謂韓無忌仁使掌公族大夫九年宋災春宋災樂喜為司城以為政備火之政使伯氏司里火所未至徹小屋塗大屋陳畚草器挶菊音土轝具綆缶汲索汲器備水器量輕重蓄水潦積土塗廵丈城繕守備表火道使華臣具正徒役徒令隧正納郊保奔火所納聚郊野保守之民令救火使華閱討右官官庀其司討治也令右師具官屬向戌討左亦如之使樂遄庀刑器刑書亦如之使皇鄖云命校正出馬工正出車備甲兵庀武守使西鉏吾魚庀府守府六官之典令司宫巷伯警宫二師左右令四鄉正敬享祝宗用馬于四墉城積隂故祀之祀盤庚于西門之外晉侯問于士弱曰宋災於是乎知有天道何故對曰古之火正或食於心或食於咮竹又以出内火是故咮為鶉火心為大火謂火正之官配食於火星建辰月鶉火星昬在南方則令民放火建戍月大火星伏在日下夜不得見故令民内火禁放火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火代閼伯居商丘商人閱其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也穆姜薨於東宫穆姜薨於東宫始往而筮之遇艮之八艮下艮上史曰是謂艮之隨震下兊上隨其出也君必速出姜曰亡是於周易曰隨元亨利貞无咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利弃位而姣不可謂貞有四徳者隨而无咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣秦景公乞師于楚以伐晉秦景公使士雃牽乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選息戀官不易方其卿讓於善其大夫不失守其士競於教其庶人力於農穡商工皁𨽻不知遷業韓厥老矣知罃稟焉以為政范匄少於中行偃而上之使佐中軍韓起少於欒黶乙斬而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾旣許之矣雖不及晉必將出師秋楚子師于武城以為秦援秦人侵晉晉饑弗能報也十年荀罃伐秦報其侵也十年公㑹吴于柤春㑹于柤㑹吴子壽夢也齊髙厚相太子光以先㑹諸侯于鍾離不敬士莊子曰髙子相大子以㑹諸侯將社稷是衛而皆不敬弃社稷也其將不免乎晉滅偪陽晉荀偃士匄請伐偪陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請圍之弗克偪陽人啓門諸侯之士門焉縣門發郰側留人紇恨發抉烏穴反之以出門者門者諸侯之士在門内者紇多力抉舉縣門以出之狄虒彌建大車之輪而蒙之以甲以為櫓大楯左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也主人縣布秦堇謹父登之及堞而絶之隊則又縣之蘇而復上者三主人辭焉乃退帶其斷以徇於軍三日諸侯之師久於偪陽荀偃士匄請班師知伯怒投之以机出於其間曰女成二事而後告予予恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任壬乎七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親受矢石甲午滅之以與向戍向戌辭曰君若猶辱鎮撫宋國而以偪陽光啓寡君羣臣安矣其何貺如之若專賜臣是臣興諸侯以自封也其何罪大焉乃予宋公宋公享晉侯於楚丘請以桑林殷天子之樂名荀罃辭荀偃士匄曰諸侯宋魯於是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎舞師題以旌夏大旌也題識以大旌表識行列晉侯懼而退入于房去旌卒享而還及著雍於用疾卜桑林見荀偃士匄欲奔請禱焉荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之晉侯有間以偪陽子歸獻於武宫謂之夷俘諱俘中國故謂之夷師歸孟獻子以秦堇父為右生秦丕兹事仲尼盜殺鄭執政秋楚子囊鄭子耳侵我西鄙還圍蕭九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競已甚周猶不堪競況鄭乎有災其執政之三士乎簡孤幼故諸侯伐鄭師于牛首初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵賭氏侯氏子師氏皆喪田焉故五族作亂於是子駟當國子國為司馬子耳為司空子孔為司徒冬尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宫之朝殺子駟子國子耳劫鄭伯以如北宫子孔知之故不死子西子駟子聞盜不儆而出尸而追盜盜入于北宫乃歸授甲臣妾多逃器用多喪子産聞盜子國子為門者置守門庀羣司閉府庫慎閉藏昨浪完守備成列而後出兵車十七乗尸而攻盜於北宫子蟜帥國人助之殺尉止子師僕侯晉奔晉堵女父司臣尉翩司齊臣子奔宋子孔當國為載書以位序聽政辟各守位職以受法不得與朝政大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定十五年鄭餘盜在宋鄭人以子西伯有子産之故納賂於宋以馬四十乗與師茷扶廢師慧樂師公孫黒為質焉司城子罕以堵女父尉翩司齊與之良司臣而逸之託諸季武子武子寘諸卞鄭人醢之三人也師慧過宋朝將私焉其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乗之相易淫樂之矇易以䜴反言不為子産殺三盜得賂而歸之是重淫樂輕國相子罕聞之固請而歸之十八年鄭子孔欲去諸大夫將叛晉而起楚師以去之子庚帥師治兵于汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭門于純門信于城下而還十九年鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守子展子西率國人伐之殺子孔而分其室子然子革父子孔宋子之子也士子孔子良父圭媯之子也圭媯之班亞宋子而相親也士子孔亦相親也子然士子孔卒司徒孔實相息亮子革子良之室三室如一故及於難子革子良出奔楚子革為右尹鄭使子展當國子西聽政立子産為卿王叔陳生與伯輿爭政王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔晉侯使士匄平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄於王庭士匄聽之王叔之宰曰篳門圭竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從􅀈王牲用備具王頼之而賜之騂息營旄之盟赤牛曰世世無失職若篳門圭竇其能來東底乎且王何頼焉今自王叔之相也政以賄成而刑放於寵寵臣專刑不任法官之師旅不勝其富吾能無篳門圭竇乎唯大國圖之范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉單靖公為卿士以相王室十一年季武子作三軍季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乗季氏使其乗之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟取其子弟之半四分其乗之人而取其一叔孫氏使盡為臣盡取子弟以父兄歸公不然不舍不如是三家不舍其故而改作此盟詛之本言昭四年叔孫穆子卒季孫謀去中軍五年春舍中軍卑公室也季孫稱左師孟氏稱右師叔孫自以叔孫為名毁中軍于施氏成諸臧氏季氏不欲親議勑二家發之又取其令名也初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜洩告于殯曰子固欲毁中軍旣毁之矣敢告杜洩曰夫子唯不欲毁也故盟諸僖閎詛諸五父甫之衢受其書而投之帥士而哭之十二年吴子壽夢卒吴子壽夢卒臨於周廟文王廟禮也凡諸侯之喪異姓臨於外於城外向其國同姓於宗廟所出王同宗於祖廟始封同族於禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟靈王求后于齊靈王求后於齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昬王使隂里結之十四年王使劉定公賜齊侯命曰昔伯舅太公右我先王股肱周室師保萬民世胙大師以表東海王室之不壞繄伯舅是頼今余命汝環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命十五年官師從單靖公逆王后于齊十三年晉侯蒐于緜上荀罃士魴卒晉侯蒐于緜上以治兵使士匄將中軍辭曰伯游長荀偃昔臣習於知伯是以佐之非能賢也請從伯游荀偃將中軍士匄佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乗官屬以從於下軍禮也晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世頼之刑善也夫一人刑善百姓休和可不務乎書曰一人有慶兆民頼之其寧唯永其是之謂乎周之興也其詩曰儀刑文王萬邦作孚言刑善也及其衰也其詩曰大夫不均我從事獨賢言不讓也世之治也君子尚能而讓其下小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿徳及其亂也君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐並生由爭善也謂之昬徳國家之敝恒必由之楚共王卒楚子疾告大夫曰不穀不徳少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不徳而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以沒於地唯是春秋窀穸之事春秋謂祭祀窀穸謂葬埋所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之子囊卒十四年楚子囊卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘増其名諡共將死不㤀衛社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也吴侵楚楚敗吴師吴侵楚養由基奔命子庚以師繼之養叔曰吴乗我喪謂我不能師也必易我而不戒子為三覆以待我覆扶又反我請誘之子庚從之戰于庸浦大敗吴師獲公子黨君子以吴為不弔詩曰不弔昊天亂靡有定十四年吴告敗于晉㑹于向為吴謀楚也范宣子數吴之不徳以退吴喪人伐楚故十四年子叔齊子為季武子介自是晉敬魯使春㑹于向將執戎子駒支范宣子親數諸朝曰來姜戎氏昔秦人迫逐乃祖吾離于𤓰古華州乃祖吾離被苫或占蓋戸臘切苫别名爾雅白盖曰苫蒙荆棘以來歸我先君我先君恵公有不腆之田與女剖分而食之中分曰剖今諸侯之事我寡君不如昔者盖言語漏泄則職女之由詰朝之事爾無與焉與預音上同將執女對曰昔秦人負恃其衆貪于土地逐我諸戎恵公蠲其大徳謂我諸戎是四嶽之裔胄也毋是翦弃賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不貳昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣蒲北之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逷它厯今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不逹何惡之能為不與於㑹亦無瞢莫贈焉賦青蠅而退宣子辭焉使即事于㑹成愷悌也於是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使吴公子光之亂吴子諸樊旣除喪將立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之以成曹君君子曰能守節君義嗣也誰敢奸君有國非吾節也札雖不才願附於子臧以無失節固立之弃其室而耕乃舎之二十五年吴子諸樊伐楚門于巢卒二十九年吴人伐越獲俘焉以為閽使守舟吴子餘祭觀舟閽弑之三十一年吴子使屈狐庸聘于晉趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吴天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚徳而度徳不失民度不失事民親而事有序其天所啟也有吴國者必此君之子孫實終之季子守節者也雖有國不立昭十五年吴子夷末卒二十年楚伍貟如吴言伐楚之利於州于王僚公子光曰是宗為戮而欲反其讎不可從也貟曰彼將有他志余姑為之求士而鄙以待之乃見賢徧鱄設諸焉而耕於鄙二十六年楚平王卒二十七年吴子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛僚母弟使延州來季子聘于上國遂聘于晉以觀諸侯楚莠尹然工尹麇九倫帥師救濳左司馬沈尹戌帥都君子都邑之士有復除者與王馬之屬校人以濟師與吴師遇于窮左尹卻宛工尹夀帥師至于潛吴師不能退吴公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弑也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門階尸席皆王親也夾之以鈹説文劍也羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入于堀室鱄設諸寘劍於魚中以進抽劍刺王鈹交於胷遂弑王闔廬以其子為卿季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待晉伐秦遷延之役夏諸侯之大夫從晉侯伐秦及涇不濟叔向見叔孫穆子穆子賦匏有苦葉志在必濟叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子説二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死子蟜帥鄭師以進師皆從之至于棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役師歸晉侯舍新軍禮也成國不過半天子之軍周為六軍諸侯之大者三軍可也於是知朔生盈而死盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舍之十九年四月鄭公孫蠆卒范宣子言於晉侯以其善於伐秦也六月晉侯請于王王追賜之大路使以行禮也晉盡殺欒氏之族黨此役也欒鍼鉗曰役又無功晉之恥也吾有二位於戎路黶弟二位謂黶將下軍鍼戎右敢不恥乎與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦秦伯問曰晉大夫其誰先亡對曰其欒氏乎欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之徳在民如周人之思召公焉愛其甘棠況其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實章将於是乎在秦伯以為知言為之請於晉而復之二十一年初欒桓子娶於范宣子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒欒祁盈母宣子女堯後祁姓與其老州賓通幾亡室矣懷子患之祁懼其討也愬諸宣子曰盈將為亂以范氏為死桓主欒黶而專政矣范鞅為之徵懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著直據而遂逐之秋欒盈出奔楚冬㑹于商任錮欒氏也二十二年秋欒盈自楚適齊冬㑹于沙隨復錮欒氏也二十三年晉侯將嫁女于吴齊侯使析歸父媵之以藩載欒盈及其士藩車有障蔽者納諸曲沃欒盈夜見胥午而告之午伏之而觴曲沃人樂作午曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何貳之有盈出徧拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣旣有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可彊取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫宫有臺觀守備者范鞅逆魏舒則成列旣乗將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乗持帶驂乗必持帶恐隋隊遂超乗右撫劔左援帶命驅之出宣子逆諸階執其手賂之以曲沃初斐豹𨽻也著於丹書罪沒為官奴欒氏之力臣曰督戎國人懼之斐豹曰茍焚丹書我殺督戎宣子喜曰而殺之所不請焚丹書者有如日乃出豹而閉之督戎從之踰隱短墻而待之督戎踰入豹自後擊而殺之欒氏乗公門宣子謂鞅曰矢及君屋死之鞅用劔以帥卒欒氏退攝車從之欒盈奔曲沃晉人圍之冬十月晉人克欒盈于曲沃盡殺欒氏之族黨吴敗楚歸師楚子為庸浦之役故前年子囊師于棠以伐吴吴不出而還子囊殿以吴為不能而弗儆吴人自臯舟之隘要而擊之楚人不能救吴人敗之獲公子宜穀溴梁之㑹冬㑹于戚范宣子假羽毛於齊而弗歸齊人始貳十五年夏齊人圍成貳於晉故也十六年晉平公即位改服修官烝于曲沃警守而下㑹于溴古閴梁命歸侵田晉侯與諸侯宴于温使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戍衛寗殖鄭公孫蠆小邾之大夫盟曰同討不庭秋齊師圍郕孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之閒平恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰匄在此敢使魯無鳩乎十七年齊人以其未得志於我故秋伐我北鄙圍桃髙厚圍防齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉古穴其傷而死十八年秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首隊於前跪其委而戴之奉芳勇之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東方則可以逞獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二㲄而禱沈音鴆玉而濟冬㑹于魯濟尋溴梁之言同伐齊齊侯禦諸平陰登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳直覲之輿曵柴而從之齊侯見之畏其衆也乃脱歸齊師夜遁十一月丁卯朔入平陰遂從齊師夙沙衛連大車以塞隊而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射食亦殖綽中肩自後縛之其右具丙亦舍兵而縛郭最皆衿其鴆甲面縛坐于中軍之皷下晉人欲逐歸者魯衛請攻險己夘荀偃士匄以中軍克京兹乙酉魏絳欒盈以下軍克邿詩趙武韓起以上軍圍盧范鞅門于雍門其御追喜以戈殺犬于門中孟荘子斬其槆勑倫反木名以為公琴州綽門于東閭左驂迫還旋于門中以枚數闔齊侯駕將走郵棠大子與郭榮扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕遣政輕則失衆君必待之將犯之大子抽劒斷鞅乃止鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹冝告子庚曰國人謂不穀主社稷而不出師死不從禮不穀即位於今五年人其以不穀為自逸而忘先君之業矣大夫圗之子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭門于純門信于城下而還渉于魚齒山名之下甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競歌者吹律以詠八風南風音微故曰不競多死聲楚必無功董叔曰天道多在西北南師不時必無功嵗在豕韋月又建亥故在西北叔向曰在其君之徳也十九年春諸侯盟于督揚曰大毋侵小晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服賄荀偃束錦加璧乗馬五匹為束四匹為乗先悉薦吴壽夢之鼎荀偃癉丁但疽生瘍扵頭濟河及著雍於用病目出大夫先歸者皆反士匄請見去弗内請後曰鄭甥可二月甲寅卒而視不可含宣子盥而撫之曰事吴敢不如事主猶視欒懷子曰其為未卒事於齊故也乎復撫之曰主茍終所不嗣事于齊者有如河乃瞑受含宣子出曰吾淺之為丈夫也季武子如晉拜師晉侯享之范宣子為政賦黍苗季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月季武子以所得於齊之兵作林鍾而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令徳諸侯言時計功舉得時動有功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彞器銘其功烈以示子孫昭明徳而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也夏五月齊靈公卒晉士匄侵齊及穀聞喪而還禮也冬齊及晉平故穆叔㑹范宣子于柯穆叔見叔向賦載馳之四章控于大邦誰因誰極叔向曰肸敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城二十年夏盟于澶淵齊成故也二十一年晉欒盈出奔楚知起中行喜州綽邢蒯出奔齊皆欒氏之黨也齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之役先二子鳴荘公為勇爵以位命勇士殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數其可以與於此乎公曰子為晉君也對曰臣為𨽻新然二子者譬於禽獸臣食其肉而寢處其皮矣言射得之十五年宋向戌尤孟獻子之室宋向戌來聘見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢閒楚能官人楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子橐師為右司馬公子成為左司馬屈居勿到為莫敖公子追舒為箴尹屈蕩為連尹養由基為宫廏尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懷人寘彼周行能官人也王及公侯伯子男甸采衛大夫各居其列所謂周行也宋子罕弗受獻玉宋人或得玉獻諸子罕子罕弗受獻玉者曰玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越郷納此以請死也子罕寘諸其里使玉人為于偽之攻之富而後使復其所春秋左氏傳事類始末卷二
