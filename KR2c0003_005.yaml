body:
  text: 春秋左氏傳事類始末卷五宋章冲撰定公二年邾莊公卞急而好潔邾莊公與夷射姑飲酒私出亡酒閽乞肉焉奪之杖以敲之三年二月辛卯邾子在門臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于牀廢于爐炭爛遂卒先葬以車五乘殉五人欲藏中潔故先車乘别為便房蓋其遺命莊公卞急而好潔故及是四年劉文公合諸侯于召陵長衛侯於盟劉文公合諸侯于召陵謀伐楚也將㑹衛子行敬子言于靈公曰㑹同難嘖有煩言莫之治也其使祝他從公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行祓社釁鼓祝奉以從於是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及皋鼬將長蔡於衛衛侯使祝他私於萇宏曰聞諸道路不知信否若聞蔡將先衛信乎萇宏曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旗夏后氏之璜黃封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命于周是使之職事于魯以昭周公之明德分之土田陪倍也敦厚也祝宗卜史備物典策官司彛器因商奄之民命以伯禽而封於少皡之虛分康叔以大路少帛雜帛綪茷步貝旃旌綪茷大赤取染草名大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以會王之東搜湯沐邑聃季授土陶叔授民命以康誥而封於殷虛皆啓以商政疆以周索分唐叔以大路密須國名之鼓闕鞏沽洗懷姓九宗唐之餘民九宗一姓職官五正命以唐誥而封於夏虛啓以夏政疆以戎索三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎閒王室王於是乎殺管叔而蔡蔡叔以車七乘徒七十人其子蔡仲改行帥德周公舉之以為已卿士見諸王而命之以蔡其命書云無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為大宰康叔為司寇聃季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其德將如之何萇宏說告劉子與范獻子謀之乃長衛侯於盟鄭子大叔卒反自召陵鄭子大叔未至而卒晉趙簡子為之臨甚哀曰黃父之會夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復扶又怒無謀非德無犯非義五年魯陽虎之亂季平子行東野還未至卒于房陽虎將以璵璠斂仲梁懷弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既葬桓子行東野及費子泄為費宰逆勞於郊桓子敬之勞仲梁懷仲梁懷弗敬子泄怒謂陽虎子行之乎九月陽虎囚季桓子及公父文伯而逐仲梁懷冬十月殺公何藐盟桓子於稷門之內庚寅大詛逐公父歜及秦遄皆奔齊六年二月公侵鄭往不假道於衛及還陽虎使季孟自南門入出自東門舍於豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎大姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止夏季桓子如晉陽虎強使孟懿子往晉人兼享之孟孫立於房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故強為之請以取入焉七年齊人歸鄆陽關陽虎居之以為政八年季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛卯禘於僖公壬辰將享季氏于蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後桓子曰何後之有而能以我適孟氏乎孟氏選圉人之壯者築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門陽虎劫公與武叔以伐孟氏公斂處父帥成人與陽氏戰于南門之內弗勝又戰于棘下陽氏敗陽虎說甲如公宫取寶玉大弓以出舍于五父之衢公斂陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之陽虎入于歡陽關以叛九年夏陽虎歸寶玉大弓六月伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天災若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之陽虎願東乃囚諸西鄙載葱靈而逃追而得之囚於齊又以葱靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎八年定公侵齊門于陽州公侵齊門于陽州士皆坐列曰顔髙之弓六鈞皆取而傳觀之顔息射人中眉退曰我無勇吾志其目也師退冉猛僞傷足而先其兄會乃呼曰猛也殿苫越生子將待事而名之陽州之役獲焉名之曰陽州魯始尚羔齊國夏髙張伐我西鄙晉士鞅趙鞅荀寅救我公會晉師于瓦范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔衛叛晉齊侯鄭伯盟于鹹徴會于衛衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟于瑣七年晉師將盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者涉他成何曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將歃涉他捘衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子厚與大夫之子為質大夫曰茍有益也公子則往羣臣之子敢不皆負羈絏以從將行王孫賈曰茍衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅會成桓公侵鄭遂侵衛九年秋齊侯伐晉夷儀敝無存之父將室之辭以與其弟曰此役也不死反必娶於髙國先登求自門出死於霤下東郭書讓登犂彌從之曰子讓而左我讓而右使登者絶而後下書左彌先下晉車千乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛禇師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏於衛齊侯賞犂彌辭曰有先登者臣從之晳幘而衣貍製公使視東郭書曰乃夫子也吾貺子公賞東郭書辭曰彼賔旅也乃賞犂彌齊師之在夷儀也齊侯謂夷儀人曰得敝無存者以五家免乃得其尸公三襚之與之犀軒與直蓋而先歸之坐引者以師哭之親推之三十年晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午於寒氏城其西北而守之宵熸及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役涉他曰夫子則勇矣然我往必不敢啓門亦以徒七十人旦門焉步左右皆至而立如植日中不啓門乃退反役晉人討衛之叛故曰由涉他成何於是執涉他以求成於衛衛人弗許晉人遂殺涉他成何奔燕君子曰此之謂棄禮必不鈞詩曰人而無禮胡不遄死涉他亦遄矣哉十三年齊侯衛侯次于垂葭使師伐晉將濟河諸大夫皆曰不可邴意兹曰可鋭師伐河內傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河內齊侯皆斂諸大夫之軒唯邴意兹乘軒鄭駟歂用鄧析竹刑鄭駟歂嗣子大叔為政九年駟歂殺鄧析而用其竹刑君子謂子然於是不忠茍有可以加於國家者棄其邪可也靜女之三章取彤管焉竿旄何以告之取其忠也故用其道不棄其人詩云蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其樹況用其道而不恤其人乎子然無以勸能矣十年齊人歸鄆歡龜隂之田春及齊平夏公會齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享齊人來歸鄆歡龜隂之田宋寵向魋宋公子地嬖蘧富獵十一分其室而以其五與之公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子公子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也吾以國人出君誰與處冬母弟辰暨仲他石彄出奔陳十一年春入于蕭以叛秋樂大心從之大為宋患寵向魋故也十二年衛公孟彄伐曹衛公孟彄伐曹克郊還滑羅殿未出不退於列其御曰殿而在列其為無勇乎羅曰與其素厲寧為無勇魯墮三都仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句劬須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公斂處父謂孟孫墮成齊人必至北門且成孟氏之保障也無成是無孟氏也子僞不知我將不墮冬公圍成弗克十三年衛逐公叔氏初衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戍必與焉及文子卒衛侯始惡於公叔戍以其富也公叔戍又將去夫人之黨夫人訴之曰戍將為亂十四年春衛侯逐公叔戍與其黨故趙陽奔宋戍來奔十四年衛蒯聵輒爭國衛侯為夫人南子召宋朝太子蒯瞶獻盂于齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯瞶將殺余公執其手以登臺太子奔宋盡逐其黨太子告人曰戲陽速禍余戲陽速曰太子則禍余太子無道使余殺其母余不許將戕於余若殺夫人將以余說余是故許而弗為以紓余死諺曰民保於信吾以信義也哀二年初衛侯逰于郊子南僕公曰余無子將立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祗辱夏靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒六月晉趙鞅納衛太子于戚使太子絻八人衰絰僞自衛逆者告於門哭而入遂居之三年齊國夏衛石曼姑帥師圍戚十二年公㑹吳于橐皋吳徴㑹于衛初衛殺吳行人且姚而懼謀於行人子羽子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道國無道必弃疾於人往也長木之斃無不摽也國狗之瘈無不噬也而況大國乎秋衛侯㑹吳于鄖吳人藩衛侯之舍子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衛而藩其君舍以難之子盍見大宰乃請束錦以行語及衛故大宰嚭曰寡君願事衛君衛君之來也緩故將止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也且合諸侯而執衛君誰敢不懼墮黨崇讎而懼諸侯或者難以霸乎大宰嚭說乃舍衛侯衛侯歸效夷言子之尚幼曰君必不免其死於夷乎執焉而又說其言從之固矣十五年衛孔圉娶太子蒯聵之姊生悝孔氏之豎渾良夫長而美孔文子卒通於內太子在戚孔姬使之焉太子與之言曰茍使我入獲國服冕乘軒三死無與與之盟為請於伯姬閏月良夫與太子入昏二人蒙衣而乘寺人羅御如孔氏孔伯姬杖戈而先太子與五人介輿豭從之迫孔悝於厠強盟之遂劫以登臺欒寧將飲酒炙未熟聞亂使告季子召獲駕乘車行爵食炙奉衛侯輒來奔季子將入遇子羔將出曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出子路入及門公孫敢門焉曰無入為也季子曰是公孫也求利焉而逃其難由不然利其祿必救其患有使者出乃入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣孔悝立莊公莊公害故政欲盡去之先謂司徒瞞成曰寡人離病於外久矣子請亦嘗之歸告褚師比欲與之伐公不果十六年春瞞成褚師比出奔宋衛侯使鄢武子告於周曰蒯聵得罪於君父君母逋竄於晉晉以王室之故不棄兄弟置諸河上天誘其衷獲嗣守封焉使下臣肸敢告執事王使單平公對曰肸以嘉命來告余一人往謂叔父余嘉乃成世復爾祿次敬之哉方天之休弗敬弗休悔其可追六月衛侯飲孔悝酒於平陽重酬之大夫皆有納焉醉而送之夜半而遣之載伯姬於平陽而行出奔宋衛侯占夢嬖人求酒於大叔僖子不得與卜人比而告公曰君有大臣在西南隅弗去懼害乃逐大叔遺衛侯謂渾良夫曰吾繼先君而不得其器若之何良夫代執火者而言曰疾與亡君皆君之子也召之而擇材焉可也若不材器可得也豎告太子太子劫公而強盟之且請殺良夫公曰其盟免三死曰請三之後有罪殺之公曰諾哉十七年衛侯為虎幄於籍圃成求令名者而與之始食焉太子請使良夫良夫乘衷甸兩牡紫衣狐裘至袒裘不釋劒而食大子使牽以退數之以三罪而殺之晉趙鞅使告於衛曰君之在晉也志父為主請君若太子來以免志父衛侯辭以難太子又使㭬之夏趙鞅圍衛齊國觀陳瓘救衛簡子曰我卜伐衛未卜與齊戰乃還秋衛侯夢於北宫見人登昆吾之觀被髮北靣而譟曰登此昆吾之虛綿綿生之瓜余為渾良夫呌天無辜衛侯貞卜其繇曰如魚竀尾衡流而方蒲郎羊裔焉大國滅之將亡闔門塞竇乃自後踰冬十月晉復伐衛入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入般師出初公登城以望見戎州戎邑問之以告公曰我姬姓也何戎之有焉翦之公使匠久公欲逐石圃未及而難作辛已石圃因匠氏攻公公闔門而請弗許踰於北方而隊折股戎州人攻之公入於戎州已氏初公自城上見已氏之妻髮美使髠之以為吕姜髢既入焉而示之璧曰活我吾與女璧已氏曰殺女璧其焉往遂殺之而取其璧衛人復公孫般師而立之十二月齊人伐衛衛人請平立公子起執般師以歸十八年夏衛石圃逐其君起起奔齊衛侯輒自齊復歸逐石圃而復石魋與大叔遺二十五年五月衛侯出奔宋衛侯為靈臺於藉圃與諸大夫飲酒焉褚師聲子襪而登席公怒辭曰臣有疾異於人若見之君將殼之是以不敢公愈怒大夫辭之不可褚師出與司寇亥乘曰今日幸而後亡公之入也奪南氏邑而奪司寇亥政公使侍人納公文懿子之車於池初衛人翦夏丁氏以其帑賜彭封彌子彌子飲公酒納夏戊之女嬖以為夫人其弟期為司徒夫人寵衰期得罪公使三匠久公使優狡盟拳彌而甚近信之故褚師比公孫彌牟公文要司寇亥司徒期因三匠與拳彌以作亂皆執利兵無者執斤譟以攻公鄄子士請禦之彌援其手曰子則勇矣將若君何不見先君乎且君嘗在外矣豈必不反當今不可衆怒難犯休而易間也乃出將適蒲彌曰晉無信不可將適鄄彌曰齊晉爭我不可將適泠彌曰魯不足與請適城鉏以鈎越越有君乃適城鉏彌曰衛盜不可知也請速自我始乃載寶以歸公為支離之卒因祝史揮以侵衛衛人病之懿子知之見子之請逐之揮在朝使吏遣諸其室揮出信弗內五日乃館諸外里遂有寵使如越請師二十六年五月叔孫舒帥師㑹越皋如后庸宋樂茷納衛侯文子欲納之懿子曰君愎而虐少待之必毒於民乃睦於子矣師侵外州大獲出禦之大敗文子使王孫齊私於皋如曰子將大滅衛乎抑納君而已乎皋如曰寡君之命納衛君而已文子致衆而問焉曰君以蠻夷伐國國幾亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出衆曰勿出重賂越人申開守陴納公公不敢入師還立悼公南氏相之以城鉏與越人公曰期則為此令茍有怨於夫人者報之司徒期聘於越公奪之幣期告王王命取之期以衆取之公怒殺期之甥之為大子者遂卒於越衛出公自城鉏使以弓問子贛且曰吾其入乎子贛稽首受弓對曰臣不識也私於使者曰昔成公孫於陳寧武子孫莊子為宛濮之盟而君入獻公孫于齊子鮮子展為夷儀之盟而君入今君再在孫矣內不聞獻之親外不聞成之卿則賜不識所由入也詩曰無競惟人四方其順之若得其人四方以為主而國於何有十五年邾隱公來朝邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也哀公三年桓僖災夏五月司鐸官名火火踰公宫桓僖災南宫敬叔至命周人出御書俟於宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬱攸從之蒙葺公屋自犬廟始外內以悛助所不給有不用命則有常刑公父文伯至命校人駕乘車季桓子至御公立於象魏之外命藏象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是去表之稿道還公宫孔子在陳聞火曰其桓僖乎季孫有疾命正常以後事秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣乃討之召正常正常不反五年齊陽生弒荼齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為大子也言於公曰君之齒長矣未有大子若之何公曰二三子閒於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼置羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎六年齊陳乞僞事髙國者每朝必驂乘焉所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰髙國得君必逼我盍去諸子蚤圖之圖之莫如盡滅之需事之下也又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定盍及其未作也先諸作而後悔亦無及也大夫從之夏六月陳乞鮑牧及諸大夫以甲入於公宫昭子聞之與惠子乘如公戰於莊敗國夏奔莒遂及髙張晏圉弦施來奔八月陳僖子使召公子陽生逮夜至於齊僖子使子士之母養之與饋者皆入冬十月丁卯立之將盟鮑子醉而往其臣差車鮑㸃曰此誰之命也陳子曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒公使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下八年或譖胡姬於齊侯曰安孺子之黨也六月齊侯殺胡姬鮑牧謂羣公子曰使女有馬千乘乎公子訴之公謂鮑子或譖子子姑居於潞以察之若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麇之以入遂殺之鄭駟秦富而侈鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解于位民之攸塈不守其位而能久者鮮矣商頌曰不僭不濫不敢怠皇命以多福六年楚滅陳吳伐陳楚子曰吾先君與陳有盟不可以不救乃救陳師于城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾卒於城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為崇王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由已率常可矣九年夏楚人伐陳陳即吳故也十年冬楚子期伐陳吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還十五年楚子西子期伐吳陳侯使公孫貞子弔焉及良而卒將以尸入吳子使大宰嚭勞且辭曰以水潦之不時無乃廩然隕大夫之尸以重寡君之憂寡君敢辭上介芋尹蓋對曰寡君聞楚為不道荐伐吳國滅厥民人寡君使蓋備使弔君之下吏無祿使人逢天之戚大命隕隊絶世於良廢日共積一日遷次今君命逆使人曰無以尸造於門是我寡君之命委于草莾也且臣聞之曰事死如事生禮也於是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也其何以為諸侯主先民有言曰無穢虐士備使奉尸將命茍我寡君之命達于君所雖隕於深淵則天命也非君與涉人之過也吳人內之十七年楚白公之亂陳人恃其聚而侵楚楚既寧將取陳麥楚子問帥于大師子榖與葉公諸梁子榖曰右領差車與左史老皆相令尹司馬以伐陳其可使也子髙曰率賤民慢之懼不用命焉子榖曰觀丁父鄀俘也武王以為軍率是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息朝陳蔡封畛於汝唯其任也何賤之有子髙曰天命不諂令尹有憾於陳天若亡之其必令尹之子是與君盍舍焉臣懼右領與左史有二俘之賤而無其令德也王卜之武城尹吉使帥師取陳麥陳人御之敗遂圍陳秋七月滅陳七年魯伐邾吳齊伐魯夏公會吳于鄫季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於德失二德者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯于塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯德如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鐘聲大夫諫不聽茅成子請告於吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我且國內豈不足成子以茅叛師遂入邾處其公宫衆師晝掠以邾子益來獻于亳社囚諸負瑕邾茅夷鴻以束帛乘韋自請救於吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之二也邾賦六百乘君之私也以私奉二唯君圖之吳子從之八年吳為邾故將伐魯問於叔孫輒叔孫輒對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我子張病之王問於子泄對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月吳伐我子泄率故道險從武城初武城人或有因於吳竟田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之克東陽而進舍於五梧明日舍於蠶室公賔庚公甲叔子與戰于夷獲叔子與析朱鉏獻於王王曰此同車必使能國未可望也明日舍於庚宗遂次于泗上微虎欲宵攻王舍私屬徒七百人三踊於幕庭卒三百人有若與焉或謂季孫曰不足以害吳而多殺國士不如已也乃止之吳子聞之一夕三遷吳人行成乃盟齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒使如吳請師將以伐我乃歸邾子邾子又無道吳子使大宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政秋及齊平齊閭丘明來涖盟且逆季姬以歸九年春齊侯使公孟綽辭師於吳吳子曰昔嵗寡人聞命今又革之不知所從將進受命於君秋吳城邗寒溝通江淮冬吳子使來警師伐齊十年春邾隱公來奔齊甥也故遂奔齊公㑹吳子邾子郯子伐齊南鄙齊人弒悼公赴于師吳子三日哭於軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還十一年春齊國書髙無㔻帥師伐我及清孟孺子泄帥右師冉求帥左師及齊師戰于郊師入齊軍右師奔齊人從之孟之側後入以為殿抽矢䇿其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐步而死師獲甲首八十齊人不能師宵諜曰齊人遁公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛於齊師故能入其軍孔子曰義也夏為郊戰故公㑹吳子伐齊中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍髙無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約吳髮短東郭書使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼓而已不聞金矣甲戌戰於艾陵大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千人以獻于公公使大史固歸國子之元置之新篋褽之以𤣥纁加組帶焉置書于其上曰天若不識不衷何以使下國十二年公會吳于橐皋吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為茍有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟吳徴會於衛衛侯會吳于鄖十三年夏公會單平公晉定公吳夫差於黃池秋七月辛丑盟吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎大子死乎且夷德輕不忍久請少待之乃先晉人吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見于王伯合諸侯則侯帥子男以見於伯自王以下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉今諸侯會而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於吳八百乘若為子男則將半邾以屬於吳而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之將囚景伯景伯曰何也立後於魯矣遲速唯命遂囚以還及戶牖謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉若不會祝宗將曰吳實然且謂魯不共而執其賤者何損焉大宰嚭言於王乃歸景伯吳申叔儀乞糧於公孫有山氏曰佩玉蕊兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰粱則無矣粗則有之若登首山以呼曰庚癸乎則諾庚西方主榖癸北方主水王欲伐宋大宰嚭曰可勝也而弗能居也乃歸宋伐曹宋人圍曹初曹人或夢衆君子立於社宫而謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政夢者之子乃行彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊七年八年春宋公將還曹人詬之公怒命反之遂滅曹執曹伯及司城彊以歸殺之九年鄭圍宋取邑大敗晉卜救鄭鄭武子䞉之嬖許瑕求邑無以與之請外取許之故圍宋雍邱宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚救之大敗二月宋取鄭師于雍丘使有能者無死以郟張與鄭羅歸晉趙鞅卜救鄭遇水適火占諸史趙史墨史龜史龜曰是謂沈陽可以興兵利以伐姜不利子商史墨曰盈水名也趙姓子水位也宋姓名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可遊也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰乾下坤上之需乾下坎上曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也宋商後今得帝乙之封故知宋吉帝乙紂父祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止十年夏趙鞅帥師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉行也於是乎取犂及轅毁髙唐之郭侵及賴而還十一年陳轅頗出奔鄭夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女有餘以為已大器國人逐之故出道渴其族轅咺進稻醴粱糗腵脯焉喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行衛大叔疾出奔宋衛大叔疾出奔宋初疾娶於宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣置於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州外州人奪之軒以獻耻是二者故出初文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也將止魯人以幣召之乃歸季孫用田賦季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽十二年春王正月用田賦十二年昭夫人孟子卒夏昭夫人孟子卒孔子與弔適季氏季氏不絻放絰而拜十四年西狩獲麟春西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之小邾射以句繹來奔小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能陳常弒簡公齊簡公之在魯也闞止有寵焉及即位使為政陳成子憚之驟顧諸朝諸御鞅言於公曰陳闞不可並也君其擇焉弗聽子我夕陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沐備酒肉焉饗守囚者醉而殺之而逃子我盟諸陳於陳宗初陳豹欲為子我臣使公孫言巳已有喪而止既而言之曰有陳豹者長而上僂望視欲為子臣吾憚其為人也故緩以告子我曰何害是其在我也使為臣他日與之言政說遂有寵謂之曰我盡逐陳氏而立女若何對曰我逺於陳氏矣且其違者不過數人何盡逐焉遂告陳氏子行曰彼得君弗先必禍子子行舍於公宫夏五月成子四乘如公子我在幄出逆之遂入閉門侍人禦之子行殺侍人子我歸屬徒攻闈與大門皆不勝乃出豐丘人執之殺諸郭關成子將殺大陸子方陳逆請而免之出雍門陳豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讎何以見魯衛之士東郭賈奔衛庚辰陳恆執公于舒州公曰吾早從鞅之言不及此甲午陳恆弒其君壬於舒州孔丘三日齊而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言宋桓魋之亂宋桓魋之寵害於公公使夫人驟請享焉而將討之未及魋先謀公請以鞍易薄公曰薄宗邑也乃益鞍七邑而請享公焉以日中為期家備盡往公知之告皇野子仲曰有臣不順神之所惡也而況人乎敢不承命不得左師不可請以君命召之左師每食擊鍾聞鍾聲公曰夫子將食既食又奏公曰可矣以乘車往曰迹人來告曰逢澤有介麇焉公曰得左師吾與之田若何與之乘至公告之故拜不能起司馬曰君與之言公曰所難子者上有天下有先君對曰魋之不共宋之禍也敢不唯命是聽請瑞焉以命其徒攻桓氏子頎騁而告桓司馬司馬欲入子車止之曰不能事君而又伐國祗取死焉向魋入於曹以叛六月使左師巢伐之向魋奔衛向巢來奔宋公使止之曰寡人與子有言矣不可以絶向氏之祀辭曰臣之罪大若以先臣之故而使有後君之惠也若臣則不可以入矣司馬牛致其邑與圭焉而適齊向魋奔齊陳成子使為次卿牛又致其邑焉而適吳吳人惡之而反趙簡子召之陳成子亦召之卒于魯郭門之外葬諸丘輿成叛初孟孺子泄將圉馬於成成宰公孫宿不受曰孟氏為成之病不圉馬焉秋懿子卒成人奔喪弗內袒免哭於衢聽共弗許懼不歸十五年成叛于齊武伯伐成不克遂城輸秋齊陳瓘如楚過衛仲由見之曰天或者以陳氏為斧斤既斫喪公室而他人有之不可知也其使終饗之亦不可知也若善魯以待時不亦可乎子玉曰然吾受命矣子使告我弟冬及齊平子服景伯如齊子贛為介見公孫成曰人皆臣人而有背人之心況齊人雖為子役其有不二乎子周公之孫也多饗大利猶思不義利不可得而喪宗國將焉用之成曰善哉吾不早聞命陳成子館客曰寡君使恆告曰寡人願事君如事衛君景伯揖子贛而進之對曰寡君之願也昔晉人伐衛齊為衛故伐晉冠氏喪車五百因與衛地自濟以西禚媚杏以南書社五百吳人加敝邑以亂齊因其病取歡與闡寡君是以寒心若得視衛君之事君也則固所願也成子病之乃歸成公孫宿以其兵甲入於嬴十七年公會齊侯盟于蒙孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首二十年春齊人來徴會夏會于廩丘為鄭故謀伐晉鄭人辭諸侯秋師還二十一年秋公及齊侯邾子盟于顧齊人責稽首因歌之曰魯人之皋數年不覺使我髙蹈唯其儒書以為二國憂是行也公先至於陽榖齊閭丘息曰君辱舉玉趾以在寡君之軍羣臣將傳遽以告寡君比其復也君無乃勤為僕人之未次請除館於舟道辭曰敢勤僕人十六年孔丘卒夏四月孔丘卒公誄之曰旻天不弔不憖遺一老俾屏余一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律子贛曰君其不沒於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之楚白公之亂楚大子建之遇讒也自城父奔宋又辟華氏之亂於鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使謀於子木請行而期焉子木暴虐於其私邑邑人訴之鄭人得晉謀焉遂殺子木其子曰勝在吳子西欲召之葉公曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊竟使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處吳竟為白公請伐鄭子西曰楚未節也不然吾不忘也他日又請許之未起師晉人伐鄭楚救之勝怒曰鄭人在此讎不逺矣勝自厲劒子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛勝謂石乞曰王與二卿士皆五百人當之則可矣乞曰不可得也曰市南有熊宜僚者若得之可以當五百人矣乃從白公而見之與之言說告之故辭承之以劒不動勝曰不為利諂不為威惕不泄人言以求媚者去之吳人伐慎白公敗之請以戰備獻許之遂作亂秋七月殺子西子期于朝而劫惠王子西掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死石乞曰焚庫弒王不然不濟白公曰不可弒王不祥焚庫無聚將何以守乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡方城之外皆曰可以入矣子髙曰吾聞之以險徼幸者其求無饜偏重必離聞其殺齊管修也而後入白公欲以子閭為王子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若欲專利以傾王室不顧楚國有死不能遂殺之而以王如髙府石乞尹門圉公陽穴宫負王以如昭夫人之宫葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日月以幾若見君面是得艾也民知不死其亦夫有奮心猶將旌君以徇於國而又掩面以絶民望不亦甚乎乃免胄而進遇針尹固帥其屬將與白公子髙曰微二子者楚不國矣棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之生拘石乞而問焉對曰余知其死所而長者使余勿言曰不言將烹乞曰此事克則為卿不克則烹固其所也何害乃烹石乞沈諸梁兼二事國寧乃使寧為令尹使寬為司馬而老於葉十八年楚公孫寧敗巴師巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志及巴師至將卜帥王曰寧如志何卜焉使帥師而行請承王曰寢尹工尹勤先君者也三月楚公孫寧吳由于薳固敗巴師于鄾故封子國于析君子曰惠王知志夏書曰官占唯能蔽志昆命于元龜其是之謂乎志曰聖人不煩卜筮惠王其有焉二十一年越人始來夏五月越人始來二十三年秋八月叔青如越始使越也越諸鞅來聘報叔青也二十三年宋景曹卒宋景曹卒元公夫人季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人曰以肥之得備彌甥也有不腆先人之産馬使求薦諸夫人之宰其可稱旌繁乎晉伐齊夏晉荀瑶伐齊髙無㔻帥師御之將戰長武子請卜知伯曰君告於天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑶非敢耀武也治英丘也以辭伐罪足矣何必卜壬辰戰于犂丘齊師敗績知伯親禽顔庚二十四年夏晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取榖宣叔以晉師伐齊取汶陽寡君欲徼福於周公願乞靈於臧氏臧石帥師㑹之取廩丘軍吏令繕將進萊章曰君卑政暴往嵗克敵今又勝都天奉多矣又焉能進是躗言也役將班矣晉師乃還餼臧石牛曰以寡君之在行牢禮不度敢展謝之二十四年哀公如越公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡之閏月公如越得大子適郢將妻公而多與之地季孫懼使因大宰嚭而納賂焉乃止二十五年六月公至自越季康子孟武伯逆於五梧郭重僕見二子曰惡言多矣君請盡之公宴於五梧武伯為祝惡郭重曰何肥也公曰是食言多矣能無肥乎飲酒不樂公與大夫始有惡二十七年公患三桓之侈也欲以諸侯去之三桓亦患公之妄也故君臣多閒公遊於陵阪遇孟武伯於孟氏之衢曰請有問於子余及死乎對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月公如公孫有陘氏因孫于邾乃遂如越國人施公孫有山氏二十六年宋立昭公宋景公無子取公孫周之子得與啓畜諸公宫未有立焉於是皇緩為右師皇非我為大司馬皇懷為司徒靈不緩為左師樂茷為司城樂朱鉏為大司寇六卿三族降聽政因大尹以達大尹常不告而以其欲稱君命以令國人惡之司城欲去大尹左師曰縱之使盈其罪重而無基能無敝乎冬十月公遊於空澤卒於連中大尹興空澤之士千甲奉公自空桐入如沃宫使召六子至以甲劫之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啓奉喪殯於大宫司城茷使宣言於國曰大尹惑蠱其君而專其利今君無疾而死死又匿之是無他矣大尹之罪也得夢啓北首而寢於盧門之外已為鳥而集於其上咮加於南門尾加於桐門曰余夢美必立大尹謀曰我不在盟無乃逐我復盟之乎使祝為載書左師使徇於國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之大尹徇曰戴氏皇氏將不利公室與我者無憂不富衆曰無别大尹奉啓以奔楚乃立得司城為上卿盟曰三族共政無相害也二十七年越子盟于平陽越子使后庸來聘且言邾田封于駘上二月盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰然何不召曰固將召之文子曰他日請念晉荀瑶伐鄭晉荀瑶帥師伐鄭次于桐丘鄭駟𢎞請救于齊齊師將興陳成子屬孤子三日朝設乘車兩馬繫五邑焉召顔涿聚之子晉曰隰之役而父死焉以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違榖七里榖人不知及濮雨不涉子思曰大國在敝邑之宇下是以告急今師不行恐無及也成子衣製杖戈立於阪上馬不出者助之鞭之知伯聞之乃還使謂成子曰大夫陳子陳之自出陳之不祀鄭之罪也故寡君使瑶察陳衷焉謂大夫其恤陳乎若利本之顚瑶何有焉成子怒曰多陵人者皆不在知伯其能久乎悼之四年晉荀瑶帥師圍鄭未至鄭駟𢎞曰知伯愎而好勝早下之則可行也乃先保南里以待之知伯入南里門于桔柣之門鄭人俘酅魁壘賂之以知政閉其口而死知伯謂趙孟入之對曰主在此知伯曰惡而無勇何以為子對曰以能忍恥庶無害趙宗乎知伯不悛趙襄子由是惎知伯遂喪之知伯貪而愎故韓魏反而喪之春秋左氏傳事類始末卷五
