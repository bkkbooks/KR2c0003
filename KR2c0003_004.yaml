body:
  text: 春秋左傳事類始末卷四宋章冲撰昭公元年季武子伐莒齊盟楚人欲戮叔孫楚公子圍聘于鄭遂會於虢季武子伐莒取鄆莒人告於㑹楚請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為人之有牆以蔽惡也牆之隙壞誰之咎也雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官叔出季處信也圖國忘死貞也謀主三者義也有是四者又何戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不辟汚出不逃難其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之視逺如邇疆場之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可一於是乎虞有三苗夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又何一乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辨焉固請諸楚楚人許之乃免叔孫夏四月叔孫歸曽天御季孫以勞之旦及日中不出曽天謂曽阜叔孫家臣曰魯以相忍為國也忍其外不忍其內焉用之阜曰數月於外一旦於是庸何傷賈而欲贏而惡囂乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之鄭討公孫黑之罪鄭徐吾犯之妹美公孫楚聘之矣公孫黑又强委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉子晳盛飾入布幣而出子南戎服入左右射超乘而出女曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏于晳怒櫜甲以見子南欲殺之子南執戈逐之子晳傷而歸大夫皆謀之子産曰直鈞幼賤有罪乃執子南而數之曰國之大節有五女皆奸之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪五月放之於吳子産咨於太叔太叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸游鄭為游楚亂故六月鄭伯及其大夫盟於公孫段氏罕虎公孫僑公孫段印段游吉駟帶私盟于閨門之外實薰隧公孫黑强與於盟使大史書其名且曰七子子産弗討二年秋公孫黑欲去游氏而代其位駟氏與諸大夫欲殺之子産在鄙聞之乘遽而至使吏數之曰爾有亂心無厭國不女堪専伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三不速死大刑將至辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉七月壬寅縊尸諸周氏之衢加木焉秦后子有寵於桓如二君懼選適晉秦后子有寵於桓如二君於景其母曰弗去懼選數其罪誅之針適晉其車千乘后子享晉侯造舟於河十里舍車一舍八乘為八反之備自雍及絳歸取酬幣備九獻始自齎其一而續送其八終事八反司馬侯問焉曰子之車盡於此乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也冬楚公子圍弒其君右尹子干奔晉從車五乘叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰砥祿以德德鈞以年年同以尊公子以國不聞以富且夫以千乘去其國彊禦已甚詩曰不侮鰥寡不畏强禦秦楚匹也使后子與子干齒辭曰針懼選楚公子不獲是以皆來亦唯命且臣與羈齒無乃不可乎后子先仕晉蓋主也史佚有言曰非羈何忌敬也五年秦后子復歸于秦景公卒也晉中行敗狄于大鹵晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克增十人當一車之用困諸厄又克車困厄去車必克請皆卒自我始乃毀車為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後専為右角參為左角偏為前拒此皆臨時名以誘之翟人笑之未陳而薄之大敗之晉侯有疾鄭公孫僑問疾晉侯有疾鄭伯使公孫僑聘且問疾叔向曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔高辛氏有二子伯曰閼伯季曰實沈高辛帝嚳居于曠林不相能也日尋干戈以相征討后帝不臧竟也遷閼伯于商丘主辰商人是因故辰為商星遷實沈於大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂已余命而子曰虞將與之唐屬諸參及生有文在其手曰虞遂以命之及武王滅唐而封大叔焉故參為晉星由是觀之實沈參神也昔金天氏有裔子曰昧為𤣥冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黃實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃一之則生疾矣僑又聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君內實有四姬焉其無乃是也乎若由是二者弗可為也已四姬有省猶可無則必生疾矣叔向曰善哉肸未之聞也此皆然矣晉侯聞之曰博物君子也重賄之二年韓宣子聘魯見易象與魯春秋如齊逆女晉侯使韓宣子來聘且告為政而來見禮也觀書於大史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦綿之卒章以宣子比文四輔韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴于季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公宣子遂如齊納幣自齊聘于衛衛侯享之北宫文子賦淇澳宣子賦木瓜夏韓須如齊逆女齊陳無宇致少姜少姜有寵於晉侯晉侯謂之少齊秋少姜卒公如晉晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉三年鄭游吉如晉送少姜之葬梁丙與張躍見之梁丙曰甚矣哉子之為此來也子大叔曰將得已乎昔文襄之霸也其務不煩諸侯令諸侯三歲而聘五歲而朝有事而㑹不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已無加命矣今嬖寵之喪不敢擇位而數於守適唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室今兹吾又將來賀不唯此行也張躍曰自今子其無事矣譬如火焉火中寒暑乃退心以季夏昏中而暑乃退季冬旦中而寒退此其極也能無退乎晉將失諸侯諸侯求煩不獲二大夫退子大叔曰張躍有知其猶在君子之後乎齊侯使晏嬰請繼室於晉曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲不腆先君之適以備內官焜耀寡人之望則又無祿蚤世隕命君若不忘先君之好惠顧齊國辱收寡人徼福於太公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之內主豈唯寡君舉羣臣實受其貺其自唐叔以下實寵加之既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區鍾釜四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒上中下國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃冦讐欒卻胥原狐續慶伯降在皂𨽻八姓舊臣政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠况日不悛其能久乎晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族唯羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公為是省於刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑詩曰君子如祉亂始遄已其是之謂乎及晏子如晉公更其宅反則成矣既拜乃毀之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之晉韓宣子如齊逆女公孫蠆為少姜之有寵也以其子更公女而嫁公子叔弓聘于晉辭郊勞叔弓聘于晉晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賔徹命於執事敝邑𢎞矣敢辱郊使致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館叔向曰子叔子知禮哉吾聞之忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後已卑讓也詩曰敬慎威儀以近有德夫子近德矣三年鄭伯如晉晉賜公孫段州田鄭伯如晉公孫段相甚敬而卑禮無違者晉侯嘉焉授之以策曰子豐有勞於晉國余聞而弗忘賜女州田以胙乃舊勳伯石再拜稽首受策以出君子曰禮其人之急也乎伯石之汰也一為禮於晉猶荷其祿况以禮終始乎詩曰人而無禮胡不遄死其是之謂乎初州縣欒豹之邑也及欒氏亡范宣子趙文子韓宣子皆欲之文子曰溫吾縣也州本屬溫二宣子曰自郤稱以别三傳矣晉之别縣不唯州誰獲治之文子病之乃舍之二子曰吾不可以正議而自與也皆舍之及文子為政趙獲曰可以取州矣文子曰二子之言義也違義禍也余不能治余縣又焉用州必死豐氏故主韓氏伯石之獲州也韓宣子為之請之為其復取之之故七年子産聘于晉為豐施歸州田於韓宣子曰日君以夫公孫段為能任其事而賜之州田今無祿蚤世不獲久享君德其子弗敢有不敢以聞於君私致諸子宣子辭子産曰古人有言曰其父析薪其子弗克負荷施將懼不能任其先人之祿其况能任大國之賜縱吾子為政而可後之人若屬有疆場之言敝邑獲戾而豐氏受其大討吾子取州是免敝邑於戾而建置豐氏也敢以為請宣子受之以告晉侯晉侯以與宣子宣子為初言病有之以易原縣於樂大心小邾穆公來朝小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也志曰能敬無災又曰敬逆來者天所福也季孫從之四年楚使椒舉請昏于晉楚子使椒舉求諸侯遂請昏晉侯許之五年楚子以屈生為莫敖使與令尹子蕩如晉逆女晉侯送女于邢丘韓宣子送女叔向為介鄭子皮子太叔勞諸索氏大叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽以羊舌肸為司宫足以辱晉吾亦得志矣大夫莫對薳啓疆曰可茍有其備何故不可恥匹夫不可以無備况恥國乎是以聖王務行禮不求恥人朝聘有圭享眺他弔有璋小有述職大有巡功巡狩設機而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也國家之敗失之道也則禍亂興城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦是以楚弗能報而求親焉既獲姻親又欲恥之以召寇讐備之若何誰其重此若有其人恥之可也若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇丘隕至求昏而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行吳魏舒范鞅知盈羊舌肸之下祁午張躍籍談女齊梁丙張骼古百輔躒苗賁皇皆諸侯之選也韓襄為公族大夫韓須受命而使矣箕襄邢帶韓族叔禽叔椒子羽起子皆大家也韓賦七邑皆成縣也皆百乘羊舌四族伯華叔向叔魚叔虎皆疆家也晉人若喪韓起楊肸五卿趙成以下八大夫祁午以下輔韓須楊石向子因其十家九縣韓氏七羊舌氏四言十家舉成數也羊舌四家共二縣故但言强家長轂九百其餘四十縣遺守四千奮其武怒以報其大恥伯華謀之中行伯魏舒帥之其蔑不濟矣君將以親易怨實無禮以速寇而未有其備使羣臣往遺之禽以逞君心何不可之有王曰不榖之過也大夫無辱厚為韓子禮王欲敖叔向以其所不知而不能亦厚其禮六年夏楚公子棄疾如晉報韓起也初韓宣子之適楚也楚人弗逆棄疾及晉竟晉侯將亦弗逆叔向曰楚辟我衷若何效辟書曰聖作則無寧以善人為則而則人之辟乎匹夫為善民猶則之况國君乎晉侯說乃逆之正月大雨雹正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷陸道也夏十一月日在虛危西陸朝覿而出之夏三月日在昴畢其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賔食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦火昏見東方三月四月中自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之夫氷以風壯而以風出因春風而用其藏之也周其用之也遍則冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無菑霜雹癘疾不降民不天札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為災誰能禦之七月之卒章藏氷之道也鄭子産作丘賦鄭子産作丘賦國人謗之曰其父死於路已為蠆尾以令於國國將若之何子寬以告子産曰何害茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣渾罕曰國氏其先亡乎君子作法於涼其敝猶貪作法於貪敝將若之何姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法政不率法而制於心民各有心何上之有吳伐楚報朱方之役吳伐楚入棘櫟麻以報朱方之役楚沈尹射奔命於夏汭針尹宜咎城鍾離薳啓疆城巢然丹城州來五年楚子以諸侯及東夷伐吳以報棘櫟麻之役聞吳師出薳啓疆帥師從之遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟紀力使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡焉好逆使臣滋敝邑休怠而忘其死亡無日矣君奮焉震電馮盛也怒虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若蚤修完其可以息師且吳社稷是卜豈為一人使臣獲釁鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟于羅汭吳不可入遂觀兵于坁直夷箕之山是行也吳蚤設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命于巢薳啓彊待命于雩婁禮也十九年令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣舍前之忿可也乃歸蹶由五年魯莊公如晉郊勞贈賄無失禮公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎君子謂叔侯於是乎知禮夏莒牟夷以牟婁及防兹來奔莒人訴于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之墯也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公六年夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也茍免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為歡也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨六年鄭人鑄刑書三月鄭人鑄刑書叔向使詒子産書曰始吾有虞於子今則己矣昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以義糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以彊斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徴於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徴於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠士文伯曰火見鄭其火乎火未出而作火以鑄刑器鼎也藏爭辟焉火如象之不火何為六月丙戌鄭災齊侯如晉請伐燕十一月齊侯如晉請伐北燕也晉侯許之十二月遂伐北燕將納簡公晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也七年正月齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晳曰受服而退俟釁而動可也二月盟于濡須上燕人歸燕姬賂以瑶罋玉櫝斚耳玉爵不克而還七年楚子成章華之臺昭公如楚楚子成章華之臺願與諸侯落之薳啓彊曰臣能得魯侯來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀奉承以來弗敢失隕而致諸宗祧日我先君共王引領北望日月以冀傳序相受於今四王矣嘉惠未至唯襄公之辱臨我喪孤與其二三臣悼心失圖社稷之不皇况能懷思君德今君若步玉趾辱見寡君寵靈楚國以信蜀之役是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈唯寡君君若不來使臣請問行期寡君將承質幣而見于蜀以請先君之貺公將往夢襄公祖梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚鄭伯勞于師之梁孟僖子為介不能相儀及楚不能答郊勞楚子享公於新臺使長鬛者相好以大屈既而悔之薳啓彊聞之見公公語之拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰慎守寶矣公懼乃反之九月公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是鬻於是以糊余口其共也如是臧孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬說與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則效己矣晉侯問士文伯日食夏四月甲辰朔日有食之晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地衛豕韋魯降婁日食於豕韋之末降婁之始於是有災魯實受之大咎其衛君乎魯將上卿公曰詩所謂彼日而食于何不臧何也對曰不善政之謂也國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時秋八月衛襄公卒衛齊惡告喪于周且請命王使成簡公如衛弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘高圉亞圉十一月季武子卒晉侯謂伯瑕曰吾所問日食從矣可常乎對曰不可六物不同民心不一事序不類官職不則同始異終胡可常也詩曰或燕燕居息或憔悴事國其異終也如是公曰何謂六物對曰歲時日月星辰是也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰故以配日晉侯有疾韓宣子問夢於子産鄭子産聘于晉晉侯有疾韓宣子私焉曰寡君寢疾並走羣望有加而無瘳今夢黃熊入于寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎韓子祀夏郊晉侯有間賜子産莒之二方鼎衛立靈公衛襄公夫人姜氏無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史茍相之史朝亦夢康叔謂已余將命而子茍與孔蒸鉏之曾孫圉相元史朝見成子告之夢夢協晉韓宣子為政聘於諸侯之歲二年婤姶生子名之曰元孟縶之足不良能行孔成子以周易筮之曰元尚享衛國主其社稷遇屯震下坎上又曰余尚立縶尚克嘉之遇屯之比坤下坎上以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎孔成子立靈公八年石言于晉春石言于晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力雕盡怨讟並作莫保其性石言不亦宜乎於是晉侯方築虒祁之宫叔向曰子野之言君子哉君子之言信而有徴故怨逺於其身小人之言僣而無徴故怨咎及之詩曰哀哉不能言匪舌是出唯躬是瘁哿矣能言巧言如流俾躬處休其是之謂乎是宫也成諸侯必叛君必有咎夫子知之矣夏叔弓如晉賀虒祁也游吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相䝉也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀十年春正月有星出於婺女鄭禆竈言于子産曰七月戊子晉君將死今兹歲在顓頊之虛姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜太公女唐叔母婺女既嫁之女織女處女邑姜齊之既嫁女也妖星在婺女齊得歲故知禍在邑姜也維首星居𤣥枵之維首也邑姜晉之妣也天以七紀二十八星面七戊子逢公以登星斯於是乎出逢公商諸侯居齊者將死妖星出婺女時非歲星所在故自當其禍以戊子卒吾是以譏之秋七月平子伐莒取郠戊子晉平公卒九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也鄭子皮將以幣行子産曰喪焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭曰大夫之事畢矣而又命孤孤斬焉在衰經之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也晉成虒祁之宫諸侯有二心係十二年十三年晉以成虒祁諸侯朝而歸者皆有二心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徴會秋七月丙寅治兵于邾南甲車四千乘遂合諸侯于平丘子産子大叔相鄭伯以㑹子産以幄幕九張行子太叔以四十既而悔之每舍損焉及㑹亦如之晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以砥信君茍有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速唯君叔向告於齊曰諸侯來盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明弃共百事不終所由傾覆也是故明王之制使諸侯歲聘以志業閒朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也存亡之道恆由是興晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽從叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之邾莒訴曰魯朝夕伐我我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國弃周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死魯人懼聽命甲戌同盟于平丘齊服也及盟子産爭承貢賦之次曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以爭至於昏晉人許之既盟子太叔咎之曰諸侯若討其可瀆乎子産曰晉政多門二偷之不暇何暇討國不競亦陵何國之為公不與盟晉人執季孫如意以幕䝉之司鐸射懷錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從仲尼謂子産於是行也足以為國基矣詩云樂只君子邦家之基子産君子之求樂者也且曰合諸侯藝貢事禮也冬季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷弃之使事齊楚其何瘳於晉親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二吾豈無大國穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠於㑹宣子謂叔向曰子能歸季孫乎曰不能鮒也能乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君微武子之賜不至於今雖獲歸國於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館於西河其若之何且泣平子先歸惠伯待禮大搜于紅大搜于紅自根牟至于商衛革車千乘九年周甘人與晉閻嘉爭閻田周甘人與晉閻嘉爭閻田晉梁丙張躍率陰戎伐潁周邑王使詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢隊是為豈如辨髦而因以敝之先王居檮杌于四裔以禦螭魅故允姓之姦居于瓜州伯父惠公歸自秦而誘以來使逼我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毀冕拔本塞原専弃謀主雖戎狄其何有余一人叔向謂宣子曰文之伯也豈能改物翼戴天子而加之以共自文以來世有衰德而暴滅宗周以宣示其侈諸侯之二不亦宜乎且王辭直子其圖之宣子說王有姻喪使趙成如周弔且致閻田與禭反潁俘王亦執甘大夫襄以說於晉晉人禮而歸之晉荀盈卒晉侯飲酒樂晉荀盈如齊逆女卒于戲陽未葬晉侯飲酒樂膳宰屠蒯趨入請佐公使尊而遂酌以飲工曰女為君耳將司聰也辰在子卯謂之疾日君徹宴樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之女弗聞而樂是不聰也又飲外嬖嬖叔曰女為君目將司明也服以旌禮禮以行事事有其物物有其容今君之容非其物也而女不見是不明也亦自飲也曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也公說徹酒初公欲廢知氏而立其外嬖為是悛而止使荀躒佐下軍以說焉築郎囿冬築郎囿季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成以勦初交民也無囿猶可無民其可乎十年平子伐莒始用人于亳社秋平子伐莒取郠獻俘始用人於亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義詩曰德音孔昭視民不佻佻之謂甚矣而一用之將誰福哉宋平公卒宋平公卒初元公惡寺人栁欲殺之及喪栁熾炭于位將至則去之比葬又有寵十一年單成公卒單子㑹韓宣子於戚視下言徐叔向曰單子其將死乎朝有著定㑹有表衣有禬帶有結㑹朝之言必聞于表著之位所以昭事序也視不過結禬之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事於㑹視不登帶言不過步貌不道容而言不昭矣不道不共不昭不從無守氣矣十二月單成公卒十二年齊衛鄭如晉朝嗣君三月鄭簡公卒夏齊侯衛侯鄭伯如晉朝嗣君也晉侯享諸侯子産相鄭伯辭於享請免喪而後聽命晉人許之禮也晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂穆子曰子失辭吾固師諸侯矣壺何為焉其以中俊也齊君弱吾君歸弗來矣穆子曰吾軍帥彊禦卒乘競勸今猶古也齊將何事公孫叟進曰日旰君勤可以出矣以齊侯出南蒯以費叛季平子立而不禮於南蒯南蒯謂子仲吾出季氏而歸其室於公子更其位我以費為公臣子仲許之憗告公而遂從公如晉南蒯懼不克以費叛子仲還及衛聞費叛遂奔齊南蒯之將叛也其鄉人或知之過之而嘆且曰恤恤乎湫乎攸乎深思而淺謀邇身而逺志家臣而君圖有人矣哉南蒯枚筮之遇坤之比坤下坎上曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰忠信之事則可不然必敗引彊內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內倡和為忠不相違率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也將適費飲鄉人酒鄉人或歌之曰我有圃生之把乎把生於圃非宜如蒯在費欲亂從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎十三年春叔弓圍費敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之饑者食似之為之令主而共其乏困費來如歸若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏十四年初南蒯之將叛也盟費人司徒老祁盧癸僞廢疾使請於南蒯待間而盟許之二子因民之欲叛也請朝衆而盟遂劫南蒯曰羣臣不忘其君畏子以及今三年聽命矣子若弗圖費人不忍其君將不能畏子矣子何所不逞欲請送子請期五日遂奔齊侍飲酒於景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉司徒老祁慮癸來歸費齊侯使鮑文子致之十三年楚殺鬬成然夏四月丙辰楚公子弃疾即位名曰熊居使子旗為令尹十四年楚令尹子旗有德於王不知度與養氏比而求無厭王患之九月楚子殺鬭成然而滅養氏之族使鬭辛居鄖以無忘舊勳平王使枝如子躬聘于鄭平王封陳蔡復遷邑致羣賂施舍寬民宥罪舉職使枝如子躬聘于鄭且致犫櫟之田事畢弗致鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王問犫櫟降服而對曰臣過失命未之致也王執其手曰子毋勤姑歸不榖有事其告子也叔向制刑不隱於親秋晉治兵於邾南甲車四千乘羊舌鮒攝司馬遂合諸侯于平丘次于衛地叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦曰諸侯事晉未敢攜二况衛在君之宇下而敢有異志芻蕘者異於他日敢請之叔向受羮反錦曰晉有羊舌鮒者瀆貨無厭亦將及矣為此役也子若以君命賜之其已客從之未退而禁之十四年晉邢侯與雍子爭鄐田久而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯専殺其罪一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺皋陶之刑也請從之仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不為末減曰義也夫可謂直矣平丘之㑹數其賄也以寬衛國晉不為暴歸魯季孫稱其詐也以寬魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利殺親益榮猶義也夫晉滅鼓平丘之㑹鮮虞人聞晉師之悉起也而不警邊且不修備晉荀吳自著雍以上軍侵鮮虞及中人大獲而歸十五年晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒弃舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸二十二年晉之取鼓也既獻而反鼓子焉又叛於鮮虞六月荀吳略東陽使師僞糴者負甲以息於昔陽之門外遂襲鼓滅之以鼓子䳒鞮歸使涉他徒多守之吳滅州來吳滅州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之十四年夏楚子使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼養老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新敘舊祿勳合親任良物官使屈罷簡東國之兵於召陵亦如之好於邊疆息民五年而後用師禮也十九年楚人城州來沈尹戌曰楚人必敗昔吳滅州來子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑吳能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戌曰吾聞撫民者節用於內而樹德於外民樂其性而無寇讐今宫室無量民人日駭勞罷死轉忘寢與食非撫之也二十三年吳伐州來楚薳越帥師及諸侯之師奔命吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吳子從之戰于雞父吳子以罪人三千先犯胡沈與陳三國爭之吳為三軍以繫于後中軍從王光帥右掩餘帥左吳之罪人或奔或止三國亂吳師擊之獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟從之三國奔楚師大奔十五年禘于武公叔弓卒春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月禘叔弓涖事籥入而卒去樂卒事禮也楚費無極害朝吳在蔡楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳二三子莫之知也而在其上不亦難乎弗圖必及於難蔡人逐朝吳朝吳出奔鄭王怒曰微吳吾不及此女何故去之對曰臣豈不欲吳然而前知其為人之異也多謀吳在蔡蔡必速飛去吳所以剪其翼也穆后崩景王求彞器於晉秋八月穆后崩十二月晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明器於王室以鎮撫其社稷故能薦彞器於王晉居深山戎狄之與鄰而逺於王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也闕鞏國名出甲之甲武所以克商也唐叔受之以處參虛匡有戎狄其後襄之二路鉞鏚秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勳而不廢有績而載奉之以土田撫之以彞器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉于是乎有董史女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉天子絶期故后亦謂之三年於是乎以喪賔宴又求彝器樂憂甚矣且非禮也彞器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以蚤亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之十六年楚取蠻氏楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也齊侯伐徐賂以鼎而還齊侯伐徐徐子及郯人莒人㑹齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎晉韓起聘鄭求環晉韓起聘于鄭宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器寡君不知子大叔子羽謂子産曰韓子亦無幾求晉國亦未可以二若屬有讒人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎韓子買諸賈人商人曰必告君大夫韓子請諸子産子産對曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無强賈毋或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦弗為也僑若獻玉不知所成敢私布之韓子辭玉曰起不敏敢求玉以徼二罪敢辭之夏四月鄭六卿餞宣子於郊宣子曰二三君子請皆賦起亦以知鄭志子齹賦野有蔓草宣子曰孺子善哉吾有望矣子産賦羔裘宣子曰起不堪也子大叔賦褰裳宣子曰起在此敢勤子至於他人乎子大叔拜宣子曰善哉子之言是不有是事其能終乎子游賦風雨子旗賦有女同車子桞賦蘀兮宣子喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將子産拜使五卿皆拜曰吾子靖亂敢不拜德宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜昭公至自晉公至自晉子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿彊而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國冬季平子如晉葬昭公平子曰子服回之言猶信子服氏有子哉鄭大旱鄭大旱使屠擊柷款豎柎有事於桑山斬其木不雨子産曰有事於山藝山林也而斬其木其罪大矣奪之官邑十七年小邾穆公來朝小邾穆公來朝公與之燕季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎郯子來朝郯子來朝公與之宴昭子問曰少皞氏鳥名官何故也剡子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名黃帝受命有雲瑞故以雲名官縉雲氏蓋一官也炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皞氏以龍紀故為龍師而龍名我高祖少皞摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏歷正也𤣥鳥氏司分也伯趙氏伯勞司至也青鳥氏鶬鷃司啓也丹鳥氏司閉也祝鳩氏司徒也雎鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰天子失官學在四夷猶信晉滅陸渾氏晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎君其備之乃警戎備九月晉荀吳帥師涉自棘津使祭史先用牲于雒陸渾人弗知師從之滅陸渾氏數之以其二於楚也陸渾子奔楚周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘于文公星孛于大辰宋衛陳鄭皆火冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事恆象今除于火火出必布焉諸侯其有火災乎梓慎曰往年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皞之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言于子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與十八年夏五月火始昏見丙子風梓慎曰是為融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子大叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣子産遷其柩火作子産辭晉公子公孫于東門使司寇出新客禁舊客勿出於宫使子寬子上巡羣屏攝至於大宫使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各警其事商成公警司宫出舊宫人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城明日使野司寇各保其徴郊人助祝史除於國北禳火于𤣥冥回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也七月子産為火故大為社祓禳於四万振除火災禮也十九年楚工尹赤遷隂于下隂楚工尹赤遷隂于下隂令尹子瑕城郟叔孫昭子曰楚不在諸侯矣其僅自完也以持其世而已吳用伍員之謀楚始病楚子之在蔡也鄖陽封人之女奔之生大子建及即位使伍奢為之師費無極為少師無寵欲譖諸王曰建可室矣王為之聘于秦無極與逆勸王取之正月楚夫人嬴氏至自秦夏楚子為舟師以伐濮費無極言于楚子曰晉之伯也邇于諸夏而楚僻陋故弗能與爭若大城城父而置大子焉以通北方王收南方是得天下也王說從之故大子建居於城父二十年費無極言于楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王問伍奢伍奢曰君一過多矣何信於讒王執伍奢使城父司馬奮揚殺大子未至而使遣之大子奔宋王召奮揚至曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能茍二奉初以還不忍後命故遣之既而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之棠君尚謂其弟員曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也知死不辟勇也父不可弃名不可廢爾其勉之相從為愈伍尚歸奢聞員不來曰楚君大夫其旰食乎楚人皆殺之員如吳言伐楚之利於州于公子光曰是宗為戮而欲反其讎不可從也員曰彼將有他志乃見鱄設諸焉而耕於鄙二十三年楚囊瓦為令尹城郢沈尹戌曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無內憂而又無外懼國焉用城今吳是懼而城於郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民弃其上不亡何待夫正其疆場修其土田險其走集親其民人明其伍候信其鄰國慎其官守守其交禮不僭不貪不懦不耆完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德無亦監乎若敖蚡冒至于武文土不過同慎其四境猶不城郢今土數圻而郢是城不亦難乎二十四年楚子為舟師以略吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆場無備邑能無亡乎王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戌曰亡郢之始於此在矣王一動而亡二姓之帥幾如是而不及郢詩曰誰生厲階至今為梗其王之謂乎二十六年九月楚平王卒二十七年春吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛吳公子光使鱄設諸弒王公子掩餘奔徐公子燭庸奔鍾吾三十年吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙莠尹然沈尹戌城之取於城父與胡田以與之將以害吳也子西諌曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又彊其讐以重怒之無乃不可乎吳周之胄裔也而弃在海濱不與姬通今而始大比於諸華光又甚文將自同於先王不知天將以為虐乎使剪喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉王弗聼吳子怒冬十二月執鍾吾子遂伐徐防山以水之己卯滅徐吳子問於伍貟曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病三十一年秋吳人侵楚伐夷侵潛六楚沈尹戌帥師救潛吳師還楚師遷潛於南岡而還吳師圍弦左司馬戌右司馬稽帥師救弦及豫章吳師還始用子胥之謀也十二月辛亥朔日有食之是夜也趙簡子夢童子裸而轉以歌旦占諸史墨曰吾夢如是今而日食何也對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有謫火勝金故弗克定二年桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師于豫章吳人見舟于豫章而潜師于巢冬吳軍楚師于豫章敗之遂圍巢克之三年蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗曰君以弄馬之故隱君身弃國家羣臣請相夫人以償馬唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請獻佩於子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚四年春公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言于范獻子曰國家方危諸侯方二將以襲敵不亦難乎水潦方降疾瘧方起中山不服弃盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈秋楚為沈故圍蔡伍貟為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無歲不有吳師蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢左司馬戌謂子常曰子沿漢而與之上下我悉方城外以毀其舟還塞大隧直轅冥厄子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常曰吳用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毀吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡說十一月庚午二師陳于伯舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死吳從楚師及清發將擊之夫槩王曰困獸猶鬭况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之五戰及郢己卯楚子取其妹季芊畀我以出涉睢針尹固與王同舟王使執燧象以奔吳師庚辰吳入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之左司馬戌及息而還敗吳師于雍澨傷初司馬臣闔廬故恥為禽焉謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰我不可用也已句卑布裳剄而褁之藏其身而以其首免楚子涉雎濟江入于雲中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芊以從由于徐蘇而從鄖公辛之弟懷將弒王曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢讐之君命天也若死天命將誰讐詩曰柔亦不茹剛亦不吐不侮矜寡不畏彊禦唯仁者能之違彊陵弱非勇也乘人之約非仁也滅宗廢祀非孝也動無令名非知也必犯是余將殺女鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奬天衷君之惠也漢陽之田君實有之楚子在公宫之北吳人在其南子期似王逃王而已為王曰以吾與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而密邇於楚楚實存之世有盟誓至於今未改若難而弃之何以事君執事之患不唯一人若鳩楚竟敢不聽命吳人乃退爐金初宦於子期氏實與隨人要言王使見辭曰不敢以約為利王割子期之心以與隨人盟初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以薦食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆場之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出五年夏歸粟於蔡以周亟矜無資申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知吳道使楚人先與吳人戰而自稷㑹之大敗夫槩王于沂吳人獲薳射於柏舉其子帥奔徒以從子西敗吳於軍祥秋子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗奔楚為堂溪氏吳師敗楚師于雍澨秦師又敗吳師吳師居麇子期焚之而戰吳師敗又戰于公壻之溪吳師大敗吳子乃歸葉公諸梁之弟后臧從其母於吳不待而歸葉公終不正視冬楚子入于郢初鬬辛聞吳人之爭宫也曰吾聞之不讓則不和不和不可以遠征吳爭於楚必有亂有亂則必歸焉能定楚王之奔隨也將涉於成臼藍尹亹涉其帑不與王舟及寧王欲殺之子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡王賞鬬辛王孫由于王孫圍鍾建鬭巢申包胥王孫賈宋木鬭懷子西曰請舍懷也王曰大德滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸遂逃賞王將嫁季羋季芉辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹王之在隨也子西為王輿服以保路國於脾泄聞王所在而後從王王使由于城麇復命子西問髙厚焉弗知子西曰不能如辭對曰人各有能有不能王遇盜於雲中余受其戈袒而示之背曰此余所能也脾泄之事余亦弗能也六年四月吳太子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕懼亡子期又以陵師敗于繁揚令尹子西喜曰乃今可為矣於是乎遷郢於鄀而改紀其政以定楚國哀元年楚子圍蔡報伯舉也里而栽廣丈高倍夫屯晝夜九日如子西之素蔡人男女以辨使疆于江汝之間而還蔡於是請遷于吳二年吳泄庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以說哭而遷墓冬遷于州來四年春蔡昭侯將如吳諸大夫恐其又遷也承公孫翩逐而射之入于家人而卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫盱齊師入紀秋齊高發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為釐婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登齊師入紀鄭大水鄭大水龍鬬于時門之外洧淵國人請為禜焉子産弗許曰我鬭龍不我覿也龍鬭我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止二十年宋華向之亂宋寺人栁有寵太子佐惡之華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣於是華亥欲代右師從為之徴公使代之見於左師左師曰女夫也必亡女喪而宗室於人何有人亦於女何有詩曰宗子惟城毋俾城壞毋獨斯畏女其畏哉見六年宋華定來聘享之為賦蓼蕭弗知又不答賦昭子曰必亡宴語之不懷寵光之不宣令德之不知同福之不受將何以在見十二年春王二月己丑日南至梓慎望氛曰今兹宋有亂國幾亡三年而後弭蔡有大喪叔孫昭子曰然則戴桓也汏侈無禮已甚亂所在也宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥僞有疾公子問之則執之六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廩公如華氏請焉弗許遂劫之癸卯取太子欒與母弟辰公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質秋公子城公孫忌樂舍司馬彊向宜向鄭楚建郳申出奔鄭其徒與華氏戰于鬼閻敗公子城子城適晉公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺太子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇牼以歸公子既入華牼將自門行公執其手曰余知而無罪也入復而所二十一年宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人亟言之公曰司馬以吾故亡其良子登死亡有命吾不可以再亡之對曰君若愛司馬則如亡公懼使侍人召司馬之侍人宜僚使告司馬司馬嘆曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐尤之使子皮承宜僚以劔而訊之宜僚盡以告張丐與子皮臼任鄭翩殺多僚劫司馬以叛而召亡人五月壬寅華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛宋城舊鄘及桑林之門而守之冬十月華登以吳師救華氏齊烏枝鳴戌宋廚人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師于鴻口獲其二帥公子若雂偃州貟華登帥其餘以敗宋師公欲出㕑人濮曰吾小人可藉死而不能送亡君請待之乃徇曰揚徽者公徒也衆從之公自揚門見之下而巡之曰國亡君死二三子之恥也豈専孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之廚人濮以裳褁首而荷以走曰得華登矣遂敗華氏于新里十一月癸未公子城以晉師至曹翰胡㑹晉荀吳齊苑何忌衛公子朝救宋丙戌與華氏戰于赭丘大敗華氏圍諸南里華貙使華登如楚乞師楚薳越帥師將逆華氏二十二年薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不衷以奬亂人孤之望也唯君圖之楚人患之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚宋公使公孫忌為大司馬邊卭為大司徒樂祁為司城仲幾為左師樂大心為右師樂挽為大司寇以靖國人衛齊豹北宫喜褚師圃公子朝之亂衛公孟縶狎齊豹奪之司寇與鄄有役則反之無則取之公孟惡北宫喜褚師圃欲去之公子朝通於襄夫人宣姜懼而欲作亂故齊豹北宫喜褚師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子丙辰公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉使祝蛙置戈於車薪以當門使一乘從公孟以出華齊御公孟宗魯驂乘及閎中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之慶比御公公南楚驂乘使華寅乘二車載寶以出過齊氏使華寅肉袒執蓋以當其闕齊氏射公中南楚之背公遂出如死鳥析朱鉏宵從竇出徒行從公齊侯使公孫青聘于衛既出聞衛亂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賔曰寡君命下臣於朝曰阿下執事臣不敢二主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止衛侯固請見之不獲命以其良馬見為未致使故也衛侯以為乘馬賔將掫主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賔曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也臣懼不免於戾請以除死親執鐸終夕與於燎齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟于彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉宵子高魴奔晉閏月戊辰殺宣姜衛侯賜北宫喜諡曰貞子賜析朱鉏諡曰成子而以齊氏之墓豫之衛侯告寧於齊且言子石齊侯將飲酒遍賜大夫曰二三子之教也苑何忌辭曰與於青之賞必及於其罰在康誥曰父子兄弟罪不相及况在羣臣臣敢貪君賜以干先王琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮齊侯疥晏子言修德而可齊侯疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據與裔款言于公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公說告晏子晏子曰日宋之盟屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰何故對曰有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽為信君使也其言忠信於鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私高臺深池撞鍾舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫從肆行非度無所還忌不思謗讟不憚鬼神神怨民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以天昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫强易其賄布常無藝徴斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史修德而後可公說使有司寬政毀關去禁薄斂已責齊侯田晏子論和同齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之齊侯至自田晏子侍于遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以亨魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體武文二舞三類風雅頌四物五聲六律七音武王伐紂自午及子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音八風易緯通卦驗曰東北條風東明庶風東南清明風南景風西南凉風西閶闔風西北不周風北廣莫風條風一名融風景風一名凱風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏少皞司寇始居此地季萴因之有逢伯陵因之蒲姑氏因之而後大公因之古者無死爽鳩氏之樂非君所願也子産古之遺愛鄭子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒大叔為政不忍猛而寬鄭國多盜取人於萑苻之澤大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少至仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止訖可小康惠此中國以綏四方施之以寬也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也及子産卒仲尼聞之出涕曰古之遺愛也二十一年天王將鑄無射天王將鑄無射泠州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也而鍾音之器也天子省風以作樂氣以鍾之輿以行之小者不窕大者不槬則和於物物和則嘉成故和聲入于耳而藏於心心億則樂窕則不咸槬則不容心是以感感實生疾今鍾槬矣王心弗堪其能久乎二十二年夏四月王田北山有心疾乙丑崩蔡侯奔楚葬蔡平公蔡大子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈今蔡侯始即位而適卑身將從之冬蔡侯朱出奔楚費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴于楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱大子其子與君同惡德君必甚又使立之不亦可乎魯以十一牢禮晉士鞅夏晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢叔輒哭日食秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水于是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒二十二年王子朝之亂葬曹平公往者見周原伯魯焉與之語不說學歸以語閔子馬閔子馬曰周其亂乎夫必多有是說而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎見十八年王子朝賔起有寵於景王王與賔孟說之欲立之劉獻公之庶子伯蚠扶粉事單穆公惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子乙丑崩于榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王遂攻賔起殺之六月丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲以逐劉子劉子奔揚單子逆悼王于莊宫以歸王子還夜取王以如莊宫單子出王子還與召莊公謀曰不殺單旗不捷與之重盟必來背盟而克者多矣遂奉王以追單子及領大盟而復殺摯荒以說劉子如劉單子奔平畤羣王子追之單子殺還姑發弱鬷延定稠子朝奔京丙寅伐之劉子入于王城辛未鞏簡公敗績于京乙亥甘平公亦敗焉單子欲告急于晉秋七月以王如平畤次于皇冬十月晉籍談荀躒帥九州之戎及焦瑕溫原之師以納王于王城十一月王子猛卒己丑敬王即位閏月晉箕遺樂徴右行詭取前城軍其東南王師軍于京楚辛丑伐京毀其西南二十三年春二師圍郊郊鄩潰王使告閒晉師還夏六月王子朝入于尹單子從阪道劉子從尹道伐尹單子敗劉子還己丑召伯奐南宫極以成周人戌尹庚寅單子劉子樊齊以王如劉甲午王子朝入于王城鄩羅納諸莊宫尹辛敗劉師于唐丙辰又敗諸鄩甲子尹辛取西闈丙子攻蒯蒯潰八月丁酉南宫極震萇𢎞謂劉文公曰君其勉之先君之力可濟也周之亡也其山川震今西王之大臣亦震天弃之矣東王必大克二十四年春正月召簡公南宫嚚以甘桓公見王子朝劉子謂萇𢎞曰甘氏又往矣對曰何害同德度義大誓曰紂有億兆夷人亦有離德余有亂臣十人同心同德此周所以興也君其務德無患無人戊午王子朝入于塢三月晉侯使士景伯蒞問周故士伯立于乾祭而問於介衆晉人辭王子朝不納其使六月鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人有言曰嫠不恤緯而憂宗周之隕為將及焉今王室實蠢蠢焉吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰瓶之罄矣惟罍之恥王室之不寧晉之恥也獻子懼而與宣子圖之乃徴㑹於諸侯期以明年冬十月癸酉王子朝用成周之寶圭于河甲戌津人得諸河上陰不佞以溫人南侵拘得玉者取其玉將賣之則為石王定而獻之與之東訾二十五年夏㑹于黃父謀王室也趙簡子令諸侯之大夫輸王粟具戌人明年將納王二十六年四月單子如晉告急五月戊午劉人敗王城之師于尸氏戊辰王城人劉人戰于施谷劉師敗績七月己巳劉子以王出王城人焚劉晉知躒趙鞅帥師納王冬十月丙申王起師于滑辛丑在郊遂次于尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚召伯逆王于尸及劉子單子盟癸酉王入于成周晉師使成公般戌周而還王子朝使告於諸侯曰昔武王克殷成王靖四方康王息民並建母弟以蕃屏周亦曰吾無專享文武之功且為後人之迷敗傾覆而溺入于難則振救之至於夷王王愆於厥身諸侯莫不並走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官至于幽王天不弔周王昏不若用愆厥位攜王奸命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力於王室也至于惠王天不靖周生頽禍心施于叔帶惠襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年宣八年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剝亂天下一行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂于王室侵欲無厭規求無度貫瀆鬼神慢弃刑法倍奸齊盟傲很威儀矯誣先王晉為不道是攝是贊思肆其罔極兹不榖震蕩播越竄在荆蠻未有攸底若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圖不榖則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及大子壽蚤夭即世單劉贊私立少以閒先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以專其志無禮甚矣文辭何為二十七年秋㑹于扈令戌周也十二月晉籍秦致諸侯之戌于周二十九年三月己卯京師殺召伯盈尹氏固及原伯魯之子尹固之復也有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三歲乎夏五月庚寅王子趙車入于鄻以叛陰不佞敗之三十二年秋八月王使富辛與石張如晉請城成周天子曰天降禍于周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不遑啓處於今十年勤戌五年余一人無日忘之悶悶焉如農夫之望歲懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈于成王修成周之城俾戌人無勤諸侯用寧蝥賊逺屏晉之力也其委諸伯父使伯父實重圖之俾我一人無徴怨於百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戌周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告於諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衛彪傒曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅况敢干位以作大事乎己丑士彌牟營成周計丈數揣高卑度厚薄仭溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦丈書以授師而效諸劉子韓簡子臨之以為成命定元年春王正月晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政衛彪傒曰將見天子而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原壽過而田於大陸焚焉還卒于寧范獻子去其柏椁以其未復命而田也宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴于鬼宋罪大矣且已無辭而抑我以神誣我也啓寵納侮其此之謂矣必以仲幾為戮乃執仲幾歸諸京師城三旬而畢乃歸諸侯之戌齊高張後不從諸侯晉女叔寬曰周萇𢎞齊高張皆將不免萇𢎞違天高子違人天之所壞不可支也衆之所為不可奸也為哀三年周人殺萇𢎞六年高張來奔起五年春王人殺子朝于楚六年夏周儋翩率王子朝之徒因鄭人將以作亂于周六月晉閻沒戌周冬十二月天王處于姑蕕辟儋翩之亂也七年春儋翩入于儀栗以叛夏四月單武公劉桓公敗尹氏于窮谷尹氏復黨儋翩冬十一月單子劉子逆王于慶氏晉籍秦送王己巳王入于王城八年二月單子伐榖城劉子伐儀栗辛卯單子伐簡城劉子伐盂以定王室二十三年邾人城翼武城人取邾師邾人城翼還自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師邾人訴于晉晉人來討叔孫婼如晉晉人執之使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之乃不果坐韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聽其辭而訴諸宣子士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病將館子於都叔孫旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至二十四年士彌牟逆叔孫于箕叔孫使梁其脛待于門內曰余左顧而欵乃殺之右顧而笑乃止士伯曰寡君以為盟主之故是以久子不腆敝邑之禮將致諸吾子使彌牟逆從者叔孫受禮而歸二十四年日有食之夏五月乙未朔日有食之梓慎曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎過春分陽盛時而不勝隂陽將猥出故為旱陽不克莫將積聚也二十五年宋逐右師叔孫婼聘于宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡夏㑹于黃父趙簡子令諸侯之大夫輸王粟宋樂大心曰我於周為客若之何使客晉士伯曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎右師不敢對受牒而退士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉定六年秋宋樂祁言于景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰子必往陳寅曰子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於綿上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志於宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁八年趙鞅言於晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁卒于大行士鞅曰宋必叛不如止其尸以求成焉乃止諸州九年春宋公使樂大心盟于晉且逆樂祁之尸辭僞有疾乃使向巢子明謂桐門右師出曰吾猶衰絰而子擊鍾何也右師曰喪不在此故也既而告人曰已衰絰而生子余何故舍鍾子明聞之怒言於公曰右師將不利戴氏不肯適晉將作亂也不然無疾乃逐桐門右師季氏逐昭公葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有大喪國不廢搜有三年之喪而無一日之戚國不恤喪不忌君也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國見十一年夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是有伐鼓用幣禮也其餘則否太史曰在此月也日過分而未至未及夏至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣見十七年春叔孫婼聘于宋宋公享昭子賦新宫昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之公若從謂曹氏宋元夫人勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣魯君喪政四公矣無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣魯君失民矣焉得逞其志靖以待命猶可動必憂夏有鸜鵒來巢師已曰異哉吾聞文武之世童謡有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴褰與𥜗鸜鵒之巢逺哉遙遙稠父喪勞宋父以驕鸜鵒鸜鵒往歌來哭童謡有是今鸜鵒來巢其將及乎初季公鳥娶妻於齊鮑文子生申公鳥死季公亥與公思展與申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶己以示秦遄之妻曰公若欲使余余不可而扶余又訴於公甫曰展與夜姑將要余秦姬以告公之公之與公甫告平子平子拘展於卞而執夜姑將殺之公若為之請平子使豎勿納故公若怨平子季郈之雞鬭季氏介其雞郈氏為之金距平子怒益宫於郈氏故郈昭伯亦怨平子臧昭伯之從弟㑹為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老將禘於襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為且與之出射於外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公以戈擊之乃走公曰執之亦無命也懼而不出公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若泄臣不獲死乃館於公叔孫昭子如闞公居於長府九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許請囚於費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將藴藴蓄民將生心生心同求將合君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於衆曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往公徒釋甲執冰而踞遂逐之孟氏見叔孫氏之旌執郈昭伯殺之遂伐公徒子家子曰諸臣僞劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行己亥公孫于齊齊侯唁公于平隂齊侯曰自莒疆以西請致千社以待君命寡人將帥敝賦以從執事公喜子家子曰天祿不再天若胙君不過周公以魯足矣夫魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無繾綣從公無通外內以公命示子家子子家子曰羈也不佞不能與二三子同心而以為皆有罪或欲通內外且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟昭子自闞歸平子稽顙曰茍使意如得改事君所謂生死而骨肉也昭子從公于齊公與昭子言于幄內曰將安衆而納公公徒將殺昭子公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒左師展將以公乘馬而歸公徒執之十一月宋元公將為公故如晉夢大子欒即位于廟已與平公服而相之旦召六卿公曰寡人不佞不能事父兄以為二三子憂若以羣子之靈獲保首領以沒唯是楄柎所以藉幹者請無及先君仲幾對曰君若以社稷之故私降昵宴羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死君命祇辱宋公遂行卒于曲棘二十六年春齊侯取鄆三月公至自齊處於鄆夏齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人高齮能貨子猶為高氏後粟五千庾高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯邪抑魯君有罪於鬼神故及此也君若待於曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衛國也請我受師許之告於齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩於齊齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆魯成備而後告曰不勝衆二十七年秋㑹于扈謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復孟懿子陽貨伐鄆鄆人將戰子家子曰天命不慆久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知冬公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安二十八年春公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聽使請逆于晉晉人曰天禍魯國君淹恤在外亦不使一個辱在寡人而即安於甥舅其亦使逆君使公復於竟而後逆之二十九年春公至自乾侯處于鄆齊侯使高張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯平子每歲賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬衛侯來獻其乘馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以幃裹之三十一年春公在乾侯晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎意如㑹晉荀躒于適歷荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸三十二年十二月公疾遍賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰高岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乘乾曰大壯乾下震上天之道也昔成季友桓之季也文姜之愛子也既而有大功於魯受費以為上卿至於文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人定元年夏叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也寇而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮駕鵝曰吾欲為君諡使子孫知之對曰生不能事死又惡之以自信也將焉用之乃止秋七月癸巳葬昭公於墓道南孔子之為司寇也溝而合諸墓昭公出故季平子禱於煬公九月立煬宫趙簡子問禮黃父之㑹子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦外內以經二物為父子兄弟姑姊甥舅昏媾姻亞以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生于六氣是故審則冝類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協于天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎簡子曰鞅也請終身守此言也楚子常欲立子西楚子使薳射城州屈復茄人焉城丘皇遷訾人焉使熊相禖郭巢季然郭卷子大叔聞之曰楚王將死矣使民不安其土民必憂憂將及王弗能久矣二十六年楚平王卒令尹子常欲立子西曰大子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王二十六年齊侯欲禳彗星齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不諂不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無回德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德回亂民將流亡祝史之為無能補也公說乃止晏子論禮可以為國齊侯與晏子坐于路寢公歎曰美哉室其誰有此乎晏子曰何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釜鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰唯禮可以己之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所禀於天地以為其民也是以先王上之二十七年楚子常滅郤氏楚郤宛直而和國人說之鄢將師為右領與費無極比而惡之令尹子常賄而信讒無極譖郤宛焉謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也令尹將必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰君幾禍子子惡將為子不利甲在門矣令尹使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及他與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何令尹病之楚郤宛之難國言未已進胙者莫不謗令尹沈尹戌言于子常曰夫左尹與中廄尹莫知其罪而子殺之以興謗讟至于今不已戌也惑之仁者殺人以掩謗猶弗為也今子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳出蔡侯朱喪大子建殺連尹奢屏王之耳目使不聰明不然平王之溫惠共儉有過成莊所以不獲諸侯邇無極也今又殺三不辜以興大謗幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位吳新有君疆場日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月子常殺費無極與鄢將師盡滅其族以說于國謗言乃止二十八年晉滅祁氏羊舌氏晉祁勝與塢臧通室祁盈將執之訪於司馬叔游叔游曰鄭書有之惡直醜正實蕃有徒無道立矣子懼不免詩曰民之多辟無自立辟姑已若何盈曰祁氏私有討國何有焉遂執之祁勝賂荀躒荀躒為之言於晉侯晉侯執祁盈六月殺祁盈及楊食我食我祁盈之黨也而助亂故殺之遂滅祁氏羊舌氏初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉蚤死無後而夭鍾美於是將必以是大有敗也昔有仍氏生女黰黑而甚美光可以鑑名曰𤣥妻樂正后䕫取之生伯封實有豕心貪婪無饜忿纇無期謂之封豕有窮后羿滅之䕫是以不祀且三代之亡共子之廢皆是物也女何以為哉夫有尤物足以移人茍非德義則必有禍叔向懼不敢取平公强使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豹狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視秋晉韓宣子卒魏獻子為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為塢大夫賈辛為祁大夫司馬烏為平陵大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫謂賈辛司馬烏為有力于王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者皆受縣而後見於魏子以賢舉也魏子謂成鱄吾與戊也縣人其以我為黨乎對曰何也戊之為人逺不忘君近不逼同居利思義在約思純有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他惟善所在親疏一也詩曰惟此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔既受帝祉施于孫子心能制義曰度德正應和曰莫昭臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文九德不愆作事無悔故襲天祿子孫賴之主之舉也近文德矣所及其逺哉賈辛將適其縣見于魏子魏子曰辛來昔叔向適鄭鬷蔑惡欲觀叔向使從之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力仲尼聞魏子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎冬梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之魏戊謂閻沒女寬曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諌皆許諾退朝待於庭饋入召之比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人二十九年龍見于絳郊秋龍見于絳郊魏獻子問於蔡墨曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏獻子曰何謂也對曰昔有飂叔安有裔子曰董父實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川鬷夷氏其後也故帝舜氏世有畜龍及有夏孔甲擾于有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷于魯縣范氏其後也獻子曰今何故無之對曰夫物物有其官官修其方朝夕思之一日失職則死及之失官不食官宿其業其物乃至若泯棄之物乃坻伏鬱湮不育故有五行之官是為五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰句芒火正曰祝融金正曰蓐收水正曰𤣥冥土正曰后土龍水物也水官棄故龍不生得不然周易有之在乾之姤巽下乾上曰潛龍勿用其同人離下乾上曰見龍在田其大有乾下離上曰飛龍在天其夬乾下兌上曰亢龍有悔其坤坤下坤上曰見羣龍無首吉坤之剝坤下艮上曰龍戰于野若不朝夕見誰能物之獻子曰社稷五祀誰氏之五官也對曰少皞氏有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為𤣥冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之晉范中行之亂晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉將守唐叔之所受法度以經緯其民卿大夫以序守之民自以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之搜也晉國之亂制也若之何以為法蔡史墨曰范氏中行氏其亡乎中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也其及趙氏趙孟與焉然不得已若德可以免定十三年晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午歸告其父兄父兄皆曰不可衛是以為邯鄲而置諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之于晉陽趙孟怒召午而囚諸晉陽使告邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷涉賔以邯鄲叛夏六月籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲將作亂董安于聞之告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之范皋夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范皋夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊高彊曰三折肱知為良醫唯伐君為不可弗聽遂伐公國人助公二于敗從而伐之丁未荀寅士吉射奔朝歌韓魏以趙氏為請十二月辛未趙鞅入于絳盟于公宫十四年梁嬰父惡董安于謂知文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先發難也討于趙氏文子使告於趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也敢以告趙孟患之安于曰我死而晉國寧趙氏定將焉用生乃縊而死趙孟尸諸市而告于知氏知伯從趙孟盟而後趙氏定祀安于於廟夏晉人圍朝歌公㑹齊侯衛侯于脾上梁之間秋齊侯宋公㑹于洮范氏故也冬十二月晉人敗范中行氏之師於潞獲籍秦高彊又敗鄭師及范氏之師于百泉哀元年夏齊侯衛侯救邯鄲二年六月晉趙鞅納衛大子于戚秋齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇于戚簡子誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車朴馬無入于兆下卿之罰也將戰郵無恤御簡子衛大子為右登鐵上望見鄭師衆大子懼自投于車下子良授大子綏而乘之曰婦人也簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死于牖下羣子勉之死不在寇衛大子禱曰曾孫蒯瞶敢昭告皇祖文王列祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯瞶不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人擊簡子中肩斃於車中獲其蜂旗大子救之以戈鄭師北大子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傅叟曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨稅焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蜂旗於子姚之幕下獻曰請報主德既戰簡子曰吾伏韜嘔血鼓音不衰今日我上也大子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也駕而乘材兩靷皆絶三年劉氏范氏世為昏姻萇𢎞事劉文公故周與范氏趙鞅以為討六月周人殺萇𢎞冬十月晉趙鞅圍朝歌師于其南荀寅犯師而出癸丑奔邯鄲四年秋齊陳乞弦施衛寧跪救范氏九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨十二月弦施逆之國夏伐晉㑹鮮虞納荀寅于柏人五年春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張栁朔言諸昭子使為柏人昭子曰夫非而讎乎對曰私讐不及公好不廢過惡不去善義之經也臣敢違之及范氏出張栁朔謂其子爾從主勉之我將止死王生授我矣吾不可以僭之遂死於柏人三十一年邾黑肱以濫來奔冬邾黑肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有名而不知其已以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回不為義疚或求名而不得或欲蓋而名章懲不義也齊豹為衛司寇守嗣大夫作而不義其書為盜邾庶其莒牟夷邾黑肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之民將置力焉是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之三十二年越滅吳吳伐越始用師于越也史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶定五年越入吳吳在楚也十四年吳伐越越子句踐禦之陳于檇季勾踐患吳之整也使死士再禽焉不動使罪人三行屬劔於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢亡三年乃報越哀元年吳王夫差敗越於夫椒報檇李也遂入越越子以甲楯五千保于㑹稽使大夫種因吳大宰嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸于有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其德而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物今吳不如過而越大於少康或將豐之不亦難乎勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讐於是克而弗取將乂存之違天而長寇讐後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長寇讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎三月越及吳平吳之入楚也使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨逢滑當公而進曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莽而未見德焉天其或者正訓楚也禍之適吳其何日之有陳侯從之及夫差克越乃修先君之怨秋八月吳侵陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不雕鏤宫室不觀舟車不飾衣服財用擇不取費在國天有菑癘親巡孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我七年公㑹吳于鄫吳來徴百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦惟執事吳人弗聽景伯曰吳將亡矣棄天而背本不與必棄疾於我乃與之大宰嚭召季康子康子使子貢辭大宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髮文身裸以為飾豈禮也哉有由然也反自鄫以吳為無能為也十一年吳伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諌曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如蚤從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殘無遺育無俾易種于兹邑是商所以興也今君易之將以求大不亦難乎弗聽使于齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毀天之道也十三年夏公㑹單平公晉定公吳夫差于黃池六月越子伐吳為二隊疇無余謳陽自南方先及郊越子至丙戌戰大敗吳師獲吳大子友王孫彌庸壽于姚丁亥入吳吳人告敗于王王惡其聞也自剄七人於幕下冬吳及越平十七年三月越子伐吳吳子禦之笠澤夾水而陳越子為左右句卒使夜或左或右鼓譟而進吳師分以御之越子以三軍潛涉當吳中軍而鼓之吳師大亂遂敗之二十年吳公子慶忌驟諌吳子曰不改必亡弗聽出居于艾遂適楚聞越將伐吳冬請歸平越遂歸欲除不忠者以說于越吳人殺之十一月越圍吳趙孟降於喪食楚隆曰三年之喪親昵之極也主又降之無乃有故乎趙孟曰黃池之役先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之非晉之所能及也吾是以為降楚隆曰若使吳王知之若何趙孟曰可乎隆曰請嘗之乃往造於越軍曰吳犯閒上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君志之不從請入視之許之告於吳王曰寡君之老無恤使陪臣隆敢展謝其不共黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問趙孟曰勾踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉二十二年冬十一月丁卯越滅吳請使吳王居甬東辭曰孤老矣焉能事君乃縊越人以歸春秋左傳事類始末卷四
