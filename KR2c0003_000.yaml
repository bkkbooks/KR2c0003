front:
  text: 欽定四庫全書史部三
  hash: sha256:d3308b50e4253ae4cf1fd11436c8c98b0055b2094c71ac585b2b478dae009fce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0003_WYG_000-1a, image: WYG0349/WYG0349-0445a.png}
body:
  text: 春秋左傳事類始末目録紀事本末類隱公元年鄭伯克段三年周鄭交惡宋穆立殤州吁弒桓五年如棠觀魚鄭敗燕師始用六佾六年陳及鄭平八年祊易許田鄭公子忽逆婦媯羽父請族九年鄭伯以王命討宋鄭人大敗戎師十一年滕侯薛侯爭長鄭莊入許息侯伐鄭羽父弒隱桓公二年曲沃滅晉六年楚子伐隨昭厲之亂子同生九年曹太子來朝十年虞叔伐虞公十一年屈瑕敗師十六年急壽相死十七年及齊師戰于奚十八年桓公薨于齊王殺周公黑肩莊公四年楚武王伐隨卒六年楚滅鄧八年齊師圍郕桓公殺子紏十年楚子入蔡十一年宋立桓公齊桓征伐盟會十八年虢公晉侯朝王鬻拳自殺十九年五大夫立子頽二十二年陳敬仲辭工正二十三年公如齊觀社晉去桓莊之族丹桓宮之楹二十六年晉滅虞虢二十八年驪姬之難申公鬭班殺子元三十二年共仲弒子般立閔公閔公元年邢遷夷儀晉侯作二軍二年齊封衛楚丘僖公四年鄭殺申侯五年鄭殺大子華周子帶之亂六年楚子圍許八年晉敗狄于采桑魚氏世為左師九年晉惠懷之敗十六年宋襄爭盟十八年鄭鑄三鍾衛文滅邢梁亡二十年王救滑以狄師伐鄭狄伐周王適鄭隨以漢東諸侯叛楚二十一年大旱飢而不害魯封須句二十二年秦晉遷陸渾之戎于伊川二十三年楚子玉敗師城濮秦伯納晉侯二十四年鄭殺子臧鄭享宋成公有加二十六年晉文城濮之戰夔子不祀祝融鬻熊二十八年王釋衛侯晉復曹伯晉敗秦師于殽晉置軍行二十九年介葛盧來朝三十年王使周公閲來聘三十一年狄圍衛衛遷于帝丘三十三年齊國莊子來聘胥臣舉郤缺楚殺令尹子上文公元年穆伯從巳氏於莒閏三月非禮晉及衛成楚穆王立穆伯如齊始聘二年躋僖公襄仲立宣公晉人改陽處父之盟四年楚滅江秦伯降服衛寧武子來聘五年楚滅六蓼臯陶不祀賈季殺陽處父六年秦伯任好卒以三良為殉晉立靈公復士會七年宋襄公夫人殺昭公立文公狄侵魯西鄙八年賊殺先克晉殺先都九年晉弒靈公楚滅若敖氏十年楚范巫矞似謂三君皆將強死十一年鄋瞞遂亡十三年邾文公卜遷于繹衛鄭因魯公請平于晉十四年齊懿公弒立邾立定公十五年宋華耦來盟辭宴魯文公薨齊懿公弒十六年楚滅庸十八年襄仲立宣公宣公納莒僕季文子出諸竟宣公二年晉於是有公族三年楚問周鼎鄭穆公妾夢天與之蘭四年魯宣公伐莒非禮鄭子公子家弒靈公六年晉滅赤狄晉楚戰于邲鄭殺公子曼滿八年晉滅三郤九年楚殺陳夏徴舒十一年楚蒍艾獵城沂十二年楚子伐蕭晉宋衛同盟于清丘十四年楚莊伐宋魯逐東門氏十五年魏顆從武子治命十六年晉侯使士會平王室十七年齊晉鞍之役十八年楚盟諸侯于蜀成公元年王師敗績于茅戎二年宋文公始厚葬申公巫臣通吳於上國三年晉楚救宋鄭晉衛尋盟四年魯成公如晉晉滅趙氏五年梁山崩六年晉遷于新田七年吳伐郯宋華元合晉楚之成晉楚鄢陵之役晉弒厲公衛侯復孫林父八年宋華元來聘伯姬楚伐莒莒無備而潰十一年晉敗秦師于麻隧十三年曹負芻殺太子自立十四年衛孫寧之亂十五年桓族亂宋十六年宣伯問魯于晉十七年齊國佐殺慶克齊殺國佐聲伯夢涉洹楚滅舒庸十八年晉立悼公襄公二年齊滅萊晉和戎服鄭三年楚伐吳所獲不如所亡魯襄公始朝晉祁奚請老陳服于晉魏絳戮揚于之僕四年穆叔如晉魯始髽五年季文子卒七年三卜郊不從免牲晉韓獻子請老九年宋災穆薑薨於東宮秦景公乞師于楚以伐晉十年公會吳于柤晉滅逼陽盜殺鄭執政王叔陳生與伯輿爭政十一年季武子作三軍十二年吳子壽夢卒靈王求后於齊十三年晉侯搜于綿上楚共王卒子囊卒吳侵楚楚敗吳師十四年子叔齊子為季武子介自是晉敬魯使吳公子光之亂晉伐秦遷延之役晉盡殺欒氏之族黨吳敗楚歸師湨梁之會十五年宋向戌尤孟獻子之室楚能官人宋子罕弗受獻玉十六年宋子罕止築臺者之謳齊晏桓子大夫而行士喪禮十九年齊崔慶之亂衛石共子卒二十年陳殺二慶季武子如宋聘二十一年魯季孫來外盜楚殺子南羊石氏之族及於難二十二年穆叔能用教晉召鄭朝鄭子張善戒鄭遊反奪逆妻者二十三年杞孝公卒晉平公不徹樂臧紇作不順去魯二十四年穆叔對死而不朽范宣子重幣鄭伯朝晉且請伐陳楚滅舒鳩豎牛亂叔孫氏子産始知然明二十五年宋向戌弭諸侯之兵楚蒍掩得治國之禮二十六年晉叔向召行人子貟鄭請印堇父宋左師伊戾殺太子楚聲子復椒舉韓宣子辭不失舊晉趙文取喪邑復諸侯二十八年無冰宋鄭其飢子産知蔡景侯不免鄭伯有侈愎而死二十九年公治致其邑於季氏鄭罕宋樂施而不德晉平公城杞吳公子札請觀周樂齊放其大夫髙止三十年楚令尹圍行大事宋災楚滅陳蔡楚靈王之死平王之立鄭子皮授子産政子産為政三十一年穆叔劉定公秦后子知趙孟之死晏子知薑弱媯氏始昌晏子知昭公不能終子服惠伯知滕成公將死子産如晉壞墻垣北宫文子謂鄭有禮鄭子産不毁鄉校昭公元年季武子伐莒瀆齊盟楚人欲戮叔孫鄭討公孫黑之罪秦后子有寵於桓如二君懼選適晉晉中行敗狄于大鹵晉侯有疾鄭公孫僑問疾二年韓宣子聘魯見易象與魯春秋如齊逆女叔弓聘于晉辭郊勞三年鄭伯如晉晉賜公孫段州田小邾穆公來朝四年楚使椒舉請昏于晉正月大雨雹鄭子産作丘賦吳伐楚報朱方之役五年魯昭公如晉郊勞贈賄無失禮六年鄭人鑄刑書齊侯如晉請伐燕十年楚子成章華之臺昭公如楚晉侯問士文伯日食晉侯有疾韓宣子問夢于子産衛立靈公八年石言于晉晉成虒祁之宫諸侯有二心係十三年大搜于紅九年周甘人與晉閻嘉爭閻田晉荀盈卒晉侯飲酒樂築郎囿十年平子伐莒始用人於亳社宋平公卒十一年單成公卒十二年齊衛鄭如晉朝嗣君南蒯以費叛十三年楚殺鬭成然平王使枝如子躬聘于鄭叔向制刑不隱於親晉滅鼓吳滅州來十五年禘于武公叔弓卒楚費無極害朝吳在蔡穆后崩景王求彞器於晉十六年楚取蠻氏齊侯伐徐賂以鼎而還晉韓起聘鄭求環昭公至自晉鄭大旱十七年小邾穆公來朝剡子來朝晉滅陸渾氏星孛于大辰宋衛陳鄭皆火十九年楚工尹赤遷陰于下陰吳用伍貟之謀楚始病齊師入紀鄭大水二十年宋華向之亂衛齊豹北宫喜禇師圃公子朝之亂齊侯疥晏子言修德而可齊侯田晏子論和同子産古之遺愛二十一年天王將鑄無射蔡侯奔楚魯以十一牢禮晉士鞅叔輒哭日食二十二年王子朝之亂二十三年邾人城翼還武城人取邾師二十四年日有食之二十五年宋逐右師季氏逐昭公趙簡子問禮楚子常欲立子西二十六年齊侯欲禳彗星晏子論禮可以為國二十七年楚子常滅卻氏二十八年晉滅邾氏羊舌氏二十九年龍見于絳郊晉范中行之亂三十一年邾黑肱以濫來奔三十二年越滅吳定公二年邾莊公卞急而好潔四年劉文公合諸侯于召陵長衛侯於盟鄭子大叔卒五年魯陽虎之亂八年定公侵齊門于陽州魯始尚羔衛叛晉鄭駟歂用鄧析竹刑十年齊人歸鄆歡龜陰之田宋寵向魋十二年衛公孟彄伐曹魯墮三都十三年衛逐公叔氏十四年衛蒯瞶輒爭國十五年邾隱公來朝哀公三年桓僖災季孫有疾命正常以後事五年齊陽生弒荼鄭駟秦富而侈六年楚滅陳七年魯伐邾吳齊伐魯宋滅曹九年鄭圍宋取邑大敗晉卜救鄭十一年陳轅頗出奔鄭衛太叔疾出奔宋季孫用田賦十二年昭夫人孟子卒十四年西狩獲麟小邾射以句繹來奔陳常弒簡公宋桓魋之亂成叛十六年孔丘卒楚白公之亂十八年楚公孫寧敗巴師二十一年越人始來二十三年宋景曹卒晉伐齊二十四年哀公如越二十六年宋立昭公二十七年越子盟于平陽晉荀瑶伐鄭臣等謹案春秋左氏傳事類始末五卷宋章沖撰沖字茂深葉夢得之壻淳熙中嘗知台州是書用史家記事之例初别六家後歸二體編年紀傳相輔而行至宋孝宗時袁樞創紀事本末使一事自具首尾循覽易明遂於二體之外别為門徑左傳隨經𨽻事體本編年又加以先經後經錯經諸例端緒彌為紛繁讀者猝難融貫沖作是書一如袁樞通鑑紀事本末之體聯貫排比使一事自為起訖雖無關經義而頗便檢尋自沖以後編録左氏書者或以國分或以人分或以事分凡數十家而未已雖體例小殊其源皆自沖發也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
