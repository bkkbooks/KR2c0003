body:
  text: 春秋左氏傳事類始末附録災異日食三十有六書既三朔書朔書日二十六一書日不書七書朔不書日不書朔與日二隱三年春王二月己巳日有食之桓三年秋七月壬辰朔日有食之既十七年冬十月朔日有食之莊十八年春王三月日有食之二十五年六月辛未朔日有食之二十六年冬十有二月癸亥朔日有食之三十年九月庚午朔日有食之僖五年九月戊申朔日有食之十二年三月庚午日有食之十五年夏五月日有食之文元年二月癸亥日有食之十五年六月辛丑朔日有食之宣八年秋七月甲子日有食之既十年夏四月丙辰日有食之十七年六月癸卯日有食之成十六年六月丙寅朔日有食之十七年十有二月丁巳朔日有食之襄十四年二月乙未朔日有食之十五年秋八月丁巳日有食之二十年冬十月丙辰朔日有食之二十一年九月庚戌朔日有食之冬十月庚辰朔日有食之二十三年二月癸酉朔日有食之二十四年秋七月甲子朔日有食之既八月癸巳朔日有食之二十七年冬十二月乙亥朔日有食之昭七年夏四月甲辰朔日有食之十五年六月丁巳朔日有食之十七年夏六月甲戌朔日有食之二十一年秋七月壬午朔日有食之二十二年十有二月癸酉朔日有食之二十四年夏五月乙未朔日有食之三十一年十有二月辛亥朔日有食之定五年三月辛亥朔日有食之十二年十有一月丙寅朔日有食之十五年八月庚辰朔日有食之地震五文九年九月癸酉地震襄十六年五月甲子地震昭十九年五月己卯地震二十三年八月乙未地震哀三年夏四月甲午地震星隕一莊七年夏四月辛卯夜恆星不見夜中星隕如雨星孛三文十四年星孛入于北斗昭十七年星孛于大辰哀十三年星孛于東方雨雹三僖二十有九年秋大雨雹昭三年冬大雨雹四年春正月大雨雹雨雪三隱九年三月庚辰大雨雪桓八年冬十月雨雪僖十年冬大雨雪大雨震電一隱九年三月癸酉大雨震電震一僖十五年九月己卯晦震夷伯之廟隕霜不殺草一僖三十三年十二月隕霜不殺草李梅實隕霜殺菽一定元年十月隕霜殺菽無冰三桓十四年春無冰成元年二月無冰襄二十八年春無冰木冰成十六年春王正月雨木冰火災十二火一災十一桓十四年御廩災莊二十年齊大災僖二十年西宫災宣十六年成周宣榭火成三年新宫災襄九年宋災三十年宋災昭九年陳災十八年宋衛陳鄭災定二年雉門及兩觀災哀三年桓宫僖宫災四年亳社災屋壞一文十三年大室屋壞山崩二僖十四年沙鹿崩成五年梁山崩有年二桓三年冬有年宣十六年冬大有年大水九桓元年秋大水十三年夏大水莊七年秋大水十一年秋宋大水二十四年秋八月大水二十五年秋大水宣十年秋大水成五年秋大水襄二十四年秋七月大水不雨七莊三十一年冬不雨僖二年冬十月不雨三年春正月不雨夏四月不雨文二年自十二月不雨至于秋七月十年自正月不雨至於秋七月十三年自正月不雨至於秋七月大旱二僖二十一年夏大旱宣七年秋大旱飢三宣十年冬飢十五年冬飢襄二十四年冬大飢螽十桓五年秋螽僖十五年秋八月螽文八年冬十月螽宣六年秋八月螽十三年秋螽十五年秋螽襄七年八月螽哀十二年十二月螽十三年九月螽十有二月螽雨螽一文三年秋雨螽于宋蝝一宣十五年冬蝝生螟三隱五年九月螟八年九月螟莊六年秋螟蜚一莊二十九年秋有蜚無麥苗一莊七年秋無麥苗無麥禾一莊二十八年冬大無麥禾􅈮一短狐也含沙射人莊十八年秋有􅈮麋一莊十七年冬多麋鸜鵒來巢一昭二十五年夏有鸜鵒來巢隕石退鷁一僖十六年春正月戊申朔隕石于宋五是月六鷁退飛過宋都弒君二十六稱臣以弒十七稱人以弒三稱國以弒四隱四年衛州吁弒其君完十一年公薨左羽父使賊弒公于寪氏桓二年宋督弒其君與夷莊八年齊無知弒其君諸兒十二年宋萬弒其君捷閔二年公薨左共仲使卜齮賊公于武闈僖十年晉里克弒其君卓文元年楚商臣弒其君頵十四年齊商人弒其君舍十六年宋人弒其君杵臼十八年齊人弒其君商人冬莒弒其君庶其宣二年晉趙盾弒其君夷皋四年鄭歸生弒其君夷十年陳夏徴舒弒其君平國成十八年晉弒其君州蒲襄二十五年齊崔杼弒其君光二十六年衛寧喜弒其君剽二十九年閽弒吳子餘祭三十年蔡般弒其君固三十一年莒人弒其君密州昭十三年楚公子比弒其君虔十九年許止弒其君買二十七年吳弒其君僚定十三年薛弒其君比哀六年齊陳乞弒其君荼左氏記鄭子駟弒僖公楚公子圍弒郟敖不見於經亡國三十二自亡一吳滅二齊滅五五諸侯同滅二蔡楚滅十魯衛狄莒鄭各一晉滅三莊十年齊滅談十三年齊滅遂僖五年楚滅弦十年狄滅溫十二年楚滅黃十七年滅項十九年梁亡二十五年衛滅邢二十六年楚滅夔文四年楚滅江五年楚滅六十六年楚人秦人巴人滅庸宣八年楚滅舒蓼十二年楚滅蕭十五年晉滅潞十六年晉滅赤狄甲氏留吁成十七年楚滅舒庸襄六年莒滅鄫十二月齊滅萊十年諸侯滅逼陽二十五年楚滅舒鳩昭四年楚滅賴八年楚滅陳十三年封十一年楚滅蔡十三年封十三年吳滅州來十七年晉滅陸渾戎二十四年吳滅巢三十年吳滅徐定四年蔡滅沈六年鄭滅許哀元年許男成復見經十四年楚滅頓十五年楚滅胡左氏記滅而經不書及書入書取者凡十六國莊十四年楚滅息十六年楚滅鄧閔元年晉滅耿滅霍滅魏二年狄滅衛書入僖五年晉滅虢滅虞書執虞公三十三年秦滅滑書入文五年楚滅蓼宣九年取根牟成六年取鄟襄十三年取邿昭十二年晉滅肥定五年楚滅唐哀八年宋滅曹書入力役宫室莊二十九年春新延廏僖二十年春新作南門成六年二月立武宫定元年九月立煬宫二年冬十月新作雉門及兩觀城築城一十八外城三內城二十五築六隱七年夏城中丘九年夏城郎桓五年夏城祝丘十六年冬城向莊二十八年冬築郿二十九年冬十二月城諸及防三十一年春築臺于郎夏四月築臺于薛秋築臺于秦三十二年春城小榖僖元年夏六月齊宋曹城邢二年正月城楚丘十四年春諸侯城緣陵文七年三月城郚十二年十二月城諸及鄆宣八年十月城平陽成四年冬城鄆九年十一月城中城十八年秋八月築鹿囿襄二年冬諸侯城虎牢七年夏四月城費十三年冬城防十五年夏城成郛十九年冬城西郛城武城昭九年冬築郎囿三十二年冬諸侯城成周定六年冬城中城十四年秋城莒父及霄十五年冬城漆哀三年夏五月城啓陽四年夏城西郛五年春城毗六年春城邾瑕左氏記隱元年夏城郎冬新作南門不書於經時政爰田分公田之稅應入公者爰於所賞之衆僖十五年秦晉戰於韓秦獲晉侯穆公許晉平晉侯使郤乞告瑕吕飴甥子金教之言曰朝國人而以君命賞晉於是乎作爰田州兵五黨為州使州長各繕兵同上吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆説晉於是乎作州兵稅畝公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初宣十五年初稅畝非禮也榖出不過籍以豐財也丘甲周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸賦也魯使丘出之成元年為齊難故作丘甲丘賦丘嘗出馬一匹牛三頭今子産别賦其田如魯田賦昭四年秋鄭子産作丘賦刑書鑄刑書於鼎以為國常法昭六年三月鄭人鑄刑書二十九年冬晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉竹刑析改鄭刑書私造憲法書之竹簡故名竹刑定九年鄭駟歂殺鄧析而用其竹刑田賦田賦之法曰其田財通出馬故匹牛三頭今欲别其田與財各為一賦言田賦哀十二年春王正月用田賦陳名魚麗桓五年王以諸侯伐鄭鄭伯禦之曼伯為右拒拒方陳祭足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫車二十五乘為偏以車居前以伍次之承偏之隙而彌縫其闕漏也此魚麗陳法荆尸莊四年楚武王荆尸授師孑焉以伐隨武王更為楚陳兵之法孑戟也楚始於此參用戟為陳左盂右盂盂田獵陳名文十年楚子將伐宋宋公逆之勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂左拒右拒宣十二年邲之役楚工尹齊將右拒卒以逐晉下軍潘黨率遊闕遊車補闕者四十乘從唐侯以為左拒以從晉上軍崇卒昭元年晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍為五陳以相離兩於前伍於後專為右角參為左角偏為前拒鵝鸛昭二十一年諸侯救宋與華氏戰于赭丘鄭翩願為鸛其御願為鵝左右句卒哀十七年越子伐吳夾水而陳越子為左右句卒鉤伍相著别為左右屯使夜或左或右鼓譟而進吳分師御之越子以三軍潛涉當吳中軍而鼓之大敗之支離之卒哀二十五年衛出公為支離之卒以侵衛器物蝥弧旗皋比虎皮金僕姑矢絰皇冡前闕鞶鑑帶以鑑為飾丁寧鉦笠轂兵車無蓋尊者則人執笠依轂而立以禦寒暑軘車兵車窒皇寢門闕佐車副車紀甗玉甑賦輿兵車巢車車上有櫓跗注戎服頌琴送終雅琴畚挶簣籠土輿旌夏大旌廣車兵車彞器鍾鼎宗器鍾磬武軍營壁大蔡龜寢戈親近兵仗長轂兵車大屈弓靈姑銔旗復陶羽衣餘皇舟無射鍾楄柎棺中笭牀僂句龜啓服馬龍輔玉肅爽馬繁弱弓少帛雜帛大吕鍾闕鞏甲沽洗鍾昭兆龜羽毛旌蔥靈輜車屬辟棺重數大器鍾鼎屬鏤劒衷甸一轅卿車列國興廢周自后稷凡二十七世至幽王四十九年己未入春秋至敬王三十九年庚申厯十三王春秋終自後傳九王又分為東西凡二百二十六年秦併之魯自周公凡十五世至隱公元年入春秋至哀公十四年厯十二君春秋終自後傳八君凡二百年楚滅之齊自太公凡十三世至僖公九年入春秋至簡公四年厯十四君春秋終自後傳三君凡九十五年為田氏田氏自傳七世凡百七十一年而秦滅之比諸國最後亡晉自叔虞成王封之凡十三世至鄂侯二年入春秋至定公三十一年厯十八君四世後曲沃武公入併晉春秋終自後傳六君凡一百五年魏韓趙滅之三國韓先亡趙次之魏又次之秦自秦仲宣王使為大夫始大其孫襄公始為諸侯凡四世至文公四十四年入春秋至悼公十年厯十五君春秋終自後傳十五君凡二百六十六年而始皇併天下二十六年併天下自秦仲至此六百二十五年楚自熊繹成王時封凡十八世至武王十九年入春秋至惠王八年厯十三君春秋終自後傳十二君凡二百五十八年秦滅之宋自微子武王封之朝鮮成王命代商後凡十四世至穆公七年入春秋至景公三十六年厯十三君春秋終自後傳六君凡百九十七年齊魏楚滅之衛自康叔成王封之凡十二世至桓公十三年入春秋至出公十二年厯十五君春秋終自後傳十四君降稱侯又降稱君凡二百六十三年秦併之雖後齊亡而微甚矣陳自胡公滿武王封之凡十二世至桓公二十三年入春秋至緡公二十一年厯十二君春秋終自後三年而楚滅之蔡自蔡叔武王時封凡十一世至宣侯二十八年入春秋至成侯十年厯十二君春秋終自後傳三君凡三十四年楚滅之曹自振鐸武王時封凡十一世至桓公三十五年入春秋至伯陽十五年厯十五君先春秋六年宋滅之鄭自桓公友宣王時封凡三世至莊公二十二年入春秋至聲公二十年厯十六君春秋終自後傳五君凡一百四年韓滅之燕自召公與周吕皆武王所封凡十四世至穆侯七年入春秋至獻公十二年厯十七君春秋終自後傳十三君凡二百五十九年秦滅之吳自大伯凡十九世至壽夢二年始見於經至魯哀公二十二年厯七君夫差滅春秋諸侯名字可知者百七十餘國不可盡考此皆大國不可不知其始末也諸國吳最後興曹先滅陳次之吳又次之春秋之後蔡先滅齊次之為田氏鄭晉宋魯周楚燕衛以次滅春秋左氏傳事類始末附録
