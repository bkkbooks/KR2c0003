body:
  text: 春秋左傳事類始末卷一宋章沖撰隱公十一年元年鄭伯克段鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位請京使居之謂之京城大叔祭仲曰都城過百雉國之害也方丈曰堵三堵曰雉侯伯之城方五里徑三百雉故都城不過百雉先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如蚤為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於己公子吕曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收二以為己邑子封曰厚將得衆公曰不義不昵厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢大叔出奔共遂置姜氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之公曰爾有母遺繄我獨無潁考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也泄泄遂為母子如初君子曰潁考叔純孝也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎三年周鄭交惡鄭武公莊公為平王卿士王二于虢鄭伯怨王王曰無之故周鄭交質王崩周人將畀虢公政鄭祭足帥師取溫之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之茍有明信澗溪沼沚之毛蘋蘩蕰藻聚藻之菜筐筥錡釜之器潢汙停水行潦流潦之水可薦於鬼神可羞於王公而况君子結二國之信行之以禮又焉用質風有采蘩采蘋雅有行葦泂酌昭忠信也六年鄭伯如周始朝桓王也奪政後始朝王不禮焉周桓公言於王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇況不禮焉鄭不來矣八年虢公忌父始作卿士于周十一年王取塢劉蒍邘之田于鄭而與鄭人蘇忿生之田君子是以知桓王之失鄭也恕而行之德之則也禮之經也已弗能有而以與人人之不至不亦宜乎桓五年王奪鄭伯政鄭伯不朝王以蔡人衛人陳人伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而萃於王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍車二十五乘曰偏伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人況敢陵天子乎茍自救也社稷無隕多矣宋穆立殤宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居于鄭穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫商頌曰殷受命咸宜百祿是荷其是之謂乎桓元年宋華父督見孔父之妻于路目逆而送之曰美而豔二年春督殺孔父而取其妻公怒督懼遂弒殤公初殤公立十年十一戰民不堪命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂公故遂相宋公夏取郜大鼎于宋納于大廟臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席結草大羮不致粢食不鑿昭其儉也衮冕黻韋韠也以蔽膝珽它頂切玉笏帶裳帶革帶也幅音逼行縢舄復履衡紞多敢切冠之垂者紘宏音纓從下而上者綎延音冠上覆昭其度也藻率律音以韋為之用以藉玉鞞鞛鞶紳帶厲大帶垂者遊旌旗之遊纓在馬前昭其數也火龍黼黻昭其文也五色比象昭其物也鍚鑾和鈴鍚在馬額鑾在鑣和在衡鈴在旗昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而況將昭違亂之賂器於大廟其若之何公不聼周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德州吁弒桓衛莊公娶于齊東宫得臣之妹曰莊姜美而無子又娶于陳曰厲媯生孝伯早死其娣戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕之忍切重也者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁遊禁之不可桓公立乃老四年春州吁弒桓公而立初宋殤公之即位也公子馮出奔鄭鄭人欲納之及州吁立將修先君之怨于鄭而求寵於諸侯以和其民使告于宋曰君若伐鄭以除君害敝邑以賦與陳蔡從故宋公陳侯蔡人衛人伐鄭公問於衆仲曰衛州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖於衛衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎衛人逆公子晉于邢而立之五年如棠觀魚公如棠觀魚臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春搜夏苖秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從僖伯卒公曰叔父有憾於寡人寡人弗敢忘葬之加一等鄭敗燕師鄭人侵衛牧衛人以燕師伐鄭鄭祭足原繁泄駕以三軍軍其前使曼伯與子元濳軍軍其後燕人畏鄭三軍而不虞制人鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師始用六佾考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也六年陳及鄭平鄭伯侵陳大獲往嵗鄭伯請成于陳陳侯不許五父諫曰親仁善鄰國之寶也君其許鄭陳侯曰宋衛實難鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎商書曰惡之易也如火之燎于原不可鄉邇其猶可撲滅周任有言曰為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣七年陳及鄭平陳五父如鄭涖盟㰱如忘泄伯曰五父必不免不賴盟矣鄭良佐如陳涖盟亦知陳之將亂也桓五年春陳侯鮑卒文公子他殺大子免而代之六年蔡人殺陳他八年祊易許田鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯來歸祊不祀泰山也桓元年公即位修好于鄭鄭人請復祀周公卒易祊田公許之鄭伯以璧假許田為周公祊故也鄭公子忽逆婦媯鄭公子忽在王所陳侯請妻之忽逆婦媯以歸陳針子送女先配而後祖針子曰是不為夫婦誣其祖矣禮逆婦必先告祖廟而後行故楚公子圍稱告莊共之廟鄭忽先逆婦而後告廟故曰先配而後祖羽父請族無駭卒羽父請諡與族公問族於衆仲對曰天子建德因生以賜姓若舜由媯汭故陳為媯姓胙之土而命之氏報之以土命氏曰陳諸侯以字諸侯不得賜姓故其臣因王父字為諡因以為族或即先入之諡為族官有世功則有官族邑亦如之公命以字為展氏九年鄭伯以王命討宋宋公不王鄭伯為王左卿士以王命討之十年夏六月戊申公㑹齊侯鄭伯于老桃壬戌公敗宋師于菅庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也鄭人大敗戎師北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也公子突曰使勇而無剛者嘗寇而速去之君為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝聃逐之衷戎師前後擊之盡殪戎師大奔鄭人大敗戎師十一年滕侯薛侯爭長滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰周諺有之山有木工則度之賔有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯鄭莊入許鄭伯將伐許授兵于大宫公孫閼與潁考叔爭車秋七月公㑹齊侯鄭伯伐許庚辰傅于許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顚瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登壬午遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既服其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞于許君而假手于我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口於四方其況能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子若寡人得沒于地天其以禮悔禍于許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾婦之父曰昏重昏曰媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而況能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此王室而既卑矣周之子孫日失其序夫許大嶽之𦙍也天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮禮經國家定社稷序民人利後嗣者也許無刑而伐之服而舍之度德而處之量力而行之相時而動無纍後人可謂知禮矣鄭伯使卒出豭行出犬雞百人為卒二十五人為行以詛射頴考叔者君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪邪而詛之將何益矣桓十五年許叔入于許息侯伐鄭鄭息有違言息侯伐鄭大敗而還君子是以知息之將亡也不度德不量力不親親不徴辭不察有罪犯五不韙而以伐人其喪師也不亦宜乎羽父弒隱惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我生桓公而惠公薨是以隱公立而奉之羽父請殺桓公將以求大宰公曰為其少故也吾將授之矣使營莵裘吾將老焉羽父懼反譖公于桓公而請弒之十一月公祭鍾巫齊于社圃館于寪氏壬辰羽父使賊弒公于寪氏立桓公而討寪氏有死者桓公十八年二年曲沃并晉晉穆侯之夫人姜氏以條之役生大子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命大子曰仇弟曰成師始兆亂矣兄其替乎惠之二十四年晉始亂故封桓叔于曲沃師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室衆子也立此一官大夫有二宗適為小宗次為二宗士有𨽻子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎惠之三十年晉潘父弒昭侯而納桓叔不克晉人立孝侯惠之四十五年曲沃莊伯伐翼弒孝侯翼人立其弟鄂侯鄂侯生哀侯桓三年曲沃武公伐翼桓叔生莊伯莊伯生武公逐翼侯于汾隰驂絓而止夜獲之七年冬曲沃伯誘晉小子侯殺之哀侯子八年冬王命虢仲立晉哀侯之弟緡于晉莊十有六年冬王使虢公命曲沃伯以一軍為晉侯六年楚子伐隨楚武王侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬬伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯牷純色完全也粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也故務其三時修其五教父義母慈兄友弟恭子孝親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐八年隨少師有寵楚鬬伯比曰可矣讎有釁不可失也夏楚子伐隨軍於漢淮之間季梁請下之弗許而後戰所以怒我而怠寇也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也弗從戰于速把隨師敗績隨侯逸鬭丹獲其戎車與其戎右少師隨及楚平楚子將不許鬬伯比曰天去其疾矣隨未可克也乃盟而還昭厲之亂北戎伐齊齊侯使乞師于鄭鄭大子忽帥師救齊大敗戎師獲其二帥大良少良甲首披甲者首三百以獻於齊公之未昏于齊也齊侯欲以文姜妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩曰自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何十一年鄭昭公之敗北戎也齊人將妻之祭仲曰君多內寵子無大援將不立三公子皆君也弗從夏鄭莊公卒初莊公娶鄧曼生昭公祭仲立之宋雍氏女於莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死祭仲與宋人盟歸而立之昭公奔衛十五年祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之祭仲殺雍紏公載以出曰謀及婦人宜其死也夏厲公奔蔡六月昭公入秋鄭伯因櫟人殺檀伯而遂居櫟十七年初鄭伯將以髙渠彌為卿昭公惡之固諫不聼昭公立懼其殺已也弒昭公而立公子亹君子謂昭公知所惡矣公子達曰髙伯其為戮乎復惡已甚矣十八年秋齊侯師于首止子亹㑹之髙渠彌相齊人殺子亹而轘髙渠彌祭仲逆鄭子于陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知免仲曰信也莊十四年鄭厲公自櫟侵鄭獲傅瑕傅瑕曰茍舍我吾請納君與之盟而赦之六月傅瑕殺鄭子及其二子而納厲公初內蛇與外蛇鬭於鄭南門中內蛇死六年而厲公入公問於申繻曰猶有妖乎對曰人之所忌其氣焰以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖厲公入遂殺傅瑕使謂原繁曰傅瑕二既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祏社稷有主而外其心其何二如之茍主社稷國內之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死十六年鄭伯治與於雍紏之亂者殺公子閼刖彊鉏公父定叔出奔衛假之孫三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉君子謂彊鉏不能衛其足子同生子同生以大子生之禮舉之接以大牢卜士負之士妻食之公與文姜宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信如公子友以德命為義文王昌武王發以類命為象若孔子首象尼丘取於物為假若伯魚因饋魚名曰鯉取於父為類子同不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒僖名司徒改為中軍宋以武公廢司空改以司城先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同九年曹大子來朝曹大子來朝享之初獻樂奏而歎施父曰曹大子其有憂乎非歎所也十年春曹桓公卒十年虞叔伐虞公虞叔有玉虞公求旃弗獻既而悔之曰匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寶劒叔曰是無厭也無厭將及我遂伐虞公虞公奔共池十一年屈瑕敗師楚屈瑕將盟二軫鄖人軍於蒲騷將與隨絞州蓼伐楚師莫敖患之鬭廉曰鄖人軍其郊必不誡且日虞四邑之至也君次於郊郢以禦四邑我以鋭師宵加於鄖鄖有虞心而恃其城莫有鬭志若敗鄖師四邑必離莫敖曰盍請濟師于王對曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師于蒲騷卒盟而還十二年楚伐絞軍其南門莫敖曰絞小而輕輕則寡謀請無扞采樵者以誘之從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還伐絞之役楚師分涉於彭羅人欲伐之使伯嘉諜之三巡數之十三年楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣遂見楚子曰必濟師楚子入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令德見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也莫敖狥于師曰諫者有刑及鄢亂次以濟且不設備及羅羅與盧戎兩軍之大敗之莫敖縊于荒谷羣帥囚于冶父以聽刑楚子曰孤之罪也皆免之十六年急壽相死衛宣公蒸於夷姜生急子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子宣姜與公子朔構急子公使諸齊使盜待諸莘將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪又殺之二公子故怨惠公立公子黔牟惠公奔齊莊六年夏衛侯入放公子黔牟于周放寧跪于秦殺左公子泄右公子職乃即位君子以二公子之立黔牟為不度矣夫能固位者必度於本末而後立衷焉不知其本不謀知本之不枝弗彊詩云本枝百世十七年及齊師戰于奚及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告公曰疆埸之事愼守其一而備其不虞姑盡所備焉事至而戰又何謁焉十八年桓公薨于齊公將與姜氏如齊申繻曰女有家男有室無相瀆也易此必敗公㑹齊候于濼盧篤力角二反又音洛遂及文姜如齊齊侯通焉公謫之以告夏四月享公使公子彭生乘公上車曰乘公薨于車魯人告于齊曰寡君來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生王殺周公黑肩周公欲弒莊王而立王子克莊王弟辛伯告王遂與王殺周公黑肩克奔燕初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政臣擅命耦國亂之本也周公弗從故及莊公四年楚武王伐隨卒楚武王荆尸授師孑吉熱反方言楚以㦸為孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼歎曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薨于行國之福也王遂行卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯且請為㑹於漢汭而還濟漢而後發喪六年楚滅鄧楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不蚤圖後君噬齊其及圖之乎鄧侯曰人將不食吾餘對曰若不從三臣抑社禝實不血食而君焉取餘弗從還年楚子伐鄧十六年楚復伐鄧滅之八年齊師圍郕師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰我實不德齊師何罪罪我之由夏書曰皋陶邁種德德乃降姑務修德以待時乎君子是以善莊公齊侯使連稱管至父戍葵丘瓜時而往曰及山而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂齊侯田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費袒而示之背請先入伏公而出鬭死於門中石之紛如死于階下遂入殺孟陽于床曰非君也不類見公之足于户下遂弒之而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子紏來奔初公孫無知虐于雍廩九年雍廩殺無知公伐齊納子紏桓公自莒先入師及齊師戰于乾時我師敗績公喪戎路傳乘而歸鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於髙傒使相可也公從之十年齊師伐我公將戰曹劌請見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂遂齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之夏齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出䝉皋比虎皮而先犯之公從之大敗宋師于乘丘齊師乃還十三年公㑹齊侯盟于柯始及齊平也十年楚子入蔡蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之敗蔡師于莘以蔡侯獻舞歸十四年蔡哀侯為莘故繩息媯以語楚子楚子滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱不能死其又奚言楚子以蔡侯滅息遂入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎十一年宋立桓公宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也悖焉悖盛也桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御說之辭也臧孫達曰是宜為君有恤民之心乘丘之役十年公以金僕姑矢名射南宫長萬公右歂市專孫生摶之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之戲而相愧曰靳十二年宋萬弒閔公于䝉澤立子遊蕭叔大心及戴武宣穆莊之族殺子遊于宋立桓公御說齊桓征伐盟㑹齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至齊師滅談談無禮也見十年十三年春齊侯宋人陳人蔡人邾人㑹于北杏以平宋亂遂人不至齊人滅遂而戍之宋人背北杏之㑹十四年冬單伯㑹齊侯宋公衛侯鄭伯于鄄宋服故也十五年齊侯宋公陳侯衛侯鄭伯㑹于鄄齊始霸也秋宋人齊人邾人伐郳鄭人間之而侵宋十六年冬㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽鄭成也十七年夏遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉二十七年夏㑹齊侯宋公陳侯鄭伯同盟于幽陳鄭服也二十二年陳亂而齊納敬仲二十五年鄭文公之四年獲成於楚皆有二心今始服也冬王使召伯廖賜齊侯命且請伐衛以其立子頽也二十八年春齊侯敗衛師數之以王命取賂而還三十年秋齊人降鄣冬公及齊侯遇于魯濟謀山戎也以其病燕故也齊人伐山戎三十一年齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘閔二年春齊人遷陽僖二年秋盟于貫服江黃也齊寺人貂始漏師于多魚三年秋齊侯宋公江人黃人㑹于陽穀謀伐楚也齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之四年春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢包茅不入王祭不共無以縮酒寡人是徴昭王南征不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵師進次于陘楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不穀是為先君之好是繼與不穀同好如何對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止謀寧周也秋諸侯盟鄭伯逃其師而歸七年秋盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物八年春盟于洮謀王室也定襄王位鄭伯乞盟請服也九年夏㑹于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受秋齊侯盟諸侯于葵丘宰孔先歸遇晉侯曰可無㑹也齊侯不務德而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣其在亂乎君務靖亂無勤於行十三年夏㑹于鹹淮夷病把故且謀王室也秋為戎難故諸侯戍周十四年春諸侯城緣陵而遷把焉不書其人有闕也十五年春楚人伐徐公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘尋葵丘之盟且救徐也十六年公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮謀鄫且東略也城鄫役人病有夜登丘而呼曰齊有亂不果城而還十七年齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯多內寵內嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為大子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立桓公卒易牙與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋十八年齊人將立孝公不勝四公子之徒遂與宋人戰宋敗齊師于甗魚免反又言彥二音立孝公而還十九年陳穆公請修好於諸侯以無忘齊桓之德冬㑹陳人蔡人楚人鄭人盟于齊修桓公之好也十八年虢公晉侯朝王虢公晉侯朝王王饗醴命之宥皆賜玉五㲄雙玉為㲄馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人鬻拳自殺楚武王克權遷權於那處使閻敖尹之及文王即位與巴人伐申而驚其師巴人叛楚而伐那處取之閻敖遊涌而逸楚子殺之其族為亂巴人因之以伐楚十九年楚子禦之大敗於津還鬻拳楚大閽弗納遂伐黃還及湫卒鬻拳葬諸夕室亦自殺也而葬於經皇冡前闕初鬻拳彊諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯使其後掌之君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善十九年五大夫立子頽初王姚嬖于莊王生子頽子頽有寵蒍國為之師惠王即位取蒍國之圃邊伯之宫近於王宫王取之王奪子禽祝跪與詹父田而收膳夫之秩石速故蒍國邊伯石速詹父子禽祀跪作亂因蘇氏秋五大夫奉子頽以伐王桓王奪蘇氏十二邑與鄭故自此以來不和冬立子頽二十年鄭伯和王室不克遂以王歸王處于櫟王子頽享五大夫樂及遍舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今子頽歌舞不倦樂禍也夫司寇行戮君為之不舉而況敢樂禍乎奸王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也二十一年同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王于闕西辟樂備王與之武公之略自虎牢以東原伯曰鄭伯效尤其亦將有咎五月鄭厲公卒鄭伯之享王也王以后之鞶鑑豫之虢公請器王豫之爵鄭伯由是始惡於王為僖二十四年鄭執王使張本二十二年陳敬仲辭卿陳人殺其大子御寇陳公子完與顓孫奔齊齊侯使敬仲為卿辭曰羇旅之臣幸若獲宥及於寬政赦其不間於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告詩云翹翹車乘招我以弓豈不欲往畏我友朋使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也初懿氏卜妻敬仲其妻占之曰吉是謂鳳皇于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京陳厲公蔡出也故蔡人殺五父而立之生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀坤下巽上之否坤下乾上曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也自二至四有艮象艮為山有山之材而照之以天光於是乎居土上故曰觀國之光利用賔于王庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎風行而著於土故曰其在異國乎若在異國必姜姓也姜大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政二十三年公如齊觀社公如齊觀社曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡狩以大習之非是君不舉矣君舉必書書而不法後嗣何觀晉去桓莊之族晉桓莊之族逼獻公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譖富子而去之二十四年晉士蒍又與羣公子謀使殺遊氏之二子士蒍告晉侯曰可矣不過二年君必無患二十五年晉士蒍使羣公子盡殺遊氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子丹桓宫之楹秋丹桓宫之楹二十四年春刻其桷皆非禮也御孫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告處也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎二十六年晉滅虞虢秋虢人侵晉冬虢人又侵晉二十七年晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰將饑三十二年秋有神降于莘惠王問諸內史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也若以甲乙至祭先脾玉用蒼服上青以此類推之王從之內史過往聞虢請命反曰虢必亡矣虐而聽於神神居莘虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而一者也依人而行虢多涼德其何土之能得閔二年虢公敗犬戎于渭汭舟之僑曰無德而祿殃也殃將至矣遂奔晉僖二年晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能彊諫且少長於君君昵之雖諫將不聽乃使荀息假道於虞虞公許之且請先伐虢宫之竒諫不聼夏晉里克荀息帥師㑹虞師伐虢滅下陽秋虢公敗戎于桑田晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鍳而益其疾必易晉而不撫其民矣不可以五稔五年晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩一之謂甚其可冉乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰大伯虞仲大王之昭也虢仲虢叔王季之穆也為文王卿士勳在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不唯逼乎親以寵逼猶尚害之況以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親唯德是輔又曰黍稷非馨明德惟馨又曰民不易物唯德繄物如是則非德民不和神不享矣神所馮依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽宫之竒以其族行曰虞不臘矣八月甲午晉侯圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謡云丙之晨龍尾伏辰龍尾尾星日月所㑹曰辰日在尾故尾伏不見均服振振取虢之旗鶉之賁賁天䇿焞焞火中成軍虢公其奔其九月十月之交乎賁賁鶉火之體焞不明也天䇿人說星時近日故不明丙子旦日在尾月在䇿月行疾故至旦已在䇿鶉火中必是時也冬十二月丙子朔晉滅虢師還館于虞遂襲虞滅之修虞祀且歸其職貢於王二十八年驪姬之難晉獻公娶于賈無子蒸於齊姜生秦穆夫人及大子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈二當為北今平陽北屈縣君之疆也不可以無主宗邑無主則民不威疆埸無主則啓戎心戎之生心民慢其政國之患也若使大子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎晉侯說之夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦閔元年晉侯作二軍公將上軍大子申生將下軍以滅耿滅霍滅魏還為大子城曲沃士蒍曰大子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳大伯不亦可乎猶有令名與其及也且諺曰心茍無瑕何恤乎無家天若祚大子其無晉乎二年晉侯使大子申生伐東山皋落氏里克諫曰大子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非大子之事也師在制命而已稟命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞皋落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見大子大子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修已而不責人則免於難大子帥師公衣之偏衣佩之金玦狐突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也偏躬無慝兵要逺災親以無災又何患焉狐突歎曰時事之徴也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣之厖服逺其躬也佩以金玦棄其衷也服以逺之時以閟之厖涼冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎不如違之狐突欲行羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之大子將戰狐突諫曰不可亂本成矣立可必乎孝而安民子其圖之全身為孝不戰為安民與其危身以速罪也有功見害是為速罪僖四年初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長且其繇曰專之渝攘公之羭音渝渝變也踰美也言變乃除公之美一薰一蕕十年尚猶有臭必不可弗聽生奚齊及將立之既與中大夫成謀姬謂大子曰君夢齊姜必速祭之大子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由大子或謂大子子辭君必辨焉大子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎大子曰君實不察其罪被此名也以出人誰納我縊于新城姬譖二公子曰皆知之重耳奔蒲夷吾奔屈五年初晉侯使士蒍為二公子築蒲與屈不愼置薪焉夷吾訴之公使讓之士蒍稽首而對曰臣聞之無喪而戚憂必讎焉無戎而城讎必保焉寇讎之保又何愼焉守官廢命不敬固讎之保不忠失忠與敬何以事君詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用愼退而賦曰狐裘尨茸一國三公吾誰適從及難公使寺人披伐蒲重耳曰君父之命不校踰垣而走披斬其袪遂出奔翟六年晉侯使賈華伐屈夷吾不能守盟而行將奔狄卻芮曰不如之梁梁近秦而幸焉乃之梁九年晉獻公卒里克㔻鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎十月里克殺奚齊于次荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉申公鬭班殺子元楚令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎御人以告子元子元曰婦人不亡襲讎我反忘之子元以車六百乘伐鄭諸侯救鄭楚師夜遁三十年子元歸自伐鄭而處王宫申公鬭班殺子元鬭穀奴走於莬為令尹自毁其家以紓楚國之難三十二年共仲弒子般立閔公公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏八月公薨子般即位共仲使圉人犖賊子般于黨氏成季奔陳立閔公閔元年公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之冬齊仲孫湫來省難仲孫歸曰不去慶父魯難未己公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顚而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間攜二覆昏亂霸王之器也二年秋共仲使卜齮魚綺賊公于武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右閒于兩社為公室輔周社亳社之間朝廷執政所在季氏亡則魯不昌又筮之遇大有乾下離上之乾曰同復于父敬如君所乾為君父離變為乾故曰同復於父其見敬與君同及生有文在其手曰友遂以命之僖元年冬莒人來求賂公子友敗諸酈公賜季友汶陽之田及費閔公元年邢遷夷儀狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢僖元年春諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無師焉夏邢遷于夷儀齊師宋師曹師城之晉侯作二軍晉侯作二軍公將上軍大子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還賜趙夙耿賜畢萬魏卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯震下坎上之比坤下坎上辛廖占之曰吉屯固比入吉孰大焉屯險難故堅固比親密故得入其必蕃昌震為土震為坤車從馬震為車坤為馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也二年齊封衛楚丘冬狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰公與石祁子玦與寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子及狄人戰于熒澤衛師敗績狄人囚史華龍滑與禮孔以逐衛人二人曰我大史也實掌其祭不先國不可得也狄畏鬼故恐言先白神乃先之至則與國人出狄從之又敗諸河初惠公之即位也少齊人使昭伯蒸於宣姜昭伯公子頑生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩以二丈雙行故曰兩三十兩三十匹也僖之元年齊桓公遷邢于夷儀二年封衛于楚丘邢遷如歸衛國忘亡衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘僖公四年鄭殺申侯齊侯以諸侯之師伐楚陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屝草履屨其可也齊侯說與之虎牢執轅濤塗秋伐陳討不忠也五年陳轅宣仲怨鄭申侯之反已於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂譖諸鄭伯曰美城其賜邑將以叛也申侯由是得罪七年鄭殺申侯初申侯申出也有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已五年鄭殺大子華周子帶之亂㑹于首止㑹王大子鄭謀寧周也秋諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之曰國君不可以輕遣政輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽七年春齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能彊又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不及夕何以待君夏鄭殺申侯以說于齊秋盟于寧母謀鄭故也鄭伯使大子華聽命于㑹言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇若總其罪人以臨之鄭有辭矣且夫合諸侯以崇德也㑹而列姦何以示後嗣夫諸侯之㑹其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為大子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可閒也齊侯辭焉子華由是得罪於鄭八年春盟于洮鄭伯乞伯請服也十六年冬鄭殺子華㑹于首止㑹王大子鄭伯寧周也七年閏月惠王崩襄王惡大叔帶之難懼不立不發喪而告難于齊八年春盟于洮謀王室也襄王定位而後發喪十一年夏揚拒泉皋伊雒之戎同伐京師王子帶召之也秦晉伐戎以救周十二年王以戎難故討王子帶秋王子帶奔齊冬齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管仲之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣十三年春齊侯使仲孫湫聘于周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也夏㑹于鹹謀王室也為戎難故諸侯戍周二十二年富辰言于王曰請召大叔詩曰協比其鄰昏姻孔云吾兄弟之不協焉能怨諸侯之不睦王說王子帶自齊復歸于京師王召之也二十四年甘昭公通於隗氏王替隗氏狄后頽叔桃子遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋狄大敗周師王出適鄭處于汜大叔以隗氏居于溫王使來告難曰不穀不德得罪于母弟之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子蒙塵于外敢不奔問官守王使簡師父告于晉使左鄢父告于秦鄭伯與孔將鉏石甲父侯宣多省視官具于汜而後聽其私政禮也二十五年秦伯師于河上將納王狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有乾下離上之睽兊下離上曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也言去睽卦而論大有亦有天子降心之象乾尊離卑降尊下卑亦有義也晉侯辭秦師而下右師圍溫左師逆王四月王入于王城取大叔于溫殺之于隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原攢才官茅之田晉於是始啓南陽陽樊不服圍之倉葛呼曰德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降晉侯問原守於寺人勃鞮丁兮對曰昔趙衰以壺餐從徑餒而弗食故使處原六年楚子圍許楚子圍許蔡穆侯將許僖公見楚子于武城許男面縛銜璧大夫衰絰士輿襯楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓芳弗切徐音廢之焚其櫬禮而命之使復其所楚子從之八年晉敗狄于采桑晉里克帥師梁由靡御虢射食亦為右以敗狄于采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉復期月魚氏世為左師宋公疾大子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退九年宋襄公即位以公子目夷為仁使為左師以聽政於是宋治故魚氏世為左師九年晉惠懷之敗晉卻芮使夷吾重賂秦以求入曰人實有國我何愛入而能民土於何有從之齊隰朋帥師㑹秦師納晉惠公秦伯謂卻芮曰公子誰恃對曰臣聞亡人無黨有黨必有讎夷吾弱不好㺯能鬭不過長亦不改不識其他公謂公孫枝曰夷吾其定乎對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也十年夏周公忌父王子黨㑹齊隰朋立晉侯晉侯殺里克以說將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者亦亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死於是㔻鄭聘于秦且謝緩賂故不及晉侯改葬共大子狐突適下國遇大子大子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝于韓㔻鄭之如秦也言於秦伯曰呂甥卻稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣秦伯使冷至報問且召三子卻芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及七輿大夫侯伯七命副車七乘皆里㔻之黨也㔻豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君十一年天王使召武公內使過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世十三年晉荐饑使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼命之曰泛舟之役十四年秋八月沙鹿崩卜偃曰期年將有大咎幾亡國冬秦饑使乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於寇不如勿與慶鄭曰背施幸災民所棄也近猶讎之況怨敵乎弗聽退曰君其悔是哉十五年晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晋卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晋君其卦遇蠱巽下艮上曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也內卦為貞外卦為悔嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗反韓晉侯謂慶鄭曰寇深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張中亮反脉僨方問切動也興外彊中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰于韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅五嫁秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍拔草舍止從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以大子罃𢎞與女簡璧登臺而履薪焉穆姬欲自罪故登臺而荐之以薪左右上下者履柴乃通使以免服縗絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其大子必得大成晉未可滅而殺其君祗以成惡史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使卻乞告瑕吕飴甥即吕甥也蓋姓瑕吕名飴甥且召之子金教之言曰子金甥字朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也晉於是乎作爰田分公田之稅應入公者爰之於所賞之衆吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說晉於是乎作州兵使州長各繕兵初晉獻公筮嫁伯姬於秦遇歸妹兌下震上之睽兌下離上史蘇占之曰不吉其繇曰士刲羊亦無􅎺也血也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬離為火火動熾而害其母女嫁反害其家之象車脫其輹火焚其旗不利行師敗于宗丘震為車離為火上六爻在震則無應故車說輹在離則失位故火焚旗車敗火焚故不利行師火還害母故敗不出國近在宗邑歸妹睽孤寇張之弧處睽之極失位孤絶故遇寇難有弓矢之警姪其從姑震為木離為火火從木生離為震妹於火為姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益詩曰下民之孽匪降自天僔沓面語背憎職競由人十月晉隂飴甥隂采邑㑹秦伯盟于王城秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讎寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉牛羊豕各一為一牢蛾魚綺析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸殺慶鄭而後入是嵗晉又饑秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者於是秦始征晉河東置官司馬十七年夏晉大子圉為質於秦秦歸河東而妻之惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉二十二年圉將逃歸謂嬴氏曰與子歸乎對曰子晉大子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸二十三年秋晉惠公卒懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服己則不明而殺人以逞不亦難乎民不見德而唯戮是聞其何後之有二十四年春公子重耳入于晉殺懷公于髙梁十六年宋襄爭盟春隕石于宋五隕星也六鷁退飛過宋都風也周內史叔興聘于宋宋襄公問曰是何祥也吉凶焉在對曰今兹魯多大喪明年齊有亂君將得諸侯而不終退而告人曰君失問是陰陽之事非吉凶所生也吉凶由人吾不敢逆君故也十九年宋人執滕宣公夏盟于曹南使邾文公用鄫子于次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國義士猶曰薄德今一㑹而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸宋人圍曹討不服也子魚言於宋公曰文王聞崇德亂而伐之軍三旬不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動二十年宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟二十一年春宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗秋諸侯㑹宋公于盂楚執宋公以伐宋冬㑹于薄以釋之子魚曰禍猶未也未足以懲君二十二年三月鄭伯如楚宋公伐鄭子魚曰所謂禍在此矣楚人伐宋以救鄭宋公將戰大司馬固諌曰天之棄商久矣君將興之弗可赦也已弗聽及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耇獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也鄭文夫人芈氏姜氏勞楚子于柯澤楚子使師縉示之俘馘君子曰非禮也婦人送迎不出門見兄弟不踰閾戎事不邇女器楚子入享于鄭九獻庭實旅百加籩豆六品享畢夜出文芈送于軍取鄭二姬以歸叔詹曰楚王其不沒乎為禮卒於無别無别不可謂禮將何以沒諸侯是以知其不遂霸也二十三年夏宋襄公卒傷于泓故也十八年鄭鑄三鍾鄭伯朝于楚楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鍾衛文滅邢邢人狄人伐衛圍莬圃衛侯以國讓其父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師于訾婁狄師還十九年秋衛人伐邢以報莬圃之役於是衛大旱卜有事於山川不吉寧莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之師興而雨二十四年衛人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕二十五年衛人伐邢二禮從國子巡城掖以赴外殺之正月滅邢禮至為銘曰余掖殺國子莫余敢止梁亡梁伯益其國而不能實也命曰新里秦取之十九年春遂城而居之初梁伯好土功亟城而弗處民罷而弗堪則曰某寇將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁二十年王救滑以狄師伐鄭狄伐周王適鄭滑人叛鄭而服於衛夏鄭公子士泄堵寇帥師入滑二十四年師還又即衛鄭公子士泄堵俞彌伐滑王使伯服遊孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之大上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周德之不類故糾合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟䦧于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勳親親䁥近尊賢德之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也鄭有平惠之勳又有厲宣之親棄嬖寵而用三良於諸姬為近四德具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何弗聽使頽叔桃子出狄師夏狄伐鄭取櫟王德狄人將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪婪王又啓之女德無極婦怨無終狄必為患王又弗聽甘昭公通於隗氏王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師伐周大敗周師王出適鄭處于汜隨以漢東諸侯叛楚隨以漢東諸侯叛楚楚鬬穀於莬帥師伐隨取成而還君子曰隨之見伐不量力也量力而動其過鮮矣善敗由已而由人乎哉詩曰豈不夙夜謂行多露二十一年大旱饑而不害夏大旱公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗也饑而不害魯封須句任宿須句顓㬰風姓也實司大皡與有濟之祀以服事諸夏邾人滅須句須句子來奔因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皡濟而修祀紓禍也二十二年春伐邾取須句反其君焉禮也秋邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰又曰敬之敬之天惟顯思命不易哉先王之明德猶無不難也無不懼也況我小國乎君其無謂邾小蜂蠆有毒而況國乎弗聽及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門二十二年秦晉遷陸渾之戎于伊川初平王之東遷也辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎于伊川二十三年楚子玉敗師城濮楚成得臣帥師伐陳遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾二十七年楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有冬楚子及諸侯圍宋二十八年春晉侯侵曹伐衛楚子使子玉去宋曰無從晉師子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口間執猶塞也讒慝若蒍賈言不能以三百乘入間音諫王怒少與之師唯西廣東宫與若敖之六卒實從之戰于城濮楚師敗績初楚子玉自為瓊辨玉纓未之服也先戰夢河神謂己曰畀余余賜女孟諸之麋弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連穀而死蒍吕臣為令尹奉己而已不在民矣秦伯納晉侯晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳曰保君父之命而享其生祿於是乎得人有人而校罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顚頡魏武子司空季子狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗以叔隗妻趙衰生盾將適齊過衛衛文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懷與安實敗名姜與子犯謀醉而遣之醒以戈逐子犯及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自二焉乃饋盤飱置璧焉公子受飱反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉叔詹諫曰臣聞天之所啓人弗及也晉公子有三焉天其或者將建諸君其禮焉男女同姓其生不蕃晉公子姬出也而至于今一也離外之患而天不靖晉國殆將啓之二也有三士足以上人而從之三也國語狐偃趙衰賈他三人者卿才也晉鄭同儕其過子弟固將禮焉況天之所啓乎弗聽及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭莫爾右屬櫜鞬九言反上箭器下弓衣以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寬忠而能力晉侯無親外內惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懷嬴與焉奉匜可支沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜二十四年秦伯納之及河子犯以璧授公子曰臣負羈絏從君巡於天下臣之罪甚多矣臣猶知之而況君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧于河二月辛丑狐偃及秦晉之大夫盟于郇丙午入于曲沃吕卻畏逼吕甥卻芮將焚公宫而弒晉侯寺人披請見公使讓之且辭焉曰蒲城之役君命一宿女即至其後余從狄君以田渭濵女為惠公來求殺余命女三宿女中丁仲宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣知君子之道若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射食亦鉤而使管仲相君若易之何辱命焉行者甚衆豈唯刑臣公見之以難告晉侯潛㑹秦伯于王城公宫火瑕甥卻芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衛於晉三千人實紀綱之僕初晉侯之豎頭須守藏才浪者也其出也竊藏以逃盡用以求納之及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讎匹夫懼者甚衆矣公遽見之狄人歸季隗于晉而請其二子二子伯鯈叔劉文公妻趙衰生原同屏括樓嬰趙姬請逆盾與其母子餘辭姬曰得寵而忘舊何以使人必逆之來以盾為才以為適子而使其三子下之以叔隗為內子而已下之晉侯賞從亡者介之推不言祿祿亦弗及推曰獻公之子九人唯君在矣惠懷無親內外棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜況貪天之功以為己力乎下義其罪上賞其姦上下相䝉難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人二十四年鄭殺子臧鄭子華之弟子臧奔宋好聚鷸尹橘切翠鳥也冠鄭伯聞而惡之使盜殺之于陳宋之閒君子曰服之不衷身之災也詩曰彼知之子不稱其服子臧之服不稱也夫詩曰自詒伊戚其子臧之謂矣夏書曰地平天成稱也鄭享宋成公有加宋成公如楚還入于鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有喪拜焉豐厚可也鄭伯從之享宋公有加禮也二十六年晉文城濮之戰夏齊孝公伐我北鄙公使展喜犒師使受命於展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也以不臣事周可責以此罪冬公以楚師伐齊取穀置桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之宋以其善於晉侯也叛楚即晉二十四年宋及楚平二十七年楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎搜于被廬作三軍謀元帥趙衰曰卻縠可臣亟聞其言矣說禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸君其試之乃使卻縠將中軍卻溱佐之使狐偃將上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犫為右晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎子犯曰民未知禮未生其共於是乎大搜以示之禮作執秩以正其官民聽不惑而後用之出穀戌釋宋圍一戰而霸文之教也二十八年二月晉郤縠卒原軫將中軍胥臣佐下軍上德也晉侯伐衛衛侯出居于襄牛三月入曹令無入僖負羈之宫而免其族報施也魏犫顚頡怒曰勞之不圖報於何有爇僖負羈氏魏犫傷於胸公欲殺之而愛其材使問且視之病將殺之魏犫束胸見使者曰以君之靈不有寧也距躍三百超越也曲踊三百跳踊也乃舍之殺顚頡以徇于師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公說執曹伯分曹衛之田以畀宋人楚子入居于申使申叔去榖使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情僞盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有德不可敵此三志者晉之謂矣子玉使伯棼請戰王怒少與之師子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公說乃私許復曹衛曹衛告絶于楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此退三舍辟之所以報也背惠食言以亢其讎我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏晉侯宋公齊國歸父崔天秦小子憖次于城濮楚師背酅户圭反丘陵險阻名而舍晉侯患之聽輿人之誦曰原田每每亡回舍其舊而新是謀喻晉軍美盛德若原田之怨草可以立新功不足念舊公疑焉子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大恥不如戰也晉侯夢與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏其罪吾且柔之矣盬嚏也腦所以柔物子玉使鬭勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝將見晉車七百乘韅許見靷以刃鞅於杖靽音半在背曰韅在胸曰靷在腹曰鞅在後曰靽晉侯登有莘之虛以觀師曰少長有禮其可用也遂伐其木以益其兵伐木以益戰具輿曳柴亦是也胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之使若大將小却欒枝使輿曳柴而僞遁楚師馳之原軫卻溱以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚左師潰子玉收其卒而止故不敗晉師三日館榖作王宫于踐土五月丁未獻楚俘于王駟介四馬被甲百乘徒兵千鄭伯傅王傅相也用平禮也己酉王享醴命晉侯宥命尹氏及王子虎內史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服大輅金輅彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以緩四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲癸亥王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼君子謂是盟也信謂晉於是役也能以德攻楚子玉既敗及連榖而死晉侯聞之而後喜可知也曰莫余毒也已城濮之戰晉中軍風于澤亡大斾之左旃祁瞞奸命司馬殺之以徇于諸侯師還濟河舟之僑先歸士㑹攝右秋七月振旅愷以入于晉獻俘授馘飲至大賞徴㑹討二殺舟之僑以徇于國民於是大服君子謂文公其能刑矣三罪而民服詩云惠此中國以綏四方不失賞刑之謂也䕫子不祀祝融鬻熊夔子不祀祝融與鬻熊祝融之十二世係楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉秋楚成得臣鬬宜申帥師滅夔二十八年王釋衛侯晉侯伐衛衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以說于晉衛侯出居襄牛衛侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯寧武子與衛人盟于宛濮曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是紏是殛國人聞此盟也而後不二衛侯先期入叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之元咺出奔晉冬衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士衛侯不勝殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之于京師置諸深室寧子職納橐饘焉元咺歸于衛立公子瑕三十年晉侯使醫衍鴆衛侯寧俞貨醫使薄其鴆不死公為之請納玉於王與晉侯皆十㲄王許之釋衛侯衛侯使賂周歂冶厪僅曰茍納我吾使爾為卿周冶殺元咺及子適子儀子儀瑕母弟公入祀先君周冶既服將命周歂先入及門遇疾而死冶厪辭卿晉復曹伯晉侯圍曹門焉多死曹人尸諸城上晉侯患之聽輿人之謀曰稱舍於墓師遷焉曹人凶懼為其所得者棺而出之因其凶也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀無德而居位故責其功狀公執曹伯冬晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公說復曹伯三十一年春取濟西田分曹地也使臧文仲往宿於重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅附于濟盡曹地也晉敗秦師于殽鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉五月晉侯及鄭伯盟于衡雍二十九年夏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉謀伐鄭也三十年九月甲午晉侯秦伯圍鄭以其無禮於晉晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能蚤用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯說與鄭人盟使把子逢孫楊孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之初鄭公子蘭出奔晉鄭石甲父侯宣多逆以為大子以求成于晉晉人許之三十二年冬晉文公卒將殯于曲沃出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉把子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師之所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后皋之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉秦師遂東三十三年春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先悉薦牛十二犒師且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為君子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以間敝邑若何把子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可兾也攻之不克圍之不繼吾其還也滅滑而還晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁𢎞御戎萊駒為右敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨文嬴請三帥公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長寇讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼓使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德文二年秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師戰於殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫尺甚取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰吾與女為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也明堂祖廟也所以策功序德故不義之士不得升共用之為勇共音恭吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣秦伯猶用孟明孟明增修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而憎德不可當也詩曰毋念爾祖聿修厥德孟明念之矣念德不怠其可敵乎三年夏秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪懈以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉晉置軍行晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行置三軍矣復置三行蓋辟天子大軍之名三行無佐疑大夫帥三十一年秋晉搜于清原作五軍以禦狄趙衰為卿罷三軍更為上下新軍文六年春晉搜于夷舍三軍復三軍之制二十九年介葛盧來朝介葛盧來朝公在㑹饋之芻米禮也冬介葛盧來以未見公故復來朝禮之加燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信三十年王使周公閲來聘王使周公閲來聘饗有昌歜在感白黑白熬稻黑熬黍形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉榖鹽虎形以獻其功吾何以堪之三十一年狄圍衛衛遷于帝丘冬狄圍衛衛遷于帝丘卜曰三百年衛成公夢康叔曰相奪豫享公命祀相寧武子不可曰鬼神非其族類不歆其祀把鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命三十三年齊國莊子來聘齊國莊子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也胥臣舉卻缺狄伐晉晉侯敗狄于箕卻缺獲白狄子初臼季使過兾見兾缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不恭不相及也詩曰采葑采菲無以下體君取節焉可也取其善節文公以為下軍大夫反自箕襄公以三命命先且居將中軍先軫之子其父死敵故進之以再命命先茅之縣賞胥臣曰舉卻缺子之功也以一命命卻缺為卿復與之兾亦未有軍行楚殺令尹子上楚令尹子上侵陳蔡陳蔡成晉陽處父侵蔡楚子上救之與晉師夾汦雉而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸大子商臣譖子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上文公元年穆伯從巳氏於莒葬僖公王使叔服來㑹葬公孫敖聞其能相人也見其二子焉叔服曰榖也食子音嗣難乃多也收子榖也豐下必有後於魯國七年穆伯娶于莒曰戴已生文伯榖其娣聲已生惠叔難戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉冬莒人來請盟穆伯如莒涖盟且為仲逆見之美自為娶之仲請攻之公將許之叔仲惠伯諌曰臣聞之兵作於內為亂於外為寇寇猶及人亂自及也今臣作亂而君不禁以啓寇讎若之何公止之惠伯成之使仲舍之公孫敖反之復為兄弟如初從之八年襄王崩穆伯如周弔喪不至以弊奔莒從己氏焉十四年穆伯之從己氏也魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出三年復適莒文伯疾而請曰穀之子弱請立難也許之文伯卒于齊告喪惠叔請葬弗許請以卿禮葬十五年齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之葬視共仲以罪降襄仲欲勿哭惠伯曰叔彭生喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之他年其二子來孟獻子愛之聞於國獻子榖子仲孫蔑或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以殺子聞不亦逺於禮乎逺禮不如死一人門于句鈎鼆猛一人門于戾丘皆死有寇攻門禦之而死閏三月非禮閏三月非禮也於厯法當在僖末年失在今置先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖晉及衛成晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭晉襄公既祥使告于諸侯而伐衛先且居曰效尤禍也請君朝王臣從師晉侯朝王于溫先且居胥臣伐衛圍戚取之衛人使告于陳陳共公曰更伐之我辭之惡其不競故報伐之衛孔達帥師伐晉君子以為古古者越國而謀二年穆伯㑹諸侯及晉士縠盟于垂隴討衛也陳侯為請成于晉執孔達以說四年春晉人歸孔達于衛以衛之良也故免之七年晉卻缺言於趙宣子曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德無德何以主盟子為正卿以主諸侯而不務德將若之何夏書曰戒之用休董之用威勸之以九歌俾勿壞九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正德利用厚生謂之三事義而行之謂之德禮無禮不樂所由叛也若吾子之德莫可歌也其誰來之盍使睦者歌吾子乎宣子說之八年晉侯使解揚歸匡戚之田于衛且復致公壻池之封公壻亦取衛地封之自申至于虎牢之竟楚穆王立楚子將以商臣為大子訪諸令尹子上子上曰君之齒末也而又多愛黜乃亂也楚國之舉常在少者且是人也蜂目而豺聲忍人也不可立也弗聽既又欲立王子職而黜商臣商臣聞之告其師潘崇曰若之何而察之潘崇曰享江芈而勿敬也從之江芈怒曰呼好賀反發聲役夫宜君王之欲殺女而立職也告潘崇曰信矣冬以宫甲圍成王王請食熊蹯煩而死熊煩難熟欲久將有外救弗聽王縊諡之曰靈不瞑曰成乃瞑穆王立以其為大子之室與潘崇使為大師且掌環列之尹穆伯如齊始聘穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也二年躋僖公大事于大廟躋僖公逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先悉薦父食久矣故禹不先同上鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也襄仲立宣公襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也四年逆婦姜于齊卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也十八年冬襄仲殺惡及視而立宣公夫人姜氏大歸于齊將行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜晉人改陽處父之盟晉人以公不朝來討公如晉晉人使陽處父盟公以恥之三年晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪取既見君子樂且有儀莊叔以公降拜曰小國受命於大國敢不愼儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂四年楚滅江秦伯降服楚人滅江秦伯為之降服出次不舉過數鄰國之禮有數今秦伯過之大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣衛寧武子來聘衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王燕樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也今陪臣來繼舊好君辱貺之其敢干大禮以自取戾五年楚滅六蓼皋陶不祀六人叛楚即東夷楚成大心仲歸子家帥師滅六冬楚公子燮滅蓼臧文仲聞六與蓼滅曰皋陶庭堅不祀忽諸德之不建民之無援哀哉賈季殺陽處父晉陽處父聘于衛反過寧寧嬴從之及溫而還其妻問之嬴曰嬴旅逆大夫以剛商書曰沉潜似廉剛克髙明柔克夫子一之其不沒乎天為剛德猶不干時況在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之六年晉搜于夷使狐射姑將中軍趙盾佐之陽處父至改搜于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政制事典正法罪辟獄刑辟理也董逋逃由質要券契治舊汙理去汙穢本秩禮貴賤不失其本續常職修度官出滯淹既成以授大傅陽子與大師賈他使行諸晉國以為常法秋賈季怨陽子之易其班也而知其無援於晉也使續鞫居殺陽處父晉殺續簡伯賈季奔狄宣子使㬰駢送其帑夷之搜賈季戮㬰駢㬰駢之人欲盡殺賈氏以報焉㬰駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也損怨益仇非知也以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟六年秦伯任好卒以三良為殉秦伯任好卒以子車氏之三子奄息仲行針其廉虎為殉皆秦之良也君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而況奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂若之何奪之古之王者知命之不長是以並建聖哲樹之風聲分之采物著之話言為之律度陳之藝極引之表儀豫之法制告之訓典教之防利防惡興利委之常秩官司常職道之以禮則使毋失其土宜衆𨽻賴之而後即命聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也晉立靈公復士會季文子將聘于晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害所謂三思八月晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四德者難必抒矣直吕切除也賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼彼力姞而上之逼姞生襄公故遜使在上以狄故讓季隗而已次之先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士㑹如秦逆公子雍賈季亦使召公子樂于陳趙孟使殺諸郫婢支反七年秦康公送公子雍于晉曰文公之入也無衛故有吕卻之難乃多與之徒衛穆嬴日抱大子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師及堇謹陰宣子曰我若受秦秦則賔也不受寇也既不受矣而復扶又緩師秦將生心先悉薦人有奪人之心軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起敗秦師于令狐先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人大子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章取芻蕘之言不可匆又弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也十二年秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之秦為令狐之役故秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之卻缺將上軍㬰駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師于河曲㬰駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰對曰趙氏新出其屬曰㬰駢必實為此謀將以老我師也趙有側室支子曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡㬰駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰于河十二月秦師掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏古名退軍為綏秦行人夜戒晉師曰兩軍之士皆未憖憖缺也也明日請相見也㬰駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕十三年晉人患秦之用士㑹也夏六卿相見於諸浮趙宣子曰隨㑹在秦賈季在狄難日至矣若之何中行桓子曰請復賈季能外事且由舊勳卻成子曰賈季亂且罪大不如隨㑹能賤而有耻柔而不犯其知足使也且無罪乃使魏壽餘僞以魏叛者以誘士㑹執其帑於晉使夜逸請自歸于秦秦伯許之履士㑹之足於朝秦伯師于河西魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先使士㑹士㑹辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏蓋劉纍後今復故姓宣元年晉人討不用命者放胥甲父于衛七年宋襄公夫人殺昭公立文公宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔古亂為司徒公子蕩為司城華御禦事為司寇昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇蔭矣葛藟猶能庇其本根故君子以為比況國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢攜二若之何去之不聼穆襄之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室樂豫舍司馬以讓公子卬昭公弟八年宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸郊節於府人而出公以其官逆之皆復之亦書以官皆貴之也十六年宋公子鮑禮於國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數朔於六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而豔襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司寇初司城蕩卒公孫壽辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之二也姑紓死焉雖亡子猶不亡族夫人將使公田孟諸而殺之公知之盡以其寶行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寶賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何冬宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之文公即位使母弟須為司城狄侵魯西鄙狄侵我西鄙公使告于晉趙宣子使因賈季問酆舒且讓之酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也八年賊殺先克晉殺先都夷之搜晉人將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田于堇隂故箕鄭父先都士縠梁益耳蒯得作亂九年春使賊殺先克晉人殺先都梁益耳三月晉人殺箕鄭父士縠蒯得九年晉弒靈公范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭鄭及楚平秋楚公子朱伐陳陳人敗之陳懼及楚平十年秋陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶恥乙其僕以徇或謂子舟曰國君不可戮也子舟曰當官而行何彊之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎十四年同盟于新城從於楚者服十五年新城之盟蔡人不與晉卻缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還秋齊人侵我西鄙故季文子告于晉冬晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈謀伐齊也齊人賂晉侯故不克而還齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣十六年春及齊平十七年晉侯搜于黃父遂復合諸侯于扈於是晉侯不見鄭伯以為二于楚也鄭子家使執訊通問之官而與之書以告趙宣子曰寡君即位三年召蔡侯而與之事君九月蔡侯入于敝邑以行敝邑以侯宣多之難寡君是以不得與蔡侯偕十一月克減侯宣多而隨蔡侯以朝于執事十二年六月歸生佐寡君之嫡夷以請陳侯于楚而朝諸君十四年七月寡君又朝以蕆陳事十五年五月陳侯自敝邑往朝于君往年正月燭之武往朝夷也將夷朝晉八月寡君又往朝以陳蔡之密邇於楚而不敢二焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝于襄而再見于君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音音所庥䕃處古字相假用小國之事大國也德則其人也不德則其鹿也鋌他頂反疾走貌而走險急何能擇命之罔極亦知亡矣將悉敝賦以待於鯈直角唯執事命之文公二年六月壬申朝于齊四年二月壬戊為齊侵蔡亦獲成於楚居大國之間而從於彊令豈其罪也大國若弗圖無所逃命晉鞏朔行成于鄭趙穿公壻池為質焉宣元年宋人之弒昭公也文十六年晉荀林父以諸侯之師伐宋宋及晉平又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉卒在文十三年陳靈公受盟于晉秋楚子侵陳遂侵宋晉趙盾帥師救陳宋㑹于棐林以伐鄭也於是晉侯侈趙宣子為政驟諌而不入故不競於楚二年鄭公子歸生受命於楚伐宋宋華元樂吕御之二月壬子戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乘俘二百五十人馘百人狂狡輅五嫁鄭人鄭人入于井倒㦸而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聽之之謂禮殺敵為果致果為毅易之戮也將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎殘民以逞宋人以兵車百乘文馬百駟以贖華元于鄭半入華元逃歸立于門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而來奔宋城華元為植直吏切將主也巡功城者謳曰睅其目睅户板切出目也皤其腹弃甲而復于思于思如字弃甲復扶又來力知使其驂乘謂之曰牛則有皮犀兕尚多弃甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡晉趙盾以諸侯侵鄭以報大棘之役晉靈公不君厚斂以雕牆從臺上彈徒丹人而觀其辟丸也宰夫胹音而煮也熊蹯不熟殺之趙盾士季患之將諌士季曰諌而不入則莫之繼也㑹請先不入則子繼之三進及溜而後視之三進三伏公不省則又前也曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡有有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣賴之又曰衮職有闕惟仲山甫補之能補過也君能補過衮不廢矣猶不改宣子驟諌公患之使鉏麑迷賊之晨往寢門闢矣盛服將朝尚蚤坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠弃君之命不信有一于此不如死也觸槐音懷又音回而死秋晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾音嗽使犬夫獒焉明搏而殺之盾曰弃人用犬雖猛何為鬬且出提彌明死之初宣子田於首山舍于翳桑見靈輒餓問其病曰不食三日矣食之音似舍其半問之曰宦三年矣宦學也未知母之存否今近焉請以遺之使盡之而為之簞食與肉置諸橐以與之既而與為公介為甲士倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也趙穿攻靈公於桃園宣子未出山而復大史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰鳴呼我之懷矣自貽伊戚其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免宣子使趙穿逆公子黑臀于周立之楚滅若敖氏冬楚子使越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也宣二年夏晉趙盾及諸侯之師侵鄭楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競於楚殆將斃矣姑益其疾乃去之四年初楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及令尹子文卒鬬般為令尹子越為司馬蒍賈為工正譖子揚而殺之子越為令尹已為司馬賈為椒譖子揚而已得椒處子越又惡之乃以若敖氏之族圄伯嬴於轑遼陽而殺之遂處蒸野將攻王王以三王之子為質焉弗受師于漳澨水濵曰澨秋楚子與若敖氏戰于皋滸伯棼扶云射食亦王汰撻輈及鼓跗方扶著於丁寧又射汰輈以貫笠轂兵車無蓋尊者則邊人執笠依縠而立以禦寒暑名曰笠縠師懼退王使巡師曰吾先君克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏初若敖娶于䢵生鬬伯比若敖卒從其母畜於䢵淫于䢵子之女生子文焉䢵夫人使弃諸夢中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳榖女口謂虎於莬故命之曰鬬榖於莬以其女妻伯比實為令尹子文其孫針尹克黃使於齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生十年楚范巫矞似謂三君皆將彊死初楚范巫矞尹必似謂成王與子玉子西曰三君皆將彊死其丈城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶王使適至遂止之使為啇公㳂漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也使為工尹又與子家謀弒穆王穆王聞之殺鬭宜申及仲歸子家十一年鄋瞞遂亡鄋所求瞞莫干切北方長狄國在夏為防風氏商為汪芒氏侵齊遂伐我公卜使叔孫得臣追之吉冬敗狄獲長狄僑如富父終甥樁其喉以戈殺之埋其首於子駒之門以命宣伯初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御以敗狄于長丘獲長狄緣斯皇父之三子死焉宋公於是以門賞耐班使食其征謂之耐門晉之滅潞也獲僑如之弟焚如齊襄公之二年齊王子成父獲其弟榮如焚如弟埋其首於周首之北門衛人獲其季弟簡如鄋瞞由是遂亡十三年邾文公遷于繹邾文公卜遷于繹史曰利於民而不利於君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命衛鄭因魯公請平于晉公如晉朝且尋盟衛侯㑹公于沓請平于晉公還鄭伯㑹公于棐亦請平于晉公皆成之子家賦鴻鴈季文子曰寡君未免於此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜十四年齊懿公弒立齊昭公叔姬生舍叔姬無寵舍無威公子啇人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位秋七月齊商人弒舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之公子元不順懿公之為政也終不曰公曰夫巳氏襄仲使告于王請以王寵求昭姬于齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬十五年齊人來歸子叔姬王故也邾立定公邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還十五年宋華耦來盟辭宴宋華耦來盟公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅上大夫魯人以為敏揚祖之罪不敏也魯人以為敏明君子所不與魯文公薨齊懿公弒齊侯侵我西鄙十六年春及齊平公有疾使季文子㑹齊侯于陽榖請盟齊侯不肯公使襄仲納賂于齊侯故盟于郪丘十七年齊侯伐我北鄙襄仲請盟六月盟于榖冬襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死十八年春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月公薨齊懿公之為公子也與邴歜畜之父爭田弗勝及即位乃掘其勿而刖之而使歜僕納閻職之妻而使職驂乘夏公遊于申池二人浴于池歜以撲抶叱音擊也職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弒懿公納諸竹中歸舍爵而行齊人立公子元十六年楚滅庸楚大饑戎伐其西南至于阜山又伐其東南至于陽丘以侵訾枝庸人帥羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往寇亦能往不如伐庸夫䴢與百濮謂我飢不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次于句古侯澨使廬戢梨侵庸及庸方城庸人逐之囚子揚窗三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也蚡冒武王又與之遇七遇皆北唯禆倏紬魚人庸三邑實逐之庸人曰楚不足與戰矣遂不設備楚子乘馹又實㑹師于臨品分為二隊子越自石溪子貝補蓋自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸十八年襄仲立宣公二月公薨初敬嬴生宣公敬嬴嬖而私事襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯許之冬仲殺惡及視而立宣公仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也乃入殺而埋之馬矢之中惠伯死經不書人畏襄仲不敢書也公冉務人奉其帑以奔蔡既而復叔仲氏宣元年㑹于平州以定公位齊人取濟西之田為立公故以賂齊也十年齊侯以我服故歸濟西之田宣公納莒僕季文子出諸竟莒紀公生大子僕又生季他徒何愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達公問其故季文子使大史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德合法為德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘誓命以下皆九刑書今亡矣行父還旋觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也非域也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人皆顓頊苖裔蒼舒隤徒回敳五才檮直由戭以善大臨尨降下江庭堅仲容叔達此即垂益禹皋陶之倫齊聖廣淵明允篤誠天下之民謂之八愷和也髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍即稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元元善也此十六族也世濟其美不隕其名以至于堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟共子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾户本敦徒本少皡氏有不才子毁信廢忠崇飾惡言靖譖庸回靖安庸用服讒搜慝服行搜隱以誣盛德天下之民謂之窮竒歡兜渾敦而不開通共工其行窮其好竒顓頊氏有不才子不可教訓不知話言告之則頑舍赦之則嚚傲狠明德以亂天常天下之民謂之檮杌鯀頑凶檮杌無嚋匹之貌此三族也世濟其凶增其惡名以至于堯堯不能去縉雲氏黃帝時官名有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭於豔聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮貪才曰叨貪食曰餮舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦螭魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰愼徽五典五典克從無違教也曰納于百揆百揆時敘無廢事也曰賔于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎春秋左傳事類始末卷一
