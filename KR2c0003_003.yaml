body:
  text: 春秋左氏傳事類始末卷三宋章沖撰襄公十七年宋子罕止築臺者之謳宋皇國父為大宰為去平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執撲以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故對曰宋國區區而有詛有祝禍之本也齊晏桓子大夫而行士喪禮齊晏桓子卒晏嬰粗縗斬苴絰帶杖菅屨苴麻之有子者取其粗食鬻居倚廬寢苫枕草此與士喪禮略同其異唯枕草然枕凷亦非喪服正文其老曰非大夫之禮也曰唯卿為大夫十九年齊崔慶之亂齊侯娶於魯曰顔懿姬無子其姪鬷聲姬生光以為大子諸子仲子戎子戎子嬖仲子生牙戎子請以為大子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東大子光使高厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市夏五月靈公卒莊分即位執公子牙于句瀆之丘以夙沙衛易已衛奔高唐以叛秋崔杼殺高厚而兼其室書曰齊殺其大夫從君於昏也慶封圍高唐弗克冬齊侯圍之見衛在城上號之乃下問守備焉以無備告揖之乃登高唐人殖綽工僂會夜縋納師醢衛于軍二十一年齊侯使慶佐為大夫復討公子牙之黨執公子買于句瀆公子鉏來奔叔孫還奔燕言莊公斥親族以成崔慶之勢終有弒殺之禍晉欒盈出奔楚冬會於商任錮欒氏也齊侯衛侯不敬叔向曰二君必不免會朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也二十二年秋欒盈自楚適齊晏平仲曰商任之會受命於晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣冬會于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼二十三年晉侯將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃四月欒盈帥曲沃之甲因魏獻子以晝入絳范鞅用劒以帥卒欒氏退盈奔曲沃晉人圍之秋齊侯伐衛先驅榖榮御王孫揮召揚為右申驅次前軍成秩御莒恆申鮮虞之傅摯為右曹開御戎晏父戎為右公御右也二廣上之登御邢公盧蒲癸為右公副車啓左翼曰啓牢成御襄罷師狼蘧疏為右胠右翼曰胠商子車御侯朝桓跳為右大殿後軍商子遊御夏之御寇崔如為右燭庸之越駟乘自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎弗聽陳文子見崔武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也況以惡乎齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍謂築壘壁於熒庭戍郫邵晉邑封少水封晉尸於少水為京觀以報平陰之役乃還遂襲莒門于且于傷股而退明日將復戰杞殖華還宿於莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成勝大國而畏齊侯歸遇杞梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔婦人無外事故齊侯弔諸其室二十四年齊侯既伐晉而懼將欲見楚子楚子使薳啓強如齊聘且請期齊社搜軍實使客觀之陳文子曰齊將有寇吾聞之兵不戢必取其族秋齊侯聞有晉師使陳無宇從薳啓強如楚辭且乞師會于夷儀將以伐齊水不克冬楚子伐鄭以救齊諸侯還救鄭晉侯使張骼輔躒致楚師求御於鄭鄭人卜宛射犬吉子大叔戒之曰大國之人不可與也對曰無有衆寡其上一也大叔曰不然部婁無松柏二子在幄坐射犬于外既食而後食之使御廣車而行已皆乘乘車將及楚師而後從之乘皆踞轉衣裝而鼓琴近不告而馳之皆取胄於櫜而胄入壘皆下搏人以投收禽挾囚弗待而出皆超乘抽弓而射既免復踞轉而鼓琴曰公孫同乘兄弟也胡再不謀對曰曩者志入而已今則怯也皆笑曰公孫之亟也二十五年崔杼帥師伐我北鄙公患之孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使民不嚴異於他日齊師徒歸齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御崔以弔焉見棠薑而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困坎下兑上之大過巽下兑上史皆曰吉示陳文子文子曰夫從風坎為中男故曰夫變為巽故曰從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人崔子因是又以其間伐晉也曰晉必將報欲弒公以説於晉夏五月莒子朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從薑氏薑入于室與崔子自側户出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命陪臣干掫有淫者不知二命公踰牆又射之中股返隊遂弒之賈舉非上侍人賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭於高唐至復命不説辨而死於崔氏申蒯侍魚者監取魚者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑於平陰晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是飬故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸用死亡之義無所歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒叔孫宣伯僑如之在齊也納其女於靈公生景公丁丑崔杼立而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷者是與有如上帝乃歃大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡而往聞既書矣乃還崔氏側莊公於北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲下車送葬車齊依上公禮以九乘晉侯會于夷儀伐齊以報朝歌之役齊人以莊公説使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正三軍帥五吏文臣三十帥武臣軍之屬三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之二十七年齊慶封來聘其車美盂孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也齊崔杼生成及強而寡娶東郭薑生明東郭以孤入曰棠無咎與東郭偃相崔氏崔成有疾廢之而立明成請老于崔崔子許之偃與無咎弗與曰崔宗邑也必在宗主成與強怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從大恐害夫子敢以告慶封告盧蒲嫳嫳曰彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰茍利夫子必去之難吾助女九月崔成崔強殺東郭偃棠無咎於崔子之朝崔子怒而出遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏殺成與強而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊辛巳崔明來奔慶封當國二十八年齊慶封好田而嗜酒與慶舍政封子則以其內實寶物妻子遷於盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之舍也有寵妻之慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈而先後之公膳日雙雞卿大夫之食饔人竊更之以鶩御者知之則去其肉去起吕反而以其洎肉汁饋此癸何之謀使大夫怒慶氏子尾子雅怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血冬十月慶封田于萊慶嗣封族聞之曰禍將作矣謂子家速歸禍作必於嘗歸猶可及也子家弗聽亦無悛志盧蒲薑謂癸曰不告我必不捷矣癸告之薑曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗於大公之廟慶舍涖事盧蒲薑告之且止之曰誰敢者遂如公麻嬰為尸慶為上獻盧蒲癸王何執寢戈慶氏以其甲環公宫廟在宫內陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至於魚里欒高陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍以俎壺投殺人而後死公懼鮑國曰羣臣為君故也陳須無以公歸慶封入伐內宫弗克反陳於嶽請戰弗許遂來奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封汜祭穆子使工為之誦茅鴟亦不知既而齊人來讓奔吳吳句餘與之朱方聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘及慶氏亡皆召之具其器用而反其邑焉與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富猶布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之公以為忠故有寵釋盧蒲嫳于北竟求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬既崔氏之臣曰與我其拱璧吾獻其柩於是得之十二月齊人遷莊公殯于大寢以其棺尸崔杼於市二十九年二月齊人葬莊公于北郭昭三年齊侯田于莒盧蒲嫳見泣且請曰余髮如此種種余奚能為公曰諾吾告二子子尾欲復之子雅不可曰彼其髮短而心甚長其或寢處我矣九月子雅放盧蒲嫳于北燕四年秋楚子以諸侯伐吳使屈申圍朱方克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之衛石共子卒衛石共子卒悼子不哀孔成子曰是謂蹶其本必不有其宗二十八年衛人討寧氏之黨石惡出奔晉衛人立其從子圃以守石氏之祀禮也二十年陳殺二慶蔡分子燮欲以蔡之晉蔡人殺之陳慶虎慶寅畏公子黃之逼訴諸楚曰與司馬同謀楚人以為討公子黃出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死書曰蔡殺其大夫公子燮言不與民同欲也公子黃將出奔呼好故於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也二十三年陳侯如楚公子黃訴二慶于楚楚人召之使慶樂往殺之慶氏以陳叛屈建從陳侯圍陳陳人城役人相命各殺其長遂殺慶虎慶寅楚人納公子黃君子謂慶氏不義不可肆也故書曰惟命不于常二十四年陳人復討慶氏之黨針宜咎出奔楚季武子如宋聘季武子如宋聘禇師段逆之以受享賦常棣之七章以卒言二國好合宜其室家其相親如兄弟宋人重賄之歸復命公享之賦魚麗之卒章物其有矣維其時矣聘宋以時公賦南山有臺樂只君子邦家之光武子去所曰臣不堪也二十一年魯季孫來外盜邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劒帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度待洛其信可明徴也而後可以治人夫上之所為民之所歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎夏書曰念茲在茲釋茲在茲名言茲在茲允出茲在茲惟帝念功將謂由已一也信由已一而後功可念也楚殺子南楚子庚卒楚子使薳子馮為令尹訪於申叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下氷而牀焉重繭綿衣衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南追舒為令尹二十二年楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四境子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子不欲犯命三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗忍也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之羊舌氏之族及於難晉欒盈出奔楚范宣子殺羊舌虎囚叔向人謂叔向曰子離於罪其為不知乎叔向曰與其死亡若何詩曰優哉遊哉聊以卒歲知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言於君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讎內舉不失親其獨遺我乎詩曰有覺德行四國順之夫子覺者也覺較然正直晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乘馹入實而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨勳明徴定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放大甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子説與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝初叔向之母妬叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懷子嬖之故羊舌氏之族及於難二十二年穆叔能用教臧武仲如晉兩過御邑名叔御叔在其邑將飲酒曰焉用聖人武仲多知時曰聖人我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人國之蠧也令倍其賦晉召鄭朝晉人徵朝于鄭鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉是以有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜二於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟齊同也遂帥羣臣隨於執事以會歲終二於楚者子侯石盂歸而討之溴梁之明年子蟜老矣公孫夏從寡君以朝于君見於嘗酎與執膰焉間二年聞君將靖東夏二十年澶淵會四月又朝以聽事期不朝之間無歲不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讎敝邑是懼其敢忘君命委諸執事執事實重圖之鄭子張善戒鄭公孫黑肱有疾歸邑于公召室老宗人立段而使黜官不多受職薄祭祭以特羊殷以少牢足以共祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也己巳伯張卒君子曰善戒詩曰慎爾侯度用戒不虞鄭子張其有焉鄭遊昄奪逆妻者鄭遊昄將如晉未出竟遭逆妻者奪之以館于邑丁巳其夫攻子明殺之以其妻行子展廢良而立大叔曰國卿君之二也民之主也不可以茍請舍子明之類求亡妻者使復其所使遊氏勿怨曰無昭惡也二十三年杞孝公卒晉平公不徹樂杞孝公卒晉悼夫人喪之平公不徹樂非禮也禮為鄰國闕臧紇作不順去魯季武子無適子公彌長而愛悼子欲立之訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往盡舍旃故公鉏氏富又出為公左宰盂孫惡臧孫季孫愛之孟氏之御騶豐點好羯也曰從余言必為孟孫羯從之孟莊子疾豐點謂公鉏茍立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立于户側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰盂孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從己而視之畏孟氏孟氏又告季孫季孫怒命攻臧氏臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆薑之姨子也生紇長於公宫薑氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請茍守先祀無廢二勳文仲宣叔敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首載書章首焉對曰盟東門氏也曰毋或如東門遂不聽公命殺適立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居音基與也其孟椒乎子服惠伯齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠而何乃弗與田仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也夏書曰念兹在兹順事恕施也二十四年穆叔對死而不朽穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之大上有立德其次有立功其次有立言雖久不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之祿之大者不可謂不朽范宣子重幣鄭伯朝晉且請伐陳范宣子為政諸侯之幣重鄭人病之鄭伯如晉子産寓書於子西以告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨女無二爾心有令名也夫恕思以明德則令名載而行之是以逺至邇安毋寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子説乃輕幣是行也鄭伯朝晉為重幣故且請伐陳也鄭伯稽首宣子辭子西相曰以陳國之介恃大國而陵虐於敝邑寡君是以請罪焉敢不稽首二十五年初陳侯會楚子伐鄭前年當陳隧者井堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳入之子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節兵德司空致地乃還鄭子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至于莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞億度逞盡我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷啓敝邑心陳知其罪授手於我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻千里列國一同百里自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也土莊伯不能詰復於趙文子文子曰其辭順犯順不祥乃受之冬子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功愼辭哉二十六年鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服先八邑三十二井賜子産次路再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固豫之乃受三邑公孫揮曰子産其將知政矣讓不失禮楚滅舒鳩楚子為舟師以伐吳不為軍政賞罰之差無功而還吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹壽與師祁犂讓之舒鳩人敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還二十五年楚薳子馮卒屈建為令尹舒鳩人卒叛令尹子木伐之及離城吳人救之子木遽以右師先子強息桓子捷子駢子盂帥左師以退五人不及子木與吳師遇而退吳人居其間七日子強曰久將墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我我克則進奔則亦視之視勢而救乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之簡師會之吳師大敗遂圍舒鳩八月滅之十二月吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣射之卒楚子以滅舒鳩賞子木辭曰先大夫蒍子之功也前請退師以須其叛以與蒍掩豎牛亂叔孫氏齊人城郟王城穆叔如周聘且賀城王嘉其有禮也賜之大路昭四年初穆子去叔孫氏及庚宗辟僑如遇婦人使私為食而宿焉適齊娶于國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂肩傴深目而猳喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之魯人召之而歸既立所宿庚宗之婦人獻以雉問其姓曰余子長矣召而見之則所夢也未問其名號之曰牛曰唯遂使為豎有寵長使為政田于丘蕕遂遇疾焉豎牛欲亂其室而有之強與孟盟不可叔孫為孟鍾曰爾未際饗大夫以落之以猳豬血釁鍾謂之落既具使豎牛請日入弗謁出命之日及賔至聞鍾聲牛曰孟有北婦人之客怒將往牛止之賔出使拘而殺諸外殺盂丙牛又強與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜泄見告之飢渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使置饋于個廂屋而退牛弗進則置虛命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜泄葬叔孫豎牛賂叔仲昭子與南遺使惡杜泄於季孫而去之杜泄將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冡卿無路介卿以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命於朝而聘於王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之事見作三軍下昭五年叔仲子謂季孫曰帶受命於子叔孫曰葬鮮非命曰者自西門季孫命杜泄泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宫射之中目而死昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶將以赦罪罪莫大焉必速殺之牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之初穆子之生也莊叔以周易筮之遇明夷離下坤上之謙艮下坤上以示卜楚邱曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十甲癸故有十時亦當十位自王已下其二為公其三為卿日中當王食時當公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為𨽻日入為僚晡時為僕日昳為臺日上其中食日為二旦日為三明夷之謙明而未融其當旦乎離在坤下日在地中之象又變為謙謙道卑退故明而未融故曰為子祀卜豹為卿故為子祀日之謙當鳥故曰明夷于飛離為日為鳥離變為謙日光不足故當鳥明而未融故曰垂其翼象日之動故曰君子于行初九有應君子象也在明傷之世居下位將辟難而行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗離艮合體於人為言艮為言敗言為讒為離所焚故敗故曰有攸往主人有言言必讒也純離為牛畜牝牛吉世亂讒勝勝將適離故曰其名曰牛離焚山則離勝喻世亂則讒勝山焚則離獨存故知名牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終旦正卿莊叔世為亞卿而已位不足盡卦體蓋引而致之子産始知然明晉侯嬖程鄭使佐下軍鄭公孫揮如晉聘程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也二十五年晉程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔曰他日吾見蔑之面而已今吾見其心矣子大叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣二十五年宋向戍弭諸侯之兵晉趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭二十六年許靈公如楚請伐鄭十六年晉伐許他國皆大夫鄭伯自行故恚之曰師不興孤不歸矣八月卒於楚楚子曰不伐鄭何以求諸侯冬楚子伐鄭鄭人禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇而嗇於禍以足其性而求名焉者非國之利也若何從之子展説不禦冦十二月入南里墮其城門于師之梁涉汜而歸而後葬許靈公二十七年宋向戍善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大災也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人許之告於秦秦亦許之皆告於小國為會於宋子木謂向戍請晉楚之從交相見也向戍復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊向戍復言於子木子木使馹謁諸王王曰釋齊秦他國請相見也以藩為軍晉楚各處其偏伯夙謂趙孟曰楚氛甚惡懼難趙孟曰吾左還入於宋若我何盟於宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其信以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信大宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病為楚所病則入宋守則夫能致死與宋致死則雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟故不書族言違命也晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人書先晉晉有信也宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也子木問於趙孟曰范武子之德何如對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭子木歸以語王王曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭晉荀盈遂如楚涖盟鄭伯享趙孟於垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲既見君子我心則降趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁其君淫亂鶉之不若趙孟曰牀笫之言不踰閾非使人之所得聞也子西賦黍苖之四章比趙孟於召伯趙孟曰寡君在武何能焉子産賦隰桑思見君子盡心以事之趙孟曰武請受其卒章子大叔賦野有蔓草邂逅相遇適我願兮趙孟曰吾子之惠也印段賦蟋蟀好樂無荒趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈君子有禮文而受天之祐趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能久乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣為三十年鄭殺良霄傳文子曰其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎宋左師請賞曰請免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之左師辭邑向氏欲攻司城左師曰我將亡夫子存我德莫大焉又可攻乎君子曰彼已之子邦之司直樂喜之謂乎何以恤我我其收之向戍之謂乎楚薳罷如晉蒞盟晉侯享之將出賦既醉叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民政其焉往二十八年夏齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋之盟故也齊侯將行慶封曰我不與盟何為於晉陳文子曰先事後賄禮也小事大未獲事焉從之如志禮也未從其政當從大國請事以順其志雖不與盟敢叛晉乎孟孝伯如晉告將為宋之盟故如楚也鄭伯使遊吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以歲之不易聘於下執事今執事有命曰女何與政令之有必使而君棄而封守跋涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚子大叔歸復命告子展曰楚子將死矣不修其政德而貪昧於諸侯以逞其願欲久得乎周易有之在復震下坤上之頤震下艮上曰迷復凶其楚子之謂乎欲復其願而棄其本復歸無所是謂迷復能無凶乎君其往也送葬而歸以快楚心楚不幾十年未能恤諸侯也吾乃休吾民矣禆竈曰今兹周王及楚子皆將死歲棄其次而旅於明年之次以害鳥帑歲棄星紀之次客在玄枵歲星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故受其咎俱論歲星過次梓慎曰宋鄭飢禆竈曰周楚王死傳故備舉以示卜占楚人所在九月鄭遊吉如晉告將朝于楚子産相鄭伯以如楚舍不為壇至敵國郊為壇受郊勞外僕言曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大茍舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德小適大有五惡説其罪戻請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也冬公及宋公陳侯鄭伯許男如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇飢寒之不恤誰遑其後不如姑歸也叔孫穆子曰叔仲子專之矣子服子始學者也榮成伯曰逺圖者忠也公遂行宋向戍曰我一人之為非為楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反楚屈建卒趙文子喪之如同盟禮也終伯犂之言三十一年公作楚宫穆叔曰大誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月公薨于楚宫楚蒍掩得治國之體楚蒍掩為司馬子木使庀賦數甲兵蒍掩書土田土地之宜度山林鳩藪澤聚成藪澤以備田獵辨京陵為冢墓表淳鹵淳鹵埆薄之地表之輕賦稅數疆潦疆界有流潦則計數減租規偃豬受水多少町原防隄防間地不方正如井田别為小頃町牧隰臯井衍沃量入修賦賦車籍馬賦車兵甲士徒卒甲楯之數既成以受子木禮也二十六年晉叔向召行人子員秦伯之弟針如晉修成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劒從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎鄭請印堇父楚子秦人侵吳遂侵鄭鄭皇頡與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂伯州犂曰請問於囚伯州犂上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉戌怒抽戈逐王子圍弗及楚人以皇頡歸囚印堇父以獻於秦鄭人取貨於印氏以請之子大叔為令正以為請子産曰不獲受楚之功而取貨於鄭不可謂國秦不其然若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不豫更幣從子産而後獲之宋左師伊戾殺大子初宋芮司徒生女子赤而毛棄諸隄下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉大子痤美而狠合左師畏而惡之寺人惠牆伊戾為大子內師而無寵秋楚客聘於晉過宋大子知之請野享之公使往伊戾請從之至則欿用牲加書徵之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃烹伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之楚聲子復椒舉初楚伍參與蔡大師友其子伍舉與聲子相善也伍舉娶於王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戍將平晉楚聲子通使於晉還如楚令尹子木問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也商頌有之曰不僭不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譖雍子君與夫人不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次焚次示必死明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射御驅侵吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苖以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之簡易兵備欲令楚貪已不復顧二穆之兵中行二郤必克二穆子重子辛吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師熸子反死之鄭叛吳興楚失諸侯則苖賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼益其祿爵而復之聲子使椒鳴舉子逆之韓宣子辭不失舊晉韓宣子聘于周王使請事對曰晉士起將歸時事於宰旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊晉趙文取喪邑復諸侯齊人城郟之歲其夏齊烏餘以廪丘奔晉襲衛羊角取之遂襲我高魚又取邑于宋於是范宣子卒諸侯弗能治也及趙文子為政乃卒治之言於晉侯曰晉為盟主諸侯或相侵也則討之而使歸其地今烏餘之邑皆討類也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往二十七年胥梁帶使諸喪邑者具車徒以受地必周使烏餘具車徒以受封烏餘以其衆出而遂執之皆取其邑而歸諸侯諸侯是以睦於晉二十八年無冰宋鄭其飢春無冰梓慎曰今茲宋鄭其飢乎歲在星紀而淫於玄枵星紀在丑斗牛之次玄枵在子虛危之次以有時災陰不堪陽陰用事而無冰是陰不堪陽蛇乘龍蛇玄武之宿虛危之次歲星木木青龍失次出虛危下為蛇所乘龍宋鄭之星也歲星東方東方房心為宋角亢為鄭宋鄭必飢玄枵虛中也玄枵三星虛星在中枵耗名也土虛而民耗不飢何為子産知蔡景侯不免蔡侯朝于晉秋歸自晉入享于鄭不敬子産曰蔡侯其不免乎日其過此也君使子展迋勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必繇其子其為君也淫而不父僑聞之如是者恆有子禍三十年蔡景侯為太子般娶于楚通焉大子弒之鄭伯有侈愎而死為宋之盟公如楚過鄭鄭伯不在伯有迋勞於黃崖不敬穆叔曰伯有無戾於鄭鄭必有大咎敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也敬可棄乎二十九年伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也世為行人子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月鄭大夫盟於伯有氏禆諶曰是盟也其與幾何詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能紓然明曰政將焉往禆諶曰善之代不善天命也其焉辟子産舉不踰等則位班也擇善而舉則世隆也天又除之奪伯有魄子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾不然將亡矣三十年子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此歲也駟良方爭未知所成若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣夏鄭伯及其大夫盟君子是以知鄭難之不已也鄭伯有耆酒為窟室而夜飲酒擊鍾焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之遂奔許大夫聚謀子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生罕子皮駟子晳豐公孫段伯有汰侈故不免三家同出而伯有孤特又汰侈所以亡人謂子産就直助強子産曰豈為我徒不以二氏為黨國之禍難誰知所敝或主強直難乃不生姑成吾所欲以無所附著為所子産斂伯有氏之死者而殯之不及謀而遂行印段從之義子産子皮曰夫子禮於死者況生者乎遂自止之鄭伯及其大夫盟于大宫盟國人于師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣自墓門之瀆入因馬師頡子羽孫介于襄庫以伐舊北門駟帶帥國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死於羊肆子産禭之枕之股而哭之既而葬諸斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止於是遊吉如晉還不入復命于介八月奔晉駟帶追之用兩圭質于河己巳復歸於子蟜之卒也十九年將葬公孫揮與裨竈晨會事焉過伯有氏其門上生莠子羽曰其莠猶在乎於是歲在降婁降婁中而旦禆竈曰猶可以終歲歲不及此次也已及其亡也歲在娵訾之口昭七年鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之歲二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月此年正月壬寅公孫段卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子大叔問其故子産曰鬼有所歸乃不為厲吾為之歸也大叔曰公孫泄何為子産曰説也為身無義而圖説伯有無義以妖鬼故立恐惑民并立泄使若以大義存誅絶之後者以解説民心從政有所反之以取媚也民不可使知之故當反道求媚于民不媚不信不信民不從也及子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明匹夫匹婦強死其魂魄猶能馮依於人以為淫厲況良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而強死能為鬼不亦宜乎二十九年公冶致其邑於季氏公如楚還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭強之而後受五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我鄭罕宋樂施而不德鄭子展卒子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也宋亦飢請於平公出公粟以貸使大夫皆貸司城貸而不書為大夫之無者貸宋無飢人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎民之歸也施而不德樂氏加焉其以宋升降乎晉平公城杞晉平公杞出也故治杞六月知悼子合諸侯之大夫以城杞鄭子大叔見大叔文子與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤宗周之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰協比其鄰昏姻孔云晉不鄰矣其誰云之晉侯使司馬女叔侯來治杞田弗盡歸也晉悼夫人愠曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰杞夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書府無虛月如是可矣何必瘠魯以肥杞且先君而有知也毋寧夫人而焉用老臣三十年晉悼夫人食似輿人之城杞者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之一也正月夏正月也三分六甲之一得甲子甲戌盡癸未吏走問諸朝師曠曰魯叔仲惠伯會郤成子于承匡之歲也文十一年是歲也狄伐魯叔孫莊叔敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣史趙曰亥有二首六身亥字二畫在上併三六為身如算之六下二如身是其日數也士文伯曰然則二萬六千六百有六旬也趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才遂仕之使助為政辭以老與之田使為君復陶以為絳縣師復陶主衣服之官縣師掌地域辨人民而廢其輿尉役孤老故於是魯使者在晉歸以語諸大夫季武子曰晉未可偷也有趙孟以為大夫有伯瑕以為佐有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可偷乎勉事之而後可昭七年公如楚孟僖子為介晉人來治杞田前女叔不盡歸公如楚晉恨之故復來治季孫將以成與之謝息為孟孫守不可曰人有言曰雖有挈瓶之知守不假器禮也夫子從君而守臣喪邑雖吾子亦有猜焉季孫曰君之在楚於晉罪也又不聽晉晉師必至吾無以待之不如與之間晉而取諸杞吾與子桃成反誰敢有之是得二成也魯無憂而孟孫益邑子何病焉辭以無山與之萊柞乃遷于桃晉人為杞取成吳公子札請觀周樂吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也衛康叔武公德化深逺故遭宣公淫亂懿公滅亡民猶秉義不至於困也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎宗周隕滅政夏思猶為先王之風故不懼為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱𢎞大之聲乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎秦仲始有禮樂去西戎之音而有諸夏之聲故曰夏聲為之歌魏曰美哉渢渢扶弓乎大而婉險而易行以德輔此則明主也渢渢中庸之聲婉約也險當為儉也大而約則儉節而易行為之歌唐曰思息嗣深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎淫聲放蕩故國無主自鄶以下無譏焉為之歌小雅曰美哉思而不二思文武之德而不叛怨而不言其周德之衰乎猶有先王之遺民焉有商餘俗故未失為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑故免於欒高之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉吳貴縞鄭貴紵各獻所貴示損已而不為貨利也謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎説叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難齊放其大夫高止齊公孫蠆公孫竈放其大夫髙止於北燕書曰出奔罪髙止也髙止好以事自為功且專故難及之髙豎以盧叛閭丘嬰帥師圍盧髙豎曰茍使髙氏有後請致邑齊人立敬仲之曽孫酀良敬仲也髙豎致盧而奔晉三十年楚令尹圍行大事楚子使薳罷來聘通嗣君也穆叔問王子之為政何如對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不告穆叔曰楚令尹將有大事子蕩將與焉助之匿其情矣三十一年衛侯在楚北宫文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀唯民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威可畏謂之威有儀可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟內外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之德曰大國畏其力小國懷其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也昭元年楚公子圍聘于鄭且娶於公孫段氏伍舉為介將入館鄭人惡之使館于外既聘將以衆逆子産患之使子羽辭曰以敝邑𥚹小不足以容從者請墠聽命為墠行昏禮令尹命大宰伯州犂對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告於莊共之廟而來若野賜之是委君貺於草莾也是寡大夫不得列於諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之入逆而出遂會于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋楚重得志於晉晉之恥也子相晉國以為盟主於今七年矣再合諸侯襄二十五年會夷儀二十六年會澶淵三合大夫二十七年會宋三十年會澶淵此年會虢服齊狄寧東夏平秦亂二十六年秦成城淳于二十九年城淳于杞遷都師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有飢饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患三月甲辰盟楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宫緝蒲為正宫有前不亦可乎楚伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎齊國子曰吾代二子愍矣圍篡不終州犂見殺故可愍陳公子招曰不憂何成二子樂矣以憂生事事成而樂衛齊子曰茍或知之雖憂何害宋合左師曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣吾從之義取暴虎馮河之可畏不敬小人亦危殆鮒從斯義故不敢譏議公子圍退會子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家持之皆保世之主也齊衛陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之三大夫兆憂憂能無至乎言以知物物類也禍福之類其是之謂矣秋楚公子圍使公子黑肱伯州犂城犫櫟郟三邑鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍入問王疾縊而弒之遂殺其二子幕及平夏右尹子干出奔晉王子比宫廏尹子晳奔鄭黑肱殺伯州犂于郟葬王于郟謂之郟敖使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長宋災或叫于宋大廟曰嘻嘻熱貌出出戒伯姬鳥鳴于亳社如曰嘻嘻宋大災伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戍衛北宫他鄭罕虎及小邾之大夫會于澶淵既而無歸於宋故不書其人君子曰信其不可不慎乎澶淵之會卿不書不信也夫諸侯之上卿會而不信寵名皆棄不信之不可也如是詩曰文王陟降在帝左右信之謂也又曰淑慎爾止無載爾偽不信之謂也書曰某人某人會于澶淵宋災故尤之也楚滅陳蔡鄭子産如陳涖盟歸復命告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫敖政多門以介於大國能無亡乎不過十年矣昭八年陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼大子偃師而立公子留四月哀公縊干徵師赴于楚且告有立君公子勝訴于楚楚人執而殺之公子留奔鄭秋公子招歸罪於公子過而殺之楚公子棄疾帥師奉孫吳偃師子惠公圍陳冬十一月滅陳輿嬖袁克殺馬毁玉以葬輿衆也袁克嬖人之貴者楚人將殺之請置之既又請私私於幄加絰於顙而逃使穿封戌為陳公曰城麇之役不諂與靈王爭皇頡侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎對曰若知君之及此臣必致死禮以息楚國晉侯問於史趙曰陳其遂亡乎對曰未也陳顓頊之族也歲在鶉火是以卒滅陳將如之火盛而水滅今在析木之津猶將復由且陳氏得政于齊而後陳卒亡自幕至於瞽叟無違命舜重之以明德置德於遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣九年四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也相治也楚先祝融為髙辛氏火正今火出而火陳逐楚而建陳也水得妃而興陳興則楚衰妃以五成故曰五年妃合也五行各相妃合得五而成故五歲而陳復封歲五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年是歲在星紀五歲及大梁而陳復封自大梁四歲而及鶉火後四周四十八歲凡五及鶉火天以五為紀歲五而水衰十一年景王問於萇𢎞曰今茲諸侯何實吉何實凶對曰蔡凶此蔡侯般弒其君之歲也歲在豕韋襄三十年般弒君歲在豕韋今十三歲又在豕韋弗過此矣楚將有之然壅也歲在大梁蔡復楚凶天之道也靈王弒立之歲歲在大梁昭十三年歲復在大梁故知楚凶楚子在申召蔡靈侯蔡大夫曰幣重而言甘誘我也不如無往蔡侯不可三月楚子伏甲而饗蔡侯於申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緡以喪其國紂克東夷以隕其身楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振五月楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡晉之不能亦可知也已為盟主而不恤亡國將焉用之秋會于厥憖謀救蔡也鄭子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣晉人使狐父請蔡於楚弗許冬十一月楚子滅蔡用隱大子于岡山申無宇曰不祥五牲不相為用況用諸侯乎王必悔之十二月使棄疾為蔡公十三年平王即位復封陳蔡隱大子之子廬歸于蔡悼大子之子吳歸于陳禮也楚靈王之死平王之立楚公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免昭元年楚公子圍聘于鄭為會於虢令尹享趙孟賦大明之首章明明在下赫赫在上特稱以自光大趙孟賦小宛之二章各敬爾儀天命不又以戒令尹事畢趙孟謂叔向曰令尹自以為王矣何如對曰王弱令尹強其可哉雖可不終趙孟曰何故對曰強以克弱而安之強不義也不義而強其斃必速詩曰赫赫宗周褒姒滅之強不義也令尹為王必求諸侯晉少懦矣若獲諸侯其虐滋甚民弗堪也將何以終夫以強取不義而克必以為道道以淫虐弗可久也已冬楚公子圍入問王疾縊而弒之十一月楚靈王即位鄭遊吉如楚歸謂子産曰具行器矣楚王汰侈而自説其事必合諸侯吾往無日矣子産曰不數年未能也四年許男如楚楚子止之遂止鄭伯復田江南使椒舉如晉求諸侯二君待之椒舉致命曰日君有惠賜盟于宋曰晉楚之從交相見也以歲之不易寡人願結歡於二三君使舉請間君若茍無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以亨神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇若何虞難齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉唯是不來其餘君之所及也王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟夏諸侯如楚魯衛曹邾不會六月楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戍鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男會公之禮六君子謂合左師善守先代子産善相小國楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之會有緡叛之商紂為黎之搜東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄惡及逺方則民棄之善亦如之德逺而後興楚子遂以諸侯滅賴遷賴于鄢欲遷許於賴使鬬韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也六年楚公子棄疾如晉過鄭鄭罕虎公孫僑遊吉從鄭伯以勞諸柤辭不敢見固請見之見如見王以其乘馬八匹私面見子皮如上卿以馬六匹見子産以馬四匹見子大叔以馬二匹禁芻牧採樵不入田不樵樹不採藝不抽屋不強丐誓曰有犯命者君子廢小人降舍不為暴主不慁賔往來如是鄭三卿知其將為王也七年楚子之為令尹也為王旌以田芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之無宇之閽入焉無宇執之有司弗與執而謁諸王王將飲酒無宇辭曰天子經略諸侯正封古之制也封略之內何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之濵莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人於王宫將焉執之周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣王曰取而臣以往盜有寵未可得也遂赦之八年冬滅陳使穿封戌為陳公十一年冬滅蔡城陳蔡不羮使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立齊桓公城榖而置管仲焉至于今賴之臣聞五大不在邊五細不在庭上古金木水火土曰五官玄鳥丹鳥氏亦有五五鳩鳩民五雉為工正皆立官之本也末世隨事施職故官無常數五大五官之長專盛過節不可居邊細弱不勝任者亦不可居朝廷親不在外羈不在內今棄疾在外鄭丹在內君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子遊齊渠丘實殺無知衛蒲戚實出獻公若由是觀之則害於國末大必折尾大不掉君所知也十二年楚子狩于州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾溪以為之援雨雪王皮冠秦復陶秦所遺羽衣翠被豹舄執鞭以出僕析父從右尹子革夕王見之去冠被舍鞭與之語曰昔我先王熊繹與吕級王孫牟康叔子燮父晉康叔子禽父伯禽並事康王四國皆有分我獨無有今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路藍縷以處草莾跋涉山林唯是桃弧棘矢以禦不祥以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅陸終氏生六子長曰昆吾少曰季連季連楚祖故謂昆吾為伯父昆吾故居許地今鄭人貪賴其田我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘諸侯其畏我乎對曰畏君王哉是四國者專足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剝圭為鏚柲敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過王曰是能讀三墳五典八索九邱對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心王是以獲沒于祗宫臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招祈周司馬世掌甲兵之職招其名方諫遊行故指司馬官而言之愔愔安和貌式昭德音思我王度式如玉式如金取堅重形民之力而無醉飽之心國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心王揖而入饋不食寢不寐數日不能自克以及於難仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾溪十三年楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與於守而行申之會越大夫戮焉王奪鬬韋龜中犫邑名又奪成然邑而使為郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常壽過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳蔡大夫聲子子曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情強與之盟入襲蔡使坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人將執之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之與蔡公衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國國陳蔡而依之楚公子比子干公子黑肱子晳公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉始涉之師因四族之徒薳氏許圍蔡洧蔓成然以入楚及郊陳蔡欲為名故請為武軍欲築壘壁示後人為復讎之名蔡公曰役病矣請藩而已乃藩為軍蔡公使須務牟與史猈皮佳先入因正僕人殺大子祿及公子罷敵正僕大子近官公子比為王黑肱為令尹棄疾為司馬使觀從從師于乾溪而告曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣右尹子革曰請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祗取辱焉然丹乃歸于楚王沿夏將欲入鄢芋尹無宇之子申亥曰吾父再姦王命王弗誅惠孰大焉君不可忍惠不可棄吾其從王夏五月王縊于芋尹申亥氏申亥以其二女殉而葬之觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子乃行國每夜駭曰王入矣乙卯夜棄疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣衆怒如水火焉不可為謀二子皆自殺丙辰棄疾即位名曰熊居葬子干于訾實訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人封陳蔡復遷邑致羣賂施舍寬民宥罪舉職召觀從曰唯爾所欲從教子干殺棄疾今召用之明在君為君之義對曰臣之先佐開卜乃使為卜尹他年芋尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸初共王無冡適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使主社稷乃遍以璧見於羣望曰當璧而拜者神所立也既乃與巴姬密埋璧於大室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭於甲紐鬭韋龜屬成然焉子干歸韓宣子問於叔向曰子干其濟乎對曰難曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無德五也子干在晉十三年矣晉楚之從不聞逹者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羇終世可謂無民亡無愛徵楚無念之者可謂無德有楚國者其棄疾乎君陳蔡城外屬焉穿封戌死遂并領陳苛慝不作賊盜伏隱私欲不違民無怨心先神命之國民信之芈姓有亂必季實立楚之常也獲神一也有民二也令德三也寵貴四也居常五也棄疾季有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣位不尊其寵棄矣文役民無懷焉國無與焉無內主將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵於僖有鮑叔牙賔須無隰朋以為輔佐有莒衛以為外主有國髙以為內主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國我先君文公狐季姬之子也有寵於獻好學而不二生十七年有士五人狐偃趙衰顚頡魏武子司空季子有先大夫子餘子犯以為腹心有魏犫賈他以為股肱有齊宋秦楚以為外主有欒郤狐先以為內主亡十九年守志彌篤惠懷棄民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異於子干共有寵子國有奧主棄疾無施於民無援於外去晉而不送歸楚而不逆何以冀國鄭子皮授子産政鄭子皮授子産政辭曰國小而逼族大寵多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬三十一年子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國昭五年鄭罕虎如齊娶于子尾氏晏子驟見之陳桓子問其故對曰能用善人民之主也十三年秋諸侯會于平丘子産歸未至聞子皮卒哭且曰吾已無為為善矣唯夫子知我子産為政子産為政有事伯石賂與之邑子大叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子大叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒與之伯有既死命伯石為卿辭大史退則請命焉復命之又辭如是三乃受䇿入拜子産是以惡其為人也使次已位子産使都鄙有章車服有辨上下有服服不相踰田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰唯君用鮮衆給而已子張怒退而徵役攻子産子皮逐豐卷豐卷奔晉子産請其田里請不沒入三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之三十一年穆叔劉定公秦后子知趙孟之死澶淵之盟穆叔至自會見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使蚤備魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出曰孟孫將死矣吾語諸趙孟之偷也而又甚焉又與季孫語晉故季孫不從及趙文子卒晉公室卑政在侈家韓宣子為政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平丘之會秋孟孝伯卒昭元年楚公子圍聘于鄭遂會于虢尋宋之盟也夏四月趙孟叔孫豹曹大夫入于鄭鄭伯兼享之子皮戒趙孟趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻義取薄物故知一獻子其從之及享具五獻之籩豆於幕下趙孟辭曰武請於冡宰矣乃用一獻趙孟為客禮終乃宴穆叔賦鵲巢喻晉君有國趙孟治之趙孟曰武不堪也又賦采蘩義取薄物以薦公侯享其信也曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安厖也可使無吠穆叔子皮曹大夫興拜舉兕爵曰小國賴子知免於戾矣飲酒樂趙孟出曰吾不復此矣天王使劉定公勞趙孟於潁館於雒汭劉子曰美哉禹功明德逺矣微禹吾其魚乎吾與子辨冕端委禮衣以治民臨諸侯禹之力也子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀久何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於隸人朝不謀夕棄神人矣神怒民叛何以能久趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從人何以年秦后子適晉見趙孟趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也國於天地有與立焉不數世淫弗能斃也趙孟曰天乎對曰有焉針聞之國無道而年榖和熟天贊之也鮮不五稔趙孟視蔭曰朝夕不相及誰能待五后子出曰趙孟將死矣主民玩歲而愒日其與幾何晉侯有疾求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容彈矣先王之樂得中聲聲成五降而息降罷退於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之至於煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天有六氣降生五味發為五色徵為五聲淫生六疾六氣曰陰陽風雨晦明也分為四時序為五節過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾濕為泄注晦淫惑疾明淫心疾晝思慮過則心勞生疾女陽物而晦時女隨男故言陽物淫則生內熱惑蠱之疾今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵祿任其大節有災禍興而無改焉必受其咎今君至於淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云也趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱器受蟲害者為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱巽下艮上艮為少男巽為長女少男説長女非匹是惑也皆同物也趙孟曰良醫也厚其禮而歸之十二月趙孟蒸於溫庚戌卒晏子知薑弱媯氏始昌齊子尾害閭邱嬰欲殺之使帥師以伐陽州我問師故夏五月子尾殺閭邱嬰以説於我師工僂灑渻竈孔虺賈寅出奔莒出羣公子昭二年韓宣子如齊納幣見子雅子雅召子旗宣子曰非保家之主也不臣見子尾子尾見強宣子謂之如子旗大夫多笑之唯晏子信之曰夫子君子也君子有信其有以知之矣三年公孫竈卒司馬竈見晏子曰又喪子雅矣晏子曰惜也子旗不免殆哉薑族弱矣而媯將始昌二惠競爽猶可又弱一個焉薑其危哉八年七月子尾卒子旗欲治其室丁丑殺梁嬰子尾家宰逐子成子工子車公孫捷而立子良氏之宰其臣曰孺子長矣而相吾室欲兼我也授甲將攻之陳桓子助之或告子旗子旗如陳氏桓子將出聞之而還遊服常服而逆之請命對曰聞強氏將攻子子聞諸曰弗聞子盍亦授甲無宇請從子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之謂為宰其若先人何子盍謂之周書曰惠不惠茂不茂康叔所以服𢎞大也桓子曰頃靈福子吾猶有望遂和之如初十年欒髙氏皆耆酒信內多怨強於陳鮑氏而惡之有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲見鮑文子亦授甲矣使視二子則皆將飲酒陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉往遂伐虎門晏平仲端委立于虎門之外四族召之無所往其徒曰助陳鮑乎曰何善焉助欒髙乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔公館率吉請斷三尺焉而用之五月庚辰戰于稷欒髙敗又敗諸莊又敗諸鹿門欒施髙強來奔陳鮑分其室晏子謂桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強思義為愈義利之本也藴利生孽姑使無藴乎可以滋長桓子盡致諸公而請老於莒桓子召子山私具幄幕器用從者之衣屨而反棘焉子商亦如之而反其邑子周亦如之而與之夫于邑名三子三十一年所逐公子反子城子公公孫捷而皆益其祿凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟曰詩云陳錫哉周能施也桓公是以霸分與桓子莒之旁邑辭穆孟姬為之請髙唐陳氏始大君子知昭公不能終六月辛巳公薨立胡女敬歸之子子野九月癸巳卒毁也立敬歸之娣齊歸之子禱直由穆叔不欲曰大子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣子野何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子卒立之比及葬三易衰衰衽如故衰於是昭公十九年矣猶有童心君子是以知其不能終也子服惠伯知滕成公將死冬十月滕成公來會葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣能無從乎昭三年滕子原卒子産如晉壞牆垣公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修寇盜充斥是以令吏人完客所館髙其閈閎厚其牆垣以無憂客使今吾子壞之雖從者能戒其若異客何對曰敝邑𥚹小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廏繕修司空以時平易道路圬人以時塓館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車主車脂轄𨽻人牧圉各瞻其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則巡行也之教其不知而恤其不足賔至如歸無寧災患不畏寇盜而亦不患燥濕今銅鞮之宫數里而諸侯舍於𨽻人門不容車而不可踰越盜賊公行而夭癘不戒賔見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之協矣辭之懌矣民之莫矣其知之矣北宫文子謂鄭有禮北宫文子相衛襄公以如楚宋之盟故也過鄭印段迋于況勞于棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子大叔逆客事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之於政如熱之有濯也濯以救熱何患之有子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨於其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也鄭子産不毁鄉校鄭人遊於鄉校以論執政然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也春秋左傳事類始末卷三
